<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>千股千评 选股系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
button{border:none;cursor:pointer;font-size:14px;font-family:inherit}
input,select{font-family:inherit}
a{color:#58a6ff;text-decoration:none}
/* ===== 玻璃层 ===== */
.glass{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.glass-panel{background:linear-gradient(135deg,rgba(33,38,45,0.95),rgba(22,27,34,0.95));border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.glass-panel h2{color:#fff;font-size:20px;margin-bottom:8px;text-align:center}
.glass-panel p{color:#8b949e;font-size:13px;text-align:center;margin-bottom:20px}
.glass-panel label{display:block;color:#c9d1d9;font-size:13px;margin-bottom:4px;margin-top:12px}
.glass-panel input,.glass-panel select{width:100%;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:10px;color:#c9d1d9;font-size:14px;outline:none;transition:border-color 0.2s}
.glass-panel input:focus,.glass-panel select:focus{border-color:#58a6ff}
.glass-panel .btn-group{display:flex;gap:10px;margin-top:20px}
.glass-panel .btn-group button{flex:1;padding:11px 0;border-radius:10px;font-size:14px;font-weight:600}
.glass-panel .btn-primary{background:#238636;color:#fff}
.glass-panel .btn-primary:hover{background:#2ea043}
.glass-panel .btn-secondary{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.glass-panel .btn-secondary:hover{background:#30363d}
/* ===== 首页 ===== */
.app-header{display:flex;align-items:center;gap:10px;padding:16px 16px 0;flex-wrap:wrap}
.app-header h1{color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.app-header h1 small{font-size:12px;color:#8b949e;font-weight:400}
.status-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;color:#8b949e;flex-wrap:wrap}
.status-bar .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-bar .dot.green{background:#3fb950}
.status-bar .dot.red{background:#f85149}
.status-bar .dot.yellow{background:#d29922}
.status-bar .dot.gray{background:#484f58}
.status-bar .msg{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ===== 扫描动画 ===== */
@keyframes scanning-pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.scanning-anim{animation:scanning-pulse 1.2s ease-in-out infinite}
/* ===== 搜索 ===== */
.search-bar{display:flex;gap:8px;padding:8px 16px}
.search-bar input{flex:1;padding:9px 14px;background:#161b22;border:1px solid #30363d;border-radius:10px;color:#c9d1d9;font-size:14px;outline:none;min-width:0}
.search-bar input:focus{border-color:#58a6ff}
.search-bar button{padding:9px 16px;background:#21262d;border:1px solid #30363d;border-radius:10px;color:#c9d1d9;font-size:13px;white-space:nowrap}
.search-bar button:hover{background:#30363d}
/* ===== 控制按钮栏 ===== */
.action-bar{display:flex;gap:8px;padding:4px 16px 10px;flex-wrap:wrap}
.action-bar button{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600}
.btn-scan{background:#238636;color:#fff}
.btn-scan:hover{background:#2ea043}
.btn-scan:disabled{opacity:0.5;cursor:not-allowed}
.btn-admin{background:#1f6feb;color:#fff}
.btn-admin:hover{background:#388bfd}
.btn-switch{background:#21262d;color:#c9d1d9;border:1px solid #30363d}
.btn-switch:hover{background:#30363d}
/* ===== 列表 ===== */
.list-header{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;background:#161b22;border-top:1px solid #21262d;border-bottom:1px solid #21262d;font-size:12px;color:#8b949e}
.list-header .more{color:#58a6ff;cursor:pointer}
.stock-list{padding:0 0 20px}
.stock-item{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #21262d;gap:8px;cursor:pointer;transition:background 0.15s}
.stock-item:hover,.stock-item.active{background:#161b22}
.stock-item .rank{width:28px;font-size:13px;font-weight:700;color:#8b949e;flex-shrink:0;text-align:center}
.stock-item .rank.top3{color:#d29922}
.stock-item .info{flex:1;min-width:0}
.stock-item .info .name{font-size:15px;font-weight:600;color:#fff}
.stock-item .info .code{font-size:11px;color:#484f58;margin-left:6px}
.stock-item .info .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.stock-item .info .tags .tag{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.06);color:#8b949e}
.stock-item .price{text-align:right;flex-shrink:0}
.stock-item .price .p{font-size:15px;font-weight:700}
.stock-item .price .chg{font-size:12px;margin-top:2px}
.stock-item .score{font-size:13px;font-weight:700;width:36px;text-align:center;flex-shrink:0}
.score-up{color:#f85149}
.score-down{color:#3fb950}
/* ===== Price refresh Flash ===== */
.price-flash{transition:color 0.3s}
.price-flash.up{color:#3fb950!important}
.price-flash.down{color:#f85149!important}
/* ===== 空态 ===== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#484f58}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.4}
.empty-state p{font-size:14px}
/* ===== 冻结遮罩 ===== */
.freeze-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center}
.freeze-card{text-align:center;padding:32px;max-width:320px}
.freeze-card .clock{font-size:64px;margin-bottom:12px}
.freeze-card h2{color:#fff;font-size:18px;margin-bottom:8px}
.freeze-card p{color:#8b949e;font-size:13px;line-height:1.6}
.freeze-card .next-time{color:#58a6ff;font-size:14px;margin-top:12px;font-weight:600}
/* ===== 页面底栏 ===== */
.footer-actions{display:flex;gap:8px;padding:8px 16px 16px;flex-wrap:wrap}
.footer-actions button{padding:7px 14px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;font-size:12px}
.footer-actions button:hover{background:#30363d}
/* ===== 详情面板 ===== */
.detail-panel{position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column}
.detail-header{display:flex;align-items:center;padding:16px;gap:12px;border-bottom:1px solid #21262d}
.detail-header .back{font-size:20px;cursor:pointer;padding:4px 8px;color:#8b949e}
.detail-header .back:hover{color:#fff}
.detail-header h2{font-size:18px;color:#fff}
.detail-header .code{color:#484f58;font-size:13px}
.detail-header .d-price{text-align:right;flex:1}
.detail-header .d-price .p{font-size:24px;font-weight:700}
.detail-header .d-price .chg{font-size:14px;margin-left:8px}
.detail-body{flex:1;overflow-y:auto;padding:16px}
.detail-body section{margin-bottom:20px}
.detail-body section h3{font-size:13px;color:#8b949e;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detail-body .signal-tags{display:flex;flex-wrap:wrap;gap:6px}
.detail-body .signal-tags .st{font-size:11px;padding:3px 8px;border-radius:4px}
.detail-body .score-card{display:flex;gap:16px;flex-wrap:wrap}
.detail-body .score-card .sc{flex:1;min-width:100px;text-align:center;padding:12px;background:#161b22;border-radius:10px}
.detail-body .score-card .sc .val{font-size:22px;font-weight:700}
.detail-body .score-card .sc .lbl{font-size:11px;color:#8b949e;margin-top:4px}
.detail-body .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-body .info-grid .ig{padding:8px 12px;background:#161b22;border-radius:8px;font-size:13px}
.detail-body .info-grid .ig .l{color:#8b949e}
.detail-body .info-grid .ig .v{color:#fff;font-weight:600;float:right}
/* ===== 管理面板 ===== */
.manage-section{padding:16px}
.manage-section h3{font-size:15px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.device-card{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#161b22;border-radius:8px;margin-bottom:8px}
.device-card .info{flex:1}
.device-card .info .name{font-size:13px;color:#fff}
.device-card .info .detail{font-size:11px;color:#8b949e;margin-top:2px}
.device-card .info .time{font-size:11px;color:#484f58;margin-top:1px}
.manage-section .btn-remove{padding:5px 12px;background:#da3633;color:#fff;border-radius:6px;font-size:12px}
/* ===== 搜索弹窗 ===== */
.search-results{position:fixed;top:80px;left:16px;right:16px;z-index:1002;background:#161b22;border:1px solid #30363d;border-radius:12px;max-height:60vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.search-results .sr-item{padding:10px 14px;border-bottom:1px solid #21262d;cursor:pointer;font-size:14px;color:#c9d1d9}
.search-results .sr-item:hover{background:#1c2128}
.search-results .sr-item .sr-code{color:#484f58;margin-left:8px;font-size:12px}
/* ===== 滚动条 ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var API='/api'

/* ===== 工具函数 ===== */
function $(id){return document.getElementById(id)}
function _n(v){return v===null||v===undefined?'-':(typeof v==='number'?v.toFixed(2):v)}
function _cp(v,p){return v===null||v===undefined?'-':(p!==undefined?v.toFixed(p):v)}
function _t(v){return v||'-'}
function _pn(v){var n=parseFloat(v);return isNaN(n)?'-':n.toFixed(2)}

/* ===== 状态管理 ===== */
var STATE={
  scanning:false,
  frozen:false,
  initialized:false,
  adminMode:false,
  deviceId:null,
  token:null,
  mode:'scan',
  stocks:[],
  selectedStock:null,
  searchResults:[],
  ds:null, // detail stock
  cache:null,
  priceTimer:null,
  scheduleInit:false,
  refreshActive:false,
  lastRefreshTime:0
}

/* ===== 全局设置默认值 ===== */
var _DEVICE_ID=''
var _GLASS_SHOWN=false

/* ===== 注册/验证 ===== */
async function checkAccess(){
  var raw=_DEVICE_ID
  if(!raw){raw=localStorage.getItem('device_name')||''}
  if(!raw){showGlass('register');return false}
  var did=raw.trim()
  if(!did){showGlass('register');return false}
  STATE.deviceId=did
  try{
    var r=await fetch(API+'/access/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId:did})})
    var d=await r.json()
    if(d.code===200){
      localStorage.setItem('device_name',did)
      STATE.token=d.data.token
      STATE.adminMode=d.data.isAdmin||false
      initApp()
      return true
    }else{
      if(d.code===429){showGlass('limit');return false}
      showGlass('register');return false
    }
  }catch(e){
    showGlass('register');return false
  }
}

/* ===== 玻璃弹窗 ===== */
function showGlass(type,extra){
  _GLASS_SHOWN=true
  var app=$('app')
  if(type==='register'){
    var saved=localStorage.getItem('device_name')||''
    app.innerHTML='<div class="glass"><div class="glass-panel"><h2>🔐 设备注册</h2><p>输入您的设备名称以开始使用</p><label>设备名称</label><input id="deviceNameInput" value="'+saved.replace(/"/g,'&quot;')+'" placeholder="例如: 我的手机" maxlength="20"><div class="btn-group"><button class="btn-secondary" onclick="showGlass(\'about\')">关于</button><button class="btn-primary" id="registerBtn" onclick="doRegister()">注册</button></div></div></div>'
    $('deviceNameInput').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()})
    $('deviceNameInput').focus()
  }else if(type==='limit'){
    app.innerHTML='<div class="glass"><div class="glass-panel"><h2>⚠️ 访问受限</h2><p>当前设备数量已达上限，请联系管理员</p><button class="btn-primary" style="width:100%;padding:11px;border-radius:10px;margin-top:16px" onclick="location.reload()">重试</button></div></div>'
  }else if(type==='about'){
    app.innerHTML='<div class="glass"><div class="glass-panel"><h2>📊 千股千评</h2><p>智能选股系统 v2.0<br>基于技术面 + 资金面的多因子评分模型<br>覆盖沪深主板 + 创业板<br><br>数据来源：东方财富</p><button class="btn-primary" style="width:100%;padding:11px;border-radius:10px;margin-top:16px" onclick="showGlass(\'register\')">返回</button></div></div>'
  }else if(type==='admin'){
    app.innerHTML='<div class="glass"><div class="glass-panel"><h2>🔑 管理员</h2><p>设备管理</p><div id="adminContent" style="min-height:60px"><p style="text-align:center;color:#8b949e">加载中...</p></div><button class="btn-secondary" style="width:100%;padding:11px;border-radius:10px;margin-top:12px" onclick="closeGlass()">关闭</button></div></div>'
    loadAdmin()
  }
}

/* ===== 注册 ===== */
async function doRegister(){
  var inp=$('deviceNameInput')
  if(!inp)return
  var val=inp.value.trim()
  if(!val){inp.focus();return}
  _DEVICE_ID=val
  $('registerBtn').textContent='注册中...'
  $('registerBtn').disabled=true
  await checkAccess()
}

/* ===== 关闭玻璃 ===== */
function closeGlass(){
  _GLASS_SHOWN=false
  if(STATE.initialized)renderApp()
}

/* ===== 管理员 ===== */
async function loadAdmin(){
  var c=$('adminContent');if(!c)return
  try{
    var r=await fetch(API+'/access/admin',{headers:{'Authorization':'Bearer '+STATE.token,'X-Device-Id':STATE.deviceId}})
    var d=await r.json()
    if(d.code===200){
      var list=d.data||[]
      c.innerHTML=list.length?'':('<p style="text-align:center;color:#8b949e">暂无设备</p>')
      list.forEach(function(dev){
        c.innerHTML+='<div class="device-card"><div class="info"><div class="name">'+dev.name+'</div><div class="detail">'+dev.agent+'</div><div class="time">'+dev.lastAccess+'</div></div><button class="btn-remove" onclick="removeDevice(\''+dev.name+'\')">移除</button></div>'
      })
    }else{c.innerHTML='<p style="text-align:center;color:#f85149">加载失败</p>'}
  }catch(e){c.innerHTML='<p style="text-align:center;color:#f85149">请求失败</p>'}
}
async function removeDevice(name){
  if(!confirm('确定移除 '+name+'?'))return
  try{
    var r=await fetch(API+'/access/admin/remove',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+STATE.token,'X-Device-Id':STATE.deviceId},body:JSON.stringify({deviceId:name})})
    var d=await r.json()
    if(d.code===200)loadAdmin()
    else alert('操作失败: '+d.msg)
  }catch(e){alert('请求失败')}
}

/* ===== 初始化 ===== */
var loading=false
var isFrozen=false
var scanCount=0
var scheduleTimers=[]

function initApp(){
  STATE.initialized=true
  renderApp()
  initSchedule()
}

function renderApp(){
  if(_GLASS_SHOWN)return
  var app=$('app')
  if(STATE.mode==='detail'&&STATE.ds){
    renderDetail(STATE.ds)
    return
  }
  if(STATE.mode==='scan'){
    renderScanView()
    if(STATE.stocks.length>0)renderList()
    else tryRestoreCache()
  }else if(STATE.mode==='manage'){
    renderManageView()
  }
}

/* ===== 扫描视图 ===== */
function renderScanView(){
  var app=$('app')
  app.innerHTML='<div class="app-header"><h1>📊 千股千评 <small>选股系统</small></h1></div><div class="status-bar" id="statusBar"><span class="dot gray" id="statusDot"></span><span class="msg" id="statusMsg">就绪</span></div><div class="search-bar"><input id="searchInput" placeholder="搜索股票代码/名称..." onkeydown="doSearch(event)"><button onclick="doSearch()">🔍</button></div><div class="action-bar"><button class="btn-scan" id="scanBtn" onclick="handleScanClick()">🔄 立即扫描</button><button class="btn-admin" onclick="showGlass(\'admin\')">⚙️ 管理</button><button class="btn-switch" id="modeSwitch" onclick="toggleView()">📋 机会股</button></div><div id="searchResults"></div><div id="stockList"></div><div id="emptyState"></div><div class="footer-actions"><button onclick="handleClearCache()">🗑️ 清除缓存</button></div>'
  renderScheduleInfo()
  updateFreezeUI()
}

function setStatus(msg,scanning){
  var dot=$('statusDot'),msgEl=$('statusMsg')
  if(!dot||!msgEl)return
  msgEl.textContent=msg
  if(scanning){
    dot.className='dot yellow scanning-anim'
    msgEl.className='msg scanning-anim'
  }else{
    dot.className='dot green'
    msgEl.className='msg'
  }
}

function handleScanClick(){
  if(isFrozen){setStatus('⏰ 非交易时段 扫描已冻结',false);return}
  if(loading){setStatus('⏳ 扫描进行中...',true);return}
  // 始终先尝试恢复缓存，然后执行全新扫描
  if(!STATE.cache)tryRestoreCache()
  doScan()
}

/* ===== 计划任务 ===== */
function initSchedule(){
  if(STATE.scheduleInit)return
  STATE.scheduleInit=true
  
  // 9:00 唤醒
  scheduleAt(9,0,function(){setStatus('🌅 系统唤醒',false)})
  
  // 固定扫描
  scheduleAt(9,30,function(){if(!isFrozen)doScan()})
  scheduleAt(11,30,function(){if(!isFrozen)doScan()})
  scheduleAt(13,0,function(){if(!isFrozen)doScan()})
  scheduleAt(15,0,function(){if(!isFrozen)doScan()})
  
  // 交易时段每10分钟
  var tradeCheck=setInterval(function(){
    if(isFrozen)return
    var h=new Date().getHours(),m=new Date().getMinutes()
    if((h===9&&m>=30)||h===10||(h===11&&m<30)||(h===13)||(h===14)){
      if(m%10===0&&!loading&&!STATE.refreshActive){
        var key='scan_'+h+'_'+m
        if(STATE.lastScanKey!==key){
          STATE.lastScanKey=key
          doScan()
        }
      }
    }
    updateFreezeUI()
  },60000)
  scheduleTimers.push(tradeCheck)
  
  // 冻结/解冻检查
  var freezeCheck=setInterval(function(){
    var h=new Date().getHours(),m=new Date().getMinutes()
    var trading=(h===9&&m>=30)||h===10||(h===11&&m<30)||(h===13)||(h===14)||(h===15&&m===0)
    if(trading&&isFrozen){
      isFrozen=false
      setStatus('🔓 交易时段 扫描已激活',false)
      $('scanBtn')&&($('scanBtn').disabled=false)
    }else if(!trading&&!isFrozen){
      isFrozen=true
      setStatus('🔒 非交易时段 扫描已冻结',false)
      $('scanBtn')&&($('scanBtn').disabled=true)
    }
    updateFreezeUI()
  },5000)
  scheduleTimers.push(freezeCheck)
}

function scheduleAt(h,m,cb){
  var now=new Date(),target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0)
  if(target<=now)target.setDate(target.getDate()+1)
  var t=setTimeout(function(){cb();setInterval(function(){var nn=new Date();if(nn.getHours()===h&&nn.getMinutes()===m)cb()},60000)},target-now)
  scheduleTimers.push(t)
}

function renderScheduleInfo(){
  var sb=$('statusBar')
  if(!sb)return
  var info=document.createElement('div')
  info.style.cssText='font-size:11px;color:#484f58;padding:0 16px 4px'
  info.innerHTML='📅 09:30/11:30/13:00/15:00固定扫描 · 交易时段每10分钟'
  sb.parentNode.insertBefore(info,sb.nextSibling)
}

function updateFreezeUI(){
  var h=new Date().getHours(),m=new Date().getMinutes()
  var trading=(h===9&&m>=30)||h===10||(h===11&&m<30)||(h===13)||(h===14)||(h===15&&m===0)
  if(trading===isFrozen){
    isFrozen=!trading
    var el=$('scanBtn')
    if(el){
      if(isFrozen){el.disabled=true;el.textContent='🔒 已冻结'}
      else{el.disabled=false;el.textContent='🔄 立即扫描'}
    }
    updateFreezeOverlay()
  }
}

function updateFreezeOverlay(){
  var existing=document.querySelector('.freeze-overlay')
  if(isFrozen&&!STATE.mode.startsWith('detail')){
    if(existing)return
    var div=document.createElement('div')
    div.className='freeze-overlay'
    div.innerHTML='<div class="freeze-card"><div class="clock">🌙</div><h2>非交易时段</h2><p>系统已自动冻结扫描<br>下一个交易时段自动恢复</p><div class="next-time" id="nextTime">等待开盘...</div></div>'
    document.body.appendChild(div)
    
    var intv=setInterval(function(){
      var n=new Date(),h=n.getHours(),m=n.getMinutes()
      var targets=[]
      if(h<9||(h===9&&m<30))targets.push({h:9,m:30,l:'上午 09:30'})
      if(h<13||(h>=11&&m>=30))targets.push({h:13,m:0,l:'下午 13:00'})
      if(h>=15)targets.push({h:9,m:30,l:'明天 09:30'})
      var next=targets[0]
      if(next){
        var t=new Date(n.getFullYear(),n.getMonth(),n.getDate(),next.h,next.m,0)
        if(t<=n)t.setDate(t.getDate()+1)
        var diff=Math.floor((t-n)/1000)
        var mm=Math.floor(diff/60),ss=diff%60
        var nt=$('nextTime')
        if(nt)nt.textContent='下次扫描: '+next.l+' ('+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+')'
      }
    },1000)
  }else{
    if(existing){existing.remove()}
  }
}

/* ===== 数据管理 ===== */
var CACHE_KEY='stock_screener_data'
var CACHE_TIME=30*60*1000

function saveCache(data){
  try{
    localStorage.setItem(CACHE_KEY,JSON.stringify({time:Date.now(),data:data}))
    STATE.cache=data
  }catch(e){}
}

function loadCache(){
  try{
    var raw=localStorage.getItem(CACHE_KEY)
    if(!raw)return null
    var obj=JSON.parse(raw)
    if(Date.now()-obj.time>CACHE_TIME){localStorage.removeItem(CACHE_KEY);return null}
    STATE.cache=obj.data
    return obj.data
  }catch(e){return null}
}

function tryRestoreCache(){
  var cache=loadCache()
  if(cache&&cache.length>0){
    STATE.stocks=cache
    renderList()
    setStatus('📋 已恢复缓存数据 ('+cache.length+'只) '+new Date(STATE.lastRefreshTime||Date.now()).toLocaleTimeString(),false)
    startPriceRefresh()
    return true
  }
  return false
}

function handleClearCache(){
  if(!confirm('确定清除缓存?'))return
  localStorage.removeItem(CACHE_KEY)
  STATE.cache=null
  STATE.stocks=[]
  renderList()
  setStatus('🗑️ 缓存已清除',false)
}

/* ===== 核心扫描 ===== */
async function doScan(){
  if(loading)return;loading=true;$('scanBtn')&&($('scanBtn').disabled=true);$('scanBtn')&&($('scanBtn').textContent='扫描中...')
  setStatus('🔄 获取股票列表...',true)
  try{
    // 1. 从东方财富获取全部A股列表(一次请求，与K线API同域名，CORS兼容)
    var emUrl='https://push2.eastmoney.com/api/qt/clist/get?cb=&pn=1&pz=5000&po=1&np=1&fields=f12,f14,f2,f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048'
    var emResp=await fetch(emUrl,{headers:{'Referer':'https://quote.eastmoney.com/'}}).then(function(r){return r.json()}).catch(function(e){console.log('东方财富请求失败:',e);return null})
    var emList=emResp&&emResp.data&&emResp.data.diff
    if(!emList||!emList.length){setStatus('❌ 获取股票列表失败('+(emList?emList.length:0)+'只)，East Money API可能受限',true);loading=false;$('scanBtn')&&($('scanBtn').disabled=false);$('scanBtn')&&($('scanBtn').textContent='🔄 立即扫描');return}
    setStatus('🔄 获取 '+emList.length+' 只股票 处理中...',true)
    
    // 2. 过滤：主板(600,601,603,605,000,001,002) + 创业板(300,301)，排除ST/价格<3
    var seenCodes={},stkList=[]
    emList.forEach(function(item){
      var code=String(item.f12).padStart(6,'0')
      var name=item.f14
      if(!code||!name||seenCodes[code])return
      if(name.startsWith('*')||name.startsWith('ST')||name.startsWith('N')||name.startsWith('C'))return
      var price=parseFloat(item.f2)
      if(isNaN(price)||price<3)return
      var isMain=code.startsWith('600')||code.startsWith('601')||code.startsWith('603')||code.startsWith('605')||code.startsWith('000')||code.startsWith('001')||code.startsWith('002')
      var isGem=code.startsWith('300')||code.startsWith('301')
      if(!isMain&&!isGem)return
      seenCodes[code]=1
      stkList.push({code:code,name:name,currentPrice:price,changePercent:parseFloat(item.f3)||0})
    })
    if(stkList.length<50){setStatus('❌ 数据不足('+stkList.length+'只)，East Money返回数据不足，尝试重试...',true);loading=false;$('scanBtn')&&($('scanBtn').disabled=false);$('scanBtn')&&($('scanBtn').textContent='🔄 立即扫描');return}
    setStatus('🔄 已获取 '+stkList.length+' 只股票 并行拉取K线...',true)
    
    // 3. 带并发控制的K线拉取+主力资金
    var klineData={},fundFlowData={},klineOk=0,klineFail=0
    var q=stkList.slice(),fetchedCount=0
    var CONCURRENCY=20
    
    function _fetchKline(code){
      var em=(code.startsWith('6')?'1.':'0.')+code
      return fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+em+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=120',{headers:{'Referer':'https://quote.eastmoney.com/'}}).then(function(r){return r.json()}).then(function(d){
        var kl=d&&d.data&&d.data.klines
        if(kl&&kl.length>0){
          klineData[code]=kl
          return true
        }
        // 科创板用1.前缀重试
        if(code.startsWith('688')){
          return fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid=1.'+code+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=120',{headers:{'Referer':'https://quote.eastmoney.com/'}}).then(function(r2){return r2.json()}).then(function(d2){
            var kl2=d2&&d2.data&&d2.data.klines
            if(kl2&&kl2.length>0){klineData[code]=kl2;return true}
            return false
          })
        }
        return false
      }).catch(function(e){return false})
    }
    
    function _fetchFundFlow(code){
      var em=(code.startsWith('6')?'1.':'0.')+code
      return fetch('https://push2.eastmoney.com/api/qt/stock/fflow/kline/get?secid='+em+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55&klt=101&lmt=120',{headers:{'Referer':'https://quote.eastmoney.com/'}}).then(function(r){return r.json()}).then(function(d){
        var fl=d&&d.data&&d.data.klines
        if(fl&&fl.length>0){fundFlowData[code]=fl;return true}
        return false
      }).catch(function(e){return false})
    }
    
    async function _worker(){
      while(q.length>0){
        var stk=q.shift()
        var c=stk.code
        var ok=await _fetchKline(c)
        if(ok)klineOk++;else klineFail++
        fetchedCount++
        if(fetchedCount%20===0||fetchedCount===stkList.length){
          setStatus('🔄 K线拉取 '+fetchedCount+'/'+stkList.length+' OK:'+klineOk+' FAIL:'+klineFail,true)
        }
        // 同时拉主力资金(不等待)
        _fetchFundFlow(c)
      }
    }
    
    var workers=[]
    for(var wi=0;wi<CONCURRENCY;wi++)workers.push(_worker())
    await Promise.all(workers)
    
    if(klineOk<50){setStatus('❌ K线数据不足('+klineOk+'只OK/'+klineFail+'失败)，重试',true);loading=false;$('scanBtn')&&($('scanBtn').disabled=false);$('scanBtn')&&($('scanBtn').textContent='🔄 立即扫描');return}
    setStatus('🔄 K线获取完成 ('+klineOk+'/'+stkList.length+') 推送到后端分析...',true)
    
    // 4. 分批推送到后端分析
    var batchSize=50,results=[],totalBatches=Math.ceil(stkList.length/batchSize)
    for(var bi=0;bi<totalBatches;bi++){
      var batch=stkList.slice(bi*batchSize,(bi+1)*batchSize)
      var payload=batch.map(function(s){
        var kl=klineData[s.code]
        return {code:s.code,name:s.name,currentPrice:s.currentPrice,changePercent:s.changePercent,kline:kl?kl:[],fundFlow:fundFlowData[s.code]||[]}
      })
      try{
        var resp=await fetch(API+'/gem-screener/refresh-all',{method:'POST',headers:{'Content-Type':'application/json','X-Device-Id':STATE.deviceId},body:JSON.stringify({list:payload})})
        var data=await resp.json()
        if(data.code===200&&data.data){
          results=results.concat(data.data)
        }else{
          console.log('批'+bi+'返回异常:',data)
        }
      }catch(e){
        console.log('批'+bi+'请求失败:',e)
      }
      setStatus('🔄 分析 '+(bi+1)+'/'+totalBatches+'批 ('+results.length+'只已分析)',true)
    }
    
    // 5. 排序取前20
    results.sort(function(a,b){return (b.score||0)-(a.score||0)})
    STATE.stocks=results.slice(0,20)
    STATE.scanCount=(STATE.scanCount||0)+1
    STATE.lastRefreshTime=Date.now()
    
    saveCache(STATE.stocks)
    renderList()
    startPriceRefresh()
    setStatus('✅ 扫描完成! 共分析'+results.length+'只, 选出Top20 '+(STATE.scanCount||'')+' '+new Date().toLocaleTimeString(),false)
    
  }catch(e){
    console.log('扫描异常:',e)
    setStatus('❌ 扫描异常: '+e.message,false)
  }finally{
    loading=false
    $('scanBtn')&&($('scanBtn').disabled=isFrozen)
    $('scanBtn')&&($('scanBtn').textContent=isFrozen?'🔒 已冻结':'🔄 立即扫描')
  }
}

/* ===== 实时价格刷新 ===== */
function startPriceRefresh(){
  if(STATE.priceTimer)clearInterval(STATE.priceTimer)
  STATE.priceTimer=setInterval(function(){
    var stocks=$('stockList')
    if(!stocks||STATE.stocks.length===0)return
    var codes=STATE.stocks.map(function(s){
      var code=s.code
      return (code.startsWith('6')?'sh':'sz')+code
    }).join(',')
    if(!codes)return
    // 用腾讯API + script tag方式（支持跨域）
    fetchRealtime(codes)
  },2000)
}

/* ===== 实时价格获取(腾讯API script方式) ===== */
function fetchRealtime(codes){
  // 腾讯实时行情API (script标签方式加载，不依赖CORS)
  var script=document.createElement('script')
  script.src='https://qt.gtimg.cn/q='+codes
  script.onload=function(){script.remove()}
  script.onerror=function(){script.remove()}
  document.head.appendChild(script)
}

// 腾讯API回调(通过eval执行)
window.__qt_cb=function(data){
  if(!data)return
  var lines=data.split('\n')
  lines.forEach(function(line){
    if(!line||!line.startsWith('v_'))return
    var parts=line.split('~')
    if(parts.length<4)return
    var name=parts[1]
    var price=parseFloat(parts[3])
    if(isNaN(price)||!name)return
    var chg=parseFloat(parts[32])||0
    var chgP=parseFloat(parts[33])||0
    
    // 更新对应的股票
    var stock=STATE.stocks.find(function(s){return s.name===name})
    if(!stock)return
    stock.currentPrice=price
    stock.changePercent=chgP
    
    // 更新DOM
    var el=document.querySelector('.stock-item[data-code="'+stock.code+'"]')
    if(!el)return
    var pEl=el.querySelector('.p'),chgEl=el.querySelector('.chg')
    if(pEl){
      var oldVal=parseFloat(pEl.textContent)
      pEl.textContent=price.toFixed(2)
      if(oldVal&&price!==oldVal){
        pEl.className='p price-flash'+(price>oldVal?' up':' down')
        setTimeout(function(){pEl.className='p'},300)
      }
    }
    if(chgEl){
      chgEl.textContent=(chgP>=0?'+':'')+chgP.toFixed(2)+'%'
      chgEl.style.color=chgP>=0?'#f85149':'#3fb950'
    }
  })
}

    el.innerHTML='<div class="empty-state"><div class="icon">📈</div><p>暂无数据，请点击"立即扫描"</p></div>'

  }
  var html='<div class="list-header"><span>📋 机会股 Top'+stocks.length+'</span></div>'

    var scoreColor=score>=70?'#f85149':score>=50?'#d29922':'#8b949e'
    html+='<div class="stock-item" data-code="'+s.code+'" onclick="showDetail('+i+')"><div class="rank'+(i<3?' top3':'')+'">'+(i+1)+'</div><div class="info"><div class="name">'+s.name+'<span class="code">'+s.code+'</span></div><div class="tags">'+(tags.length>0?tags.slice(0,5).map(function(t){return '<span class="tag">'+createSignalMap(t)+'</span>'}).join(''):'')+'</div></div><div class="price"><div class="p">'+price.toFixed(2)+'</div><div class="chg" style="color:'+(chg>=0?'#f85149':'#3fb950')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div></div><div class="score" style="color:'+scoreColor+'">'+score+'</div></div>'
  })
  el.innerHTML=html
}

function createSignalMap(s){
  var map={'重仓买入':'🔴','买入':'🟢','轻仓买入':'🟡','卖出':'⚪','横盘突破':'📈','白消启动':'🔥','强势回踩':'💪','震荡买点':'🎯','加仓':'⬆️','主力建仓':'💰','主力试盘':'🔄','企稳':'✅','成立':'⭐','清仓':'❌','爆量覆盖':'💥','破5日线':'📉','紧急清仓':'🚨','主力出货':'📤','空':'🈳','闭眼卖':'🙈'}
  var suffix=s.replace(/^(重仓|买入|轻仓|卖出)/,'')
  var prefix=s.replace(suffix,'')
  if(prefix&&map[prefix])return map[prefix]+suffix
  if(map[s])return map[s]
  return s
}

      html+='</div></section>'
    }
    
    // 股票基本信息
    if(info.industry||info.market||info.totalShares){
      html+='<section><h3>📋 基本信息</h3><div class="info-grid">'
      if(info.industry)html+='<div class="ig"><span class="l">行业</span><span class="v">'+info.industry+'</span></div>'
      if(info.market)html+='<div class="ig"><span class="l">市场</span><span class="v">'+info.market+'</span></div>'
      if(info.totalShares)html+='<div class="ig"><span class="l">总股本</span><span class="v">'+info.totalShares+'</span></div>'
      html+='</div></section>'
    }
    
    if(!html){html='<div style="text-align:center;padding:40px;color:#8b949e">暂无详细数据</div>'}
    el.innerHTML=html
  }catch(e){
    el.innerHTML='<div style="text-align:center;padding:40px;color:#f85149">请求失败: '+e.message+'</div>'
  }
}

/* ===== 注册弹窗 ===== */
function handleRegistration(){
  _DEVICE_ID=localStorage.getItem('device_name')||''
  if(_DEVICE_ID){
    checkAccess()
  }else{
    showGlass('register')
  }
}

/* ===== 启动 ===== */
function init(){
  handleRegistration()
}

init()
</script>
