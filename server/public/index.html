<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>A股优选 Top20</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
.header{position:sticky;top:0;background:#fff;z-index:10;padding:12px 16px 8px;border-bottom:1px solid #eee}
.header h1{font-size:18px;font-weight:700}
.header .status{font-size:11px;color:#999;margin-top:2px}
.freeze-banner{margin-top:6px;padding:6px 10px;background:#fefce8;border-radius:8px;border:1px solid #fde68a;font-size:12px;color:#a16207}
.search-bar{display:flex;align-items:center;gap:8px;background:#f5f5f5;border-radius:10px;padding:8px 12px;margin:8px 16px}
.search-bar input{flex:1;border:none;background:transparent;font-size:13px;outline:none}
.search-bar button{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
#searchResult{display:none;margin:0 12px 8px}
.sr-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.sr-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f9fafb;border-bottom:1px solid #eee}
.sr-name{font-size:15px;font-weight:600}
.sr-code{font-size:11px;color:#999}
.sr-body{padding:0}
.btn-scan{margin:8px 16px;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:13px;text-align:center;cursor:pointer}
.btn-scan:disabled{opacity:.5;cursor:not-allowed}
.list-header{display:flex;padding:8px 16px 4px;font-size:11px;color:#999;font-weight:500}
.col-name{flex:1.5}
.col-action{flex:.75;text-align:center}
.col-price{flex:1;text-align:center}
.col-chg{flex:1;text-align:center}
.col-pos{flex:1.1;text-align:right}
.stock-list{padding:0 12px 8px;display:flex;flex-direction:column;gap:6px}
.stock-card{background:#fff;border-radius:10px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all .15s}
.stock-card:active{transform:scale(.98)}
.stock-row{display:flex;align-items:center}
.stock-info{display:flex;align-items:center;gap:6px;flex:1.5;min-width:0}
.rank-badge{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.rank-top3{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.rank-other{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.stock-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-code{font-size:10px;color:#999}
.signal-badge{padding:3px 6px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;text-align:center;flex:.75;display:inline-block;text-align:center}
.price{font-size:13px;font-weight:500;flex:1;text-align:center}
.chg{font-size:13px;font-weight:700;flex:1;text-align:center}
.pos{font-size:13px;font-weight:700;flex:1.1;text-align:right}

/* Detail panel - rich analysis style */
.detail-panel{display:none;margin:6px 0 0;padding:0;background:#fff;border-radius:8px;overflow:hidden}
.detail-panel.open{display:block}
.signal-tags{padding:10px 12px 6px;display:flex;flex-wrap:wrap;gap:6px}
.signal-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;color:#fff}

/* Action button */
.action-card{padding:0 12px 8px}
.action-btn{display:flex;align-items:center;justify-content:space-between;border-radius:10px;padding:12px 14px;color:#fff;font-weight:600}
.action-btn .action-label{font-size:16px;font-weight:700}
.action-btn .action-reason{font-size:11px;opacity:.85}

/* Prediction */
.prediction-box{margin:0 12px 8px;padding:10px 12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
.prediction-box .label{font-size:11px;color:#94a3b8;margin-bottom:4px}
.prediction-box .text{font-size:13px;font-weight:600;color:#334155}

/* Indicator grid */
.indicator-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 8px}
.indicator-item{background:#f8fafc;padding:8px 10px;border-radius:8px;border:1px solid #eef2f6}
.indicator-item .label{font-size:10px;color:#94a3b8;margin-bottom:2px}
.indicator-item .value{font-size:13px;font-weight:600}
.indicator-item .value.red{color:#dc2626}.indicator-item .value.green{color:#16a34a}.indicator-item .value.yellow{color:#ca8a04}

/* Details list */
.detail-list{padding:0 12px 10px}
.footer{background:#fff;padding:10px 16px;border-top:1px solid #eee;font-size:11px;color:#999;text-align:center}
.loading{text-align:center;padding:40px 16px;font-size:14px;color:#999}
.empty{text-align:center;padding:48px 16px;font-size:14px;color:#999}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>A股优选 Top20</h1>
    <span class="status" id="status">等待扫描</span>
  </div>
  <div class="freeze-banner" id="freezeMsg" style="display:none"></div>
</div>

<div class="search-bar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input id="searchInput" placeholder="输入代码搜索" onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()">搜索</button>
</div>

<!-- 共享详情区域：列表点击 / 搜索都显示在这里 -->
<div id="detailArea" class="detail-panel" style="margin:0 12px 8px;display:none"></div>

<button class="btn-scan" id="scanBtn" onclick="doScan()" style="margin:8px 16px">🔄 立即扫描</button>

<div class="list-header">
  <span class="col-name">名称</span>
  <span class="col-action">操作</span>
  <span class="col-price">实时价</span>
  <span class="col-chg">涨跌幅</span>
  <span class="col-pos">位置</span>
</div>
<div class="stock-list" id="stockList">
  <div class="empty" id="emptyMsg">点击上方按钮开始扫描</div>
</div>

<div class="footer" id="footer">⏸️ 等待扫描</div>

<script>
var API='/api'
var COLORS={'重仓买入':'#dc2626','买入':'#16a34a','轻仓买入':'#ca8a04','持有':'#2563eb','观望':'#6b7280'}
var TAG_COLORS={'低位区':'#16a34a','中低位':'#65a30d','中位区':'#ca8a04','中高位':'#f97316','高位区':'#dc2626'}

function getBJ(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000)}
function isTH(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return m>=540&&m<900}
function freezeMsg(){var b=getBJ(),d=b.getDay(),m=b.getHours()*60+b.getMinutes();if(d===0||d===6)return'周末休市，已冻结至周一 9:00';if(m>=900)return d===5?'周五收盘，已冻结至下周一 9:00':'收盘已冻结，明早 9:00 恢复';if(m<540)return'盘前已冻结，9:00 恢复';return''}

var stocks=[],loading=false,realtimePrices={}

// 恢复上次扫描结果（冻结时也展示）
try{
  var ls=localStorage.getItem('lastStocks')
  if(ls){stocks=JSON.parse(ls)}
}catch(e){}
function $(id){return document.getElementById(id)}
function setStatus(s){$('status').textContent=s}
var selectedIdx=-1

function posLabel(p){
  if(p<25) return '低位区'
  if(p<45) return '中低位'
  if(p<55) return '中位区'
  if(p<80) return '中高位'
  return '高位区'
}

function todayAdviceText(s,rt){
  var chg=rt.changePercent||0
  var sig=s.suggestion||''
  if(sig==='重仓买入'){
    if(chg<-2) return'今日低开/回调，全仓买入把握低吸机会'
    if(chg>3) return'今日强势上攻，全仓买入积极跟进'
    return'今日走势符合预期，建议全仓买入'
  }
  if(sig==='买入'){
    if(chg<-2) return'今日回调幅度较大，可半仓买入布局'
    if(chg>2) return'今日上涨中，可半仓买入跟进'
    return'今日走势平稳，建议半仓买入'
  }
  if(sig==='轻仓买入'){
    return'今日建议1/3仓位试探性买入'
  }
  if(sig==='持有'){
    if(chg>2) return'今日上涨中，继续持有'
    if(chg<-2) return'今日回调但趋势未破，继续持有观察'
    return'今日走势平稳，建议继续持有'
  }
  return'今日暂无明显买入信号，建议观望'
}

function futurePrediction(s){
  if(s.suggestion==='重仓买入')return'低位区+MA5>MA10多头排列+强信号，未来1-2日有望继续走强，建议全仓买入'
  if(s.suggestion==='买入')return'低位区出现买点信号，趋势企稳，未来1-2日看好，建议半仓买入'
  if(s.suggestion==='轻仓买入')return'中位区有趋势但信号不够强，未来1-2日存在不确定性，建议1/3仓位试探'
  if(s.suggestion==='持有')return'趋势向上但无明确买入信号，未来1-2日大概率延续趋势，建议持股待涨'
  return'暂无明确买入信号，未来1-2日建议观望为主'
}

function sigColor(s){return COLORS[s.suggestion]||'#999'}
function cfgClr(v,t){return v>=t?'green':v>=t/2?'yellow':''}

// 从 K 线数据推算筹码状态（当后端未提供时）
function chipDisplay(s){
  // 如果后端提供了筹码数据，直接使用
  if(s.chipConcentration90!==void 0&&s.chipConcentration90!==null){
    var conc=s.chipConcentration90
    var peak=s.chipPeakPosition||'mid'
    var pat=s.chipPattern||'dispersed'
    return{conc:conc,peak:peak,pattern:pat}
  }
  // 用价位和趋势等信息估算
  var pos=s.pricePosition||50
  // 低位区(0-20)且无企稳→筹码分散在下方
  if(pos<20) return{conc:pos*2+30,peak:'low',pattern:'dispersed'}
  // 低位偏上(20-40)→筹码部分集中
  if(pos<40) return{conc:25,peak:'low',pattern:'double_peak'}
  // 中位(40-60)→筹码集中，单峰
  if(pos<60) return{conc:15,peak:'mid',pattern:'single_peak'}
  // 中高位(60-80)→筹码开始分散
  if(pos<80) return{conc:25,peak:'high',pattern:'double_peak'}
  // 高位(80-100)→筹码分散在高位
  return{conc:40,peak:'high',pattern:'dispersed'}
}
function gridChipLine(s,entry){
  var cd=chipDisplay(s)
  var concClr=cd.conc<=25?'green':cd.conc<=45?'yellow':'red'
  var patIcon=cd.pattern=='single_peak'?'📊':cd.pattern=='double_peak'?'📈📉':'📉'
  var peakClr=cd.peak=='low'?'green':cd.peak=='mid'?'yellow':'red'
  var peakLabel=cd.peak=='low'?'下方支撑':cd.peak=='mid'?'当前附近':'上方压力'
  return '<div class="indicator-item"><div class="label">筹码集中</div><div class="value '+concClr+'">'+cd.conc+'% '+patIcon+'</div></div>'
    +'<div class="indicator-item"><div class="label">筹码峰位</div><div class="value '+peakClr+'">'+peakLabel+'</div></div>'
}

function showDetail(i){
  selectedIdx=i
  var s=stocks[i],rt=realtimePrices[s.code]||{}
  var da=$('detailArea')
  da.style.display='block'
  da.innerHTML=buildDetail(s,rt)
  da.scrollIntoView({behavior:'smooth',block:'nearest'})
  // 高亮列表中的选中项
  renderList()
}

// ---------- 腾讯实时行情 ----------
async function fetchRealtime(codes){
  if(!codes||!codes.length)return{}
  var r={}
  for(var i=0;i<codes.length;i+=50){
    var b=codes.slice(i,i+50).map(function(c){return(c.startsWith('6')?'sh':'sz')+c}).join(',')
    try{
      var res=await fetch('https://qt.gtimg.cn/q='+b)
      var buf=await res.arrayBuffer()
      var txt=new TextDecoder('gbk').decode(buf)
      txt.split(';').forEach(function(l){
        var t=l.trim();if(!t||!t.includes('~'))return;var p=t.split('~');if(p.length<40)return
        r[p[2]]={price:parseFloat(p[3])||0,yc:parseFloat(p[4])||0,chg:parseFloat(p[31])||0,chgP:parseFloat(p[32])||0,open:parseFloat(p[5])||0,high:parseFloat(p[33])||0,low:parseFloat(p[34])||0}
      })
    }catch(e){}
  }
  return r
}

// ---------- 构建分析详情HTML（仿旧版模板） ----------
function buildDetail(s,rt){
  var rt=rt||{}
  var price=rt.price||s.currentPrice||0
  var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
  var chgClr=chg>=0?'#ef4444':'#22c55e'
  var p=s.pricePosition||0
  var posTag=posLabel(p)
  var posTClr=TAG_COLORS[posTag]||'#6b7280'
  var entry=s.entryTiming||0
  var safe=s.safetyScore||0
  var mf=s.mainForceInflow||0
  var sc=s.score||0
  var gc=s.isGoldenCross
  var bai=s.baiXiaoDays||0
  var sig=s.suggestion||'观望'
  // 前端推导信号组合（后端旧缓存可能没有）
  var comb=s.signalCombination||''
  if(!comb){
    if(sig==='重仓买入') comb=p<25?'白消启动+主升':'白消启动+强势回踩+加仓'
    else if(sig==='买入') comb=p<45?'白消启动+强势回踩':'强势回踩+主升'
    else if(sig==='轻仓买入') comb=p<50?'白消启动':'主升信号'
    else comb=''
  }
  // 前端推导机构活跃度（后端旧缓存可能没有）
  var jiGou=s.jiGouActiveScore||0
  if(!jiGou) jiGou=Math.round((entry||0)/100*20*100)/100

  // 信号标签
  var tags='<div class="signal-tags">'
    +'<span class="signal-tag" style="background:'+posTClr+'">'+posTag+' '+p.toFixed(0)+'%</span>'
    +'<span class="signal-tag" style="background:'+(gc?'#16a34a':'#6b7280')+'">MACD'+(gc?'金叉✓':'未金叉')+'</span>'
    +'<span class="signal-tag" style="background:#7c3aed">白消'+bai+'天</span>'
    +'<span class="signal-tag" style="background:'+(entry>=65?'#16a34a':entry>=35?'#ca8a04':'#dc2626')+'">'+(entry>=65?'⭐最佳':entry>=35?'📌可以':'❌不能')+'</span>'
    +(comb?'<span class="signal-tag" style="background:#0891b2">⚡ '+comb+'</span>':'')
    +'</div>'

  // 操作按钮 - 今日操作建议
  var btnColors={'重仓买入':'#dc2626','买入':'#16a34a','轻仓买入':'#ca8a04','持有':'#2563eb','观望':'#6b7280'}
  var btnColor=btnColors[sig]||'#6b7280'
  var icons={'重仓买入':'📈','买入':'📊','轻仓买入':'🔍','持有':'💼','观望':'⏸️'}
  var today=todayAdviceText(s,rt)
  var action='<div style="padding:0 12px 4px;font-size:12px;font-weight:600;color:#666">📌 今日操作建议</div><div class="action-card"><div class="action-btn" style="background:'+btnColor+'"><span class="action-label">'+icons[sig]+' '+sig+'</span><span class="action-reason">'+(sig==='重仓买入'?'全仓买入':sig==='买入'?'半仓买入':sig==='轻仓买入'?'1/3仓位':sig==='持有'?'继续持有':'观望')+'</span></div><div style="font-size:11px;color:#6b7280;padding:6px 4px 0">'+today+'</div></div>'

  // 未来预测
  var pred=futurePrediction(s)
  var future='<div class="prediction-box"><div class="label">📅 未来1-2日操作建议</div><div class="text">'+pred+'</div></div>'

  // 指标网格
  var mfClr=mf>0?'green':mf<0?'red':''
  var grid='<div style="padding:4px 12px 4px;font-size:12px;font-weight:600;color:#666">📊 技术指标</div><div class="indicator-grid">'
    +'<div class="indicator-item"><div class="label">实时价格</div><div class="value" style="color:'+chgClr+'">¥'+price.toFixed(2)+'</div></div>'
    +'<div class="indicator-item"><div class="label">涨跌幅</div><div class="value" style="color:'+chgClr+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div></div>'
    +'<div class="indicator-item"><div class="label">综合评分</div><div class="value '+(sc>=80?'green':sc>=50?'yellow':'')+'">'+sc+'/120</div></div>'
    +'<div class="indicator-item"><div class="label">入场时机</div><div class="value '+(entry>=65?'green':entry>=35?'yellow':'red')+'">'+(entry>=65?'⭐最佳':entry>=35?'📌可以':'❌不能')+'</div></div>'
    +'<div class="indicator-item"><div class="label">安全评分</div><div class="value '+(safe>=70?'green':safe>=40?'yellow':'')+'">'+(safe||0)+'分</div></div>'
    +'<div class="indicator-item"><div class="label">主力资金</div><div class="value '+mfClr+'">¥'+(mf||0).toFixed(2)+'亿</div></div>'
    +'<div class="indicator-item"><div class="label">机构活跃</div><div class="value '+(jiGou>=12?'green':jiGou>=8?'yellow':'')+'">'+(jiGou||0).toFixed(1)+'分</div></div>'
    +gridChipLine(s,entry)
    +'<div class="indicator-item"><div class="label">最高价</div><div class="value" style="color:#ef4444">'+(rt.high?rt.high.toFixed(2):'-')+'</div></div>'
    +'<div class="indicator-item"><div class="label">最低价</div><div class="value" style="color:#22c55e">'+(rt.low?rt.low.toFixed(2):'-')+'</div></div>'
    +'</div>'

  // 详情说明
  var details=[]
  if(sig==='重仓买入'){details.push('低位区'+p.toFixed(0)+'%：处于安全价位区间');details.push('MA5>MA10多头排列，趋势向上');details.push('强信号触发，技术面共振')}
  else if(sig==='买入'){details.push('低位区出现买点信号');details.push('趋势企稳回升，均线走好');details.push('成交量配合较好')}
  else if(sig==='轻仓买入'){details.push('中位区，具有一定安全边际');details.push('趋势向好但信号不强烈');details.push('建议控制仓位，设好止损')}
  else if(sig==='持有'){details.push('趋势向上，均线多头排列');details.push('无明确买入信号但形态良好');details.push('不急于卖出，持股待涨为主')}
  if(gc)details.push('MACD金叉信号，短期看多')
  if(mf>0)details.push('主力资金净流入¥'+mf.toFixed(2)+'亿')
  var detailList=details.length?'<div style="padding:4px 12px 2px;font-size:12px;font-weight:600;color:#666">📋 今日详细说明</div><div class="detail-list" style="padding:2px 12px 10px"><ul style="list-style:none;padding:0;margin:0">'+details.map(function(d){return'<li style="font-size:11px;color:#6b7280;line-height:1.8">'+d+'</li>'}).join('')+'</ul></div>':''

  return tags+action+future+grid+detailList
}

// ---------- 渲染列表 ----------
function renderList(){
  var list=$('stockList');list.innerHTML=''
  if(stocks.length===0){list.innerHTML='<div class="empty">暂无符合条件的个股</div>';$('footer').textContent='⏸️ 等待扫描';return}
  $('footer').textContent='✅ Top'+stocks.length+' | 实时行情 | 10分钟自动刷新'
  setStatus('✅ Top '+stocks.length+' 已更新')
  stocks.forEach(function(s,i){
    var rt=realtimePrices[s.code]||{}
    var price=rt.price||s.currentPrice||0
    var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
    var chgClr=chg>=0?'#ef4444':'#22c55e'
    var p=s.pricePosition||0
    var posClr=p<50?'#22c55e':p<80?'#eab308':'#ef4444'
    var sg=sigColor(s)
    var chgT=(chg>=0?'+':'')+chg.toFixed(2)+'%'
    var card=document.createElement('div');card.className='stock-card'+(selectedIdx===i?' selected':'')
    card.onclick=function(){showDetail(i)}
    card.innerHTML='<div class="stock-row"><div class="stock-info"><span class="rank-badge '+(i<3?'rank-top3':'rank-other')+'">#'+(i+1)+'</span><div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.name+'</div><div style="font-size:10px;color:#999">'+s.code+'</div></div></div><span class="signal-badge" style="background:'+sg+'">'+(s.suggestion||'-')+'</span><span class="price">'+price.toFixed(2)+'</span><span class="chg" style="color:'+chgClr+'">'+chgT+'</span><span class="pos" style="color:'+posClr+'">'+p.toFixed(0)+'%</span></div>'
    list.appendChild(card)
  })
}

// ---------- 扫描 ----------
async function doScan(){
  if(loading)return;loading=true;$('scanBtn').disabled=true;$('scanBtn').textContent='扫描中...'
  setStatus('🔄 获取分析数据...')
  try{
    var r=await fetch(API+'/gem/top/combined?force=true&_='+Date.now())
    var d=await r.json()
    if(d.code!==200||!d.data||!d.data.opportunities){
      setStatus('❌ 后端无数据');loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent=isTH()?'🔄 立即扫描':'📊 已冻结';return
    }
    stocks=d.data.opportunities
    try{localStorage.setItem('lastStocks',JSON.stringify(stocks))}catch(e){}
    setStatus('🔄 获取实时行情...')
    realtimePrices=await fetchRealtime(stocks.map(function(s){return s.code}))
    selectedIdx=-1;$('detailArea').style.display='none';renderList()
    setStatus('✅ 实时数据已更新')
  }catch(e){setStatus('❌ '+e.message)}
  loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent=isTH()?'🔄 立即扫描':'📊 已冻结'
}

// ---------- 全市场重扫（按涨幅排序抓取主板前500+创业板前500） ----------
async function doFullRescan(){
  var btn=$('rescanBtn');if(loading||btn.disabled)return
  loading=true;btn.disabled=true;btn.textContent='重扫中...'
  setStatus('🔄 按涨幅排行抓取中（主板×5页+创业板×5页并行）...')
  
  // 1. 缓存重分析（瞬间）
  var newStocks=[]
  try{
    var cr=await fetch(API+'/gem/rescan')
    var cd=await cr.json()
    newStocks=(cd.data||[]).slice()
  }catch(e){}
  setStatus('🔄 缓存已分析 '+newStocks.length+' 只，并行抓取涨幅排行...')
  
  // 2. 并行抓取多页（按涨幅降序排序）
  //    主板(hs_a)：9页×100=900只（过滤出沪深主板代码，约~500只）
  //    创业板(cyb)：5页×100=500只
  var pageTasks=[]
  var configs=[]
  for(var pi=1;pi<=9;pi++)configs.push({node:'hs_a',page:pi,desc:'主板'})
  for(var pi=1;pi<=5;pi++)configs.push({node:'cyb',page:pi,desc:'创业板'})
  
  for(var ci=0;ci<configs.length;ci++){
    var cfg=configs[ci]
    pageTasks.push(
      fetch(API+'/gem/proxy/stock-list?node='+cfg.node+'&page='+cfg.page+'&num=100&sort=changepercent&asc=0')
        .then(function(r){return r.json()})
        .then(function(d){return d.code===200?d.data||[]:[]})
        .catch(function(){return[]})
    )
  }
  
  var pagesData=await Promise.all(pageTasks)
  
  // 沪深主板代码前缀
  function isMainBoard(code){
    return /^sh(600|601|603|605)/.test(code) || /^sz(000|001|002)/.test(code)
  }
  // 创业板代码前缀
  function isGEM(code){
    return /^sz(300|301)/.test(code)
  }
  // 清洗代码：去掉sz/sh/bj前缀取数字部分
  function cleanCode(raw){
    return (raw||'').replace(/^(sz|sh|bj)/,'')
  }
  
  var seen={}
  for(var si=0;si<newStocks.length;si++)if(newStocks[si].code)seen[newStocks[si].code]=1
  
  var mainBoardCount=0, gemCount=0
  
  for(var pi2=0;pi2<pagesData.length;pi2++){
    var arr=pagesData[pi2]
    // 判断这页来自哪个节点（前9页是hs_a，后5页是cyb）
    var isHsPage=pi2<9
    for(var ii=0;ii<arr.length;ii++){
      var item=arr[ii]
      var rawCode=item.symbol||item.code||''
      var code=cleanCode(rawCode)
      var name=item.name||''
      if(!code||!name||name.startsWith('*')||name.startsWith('ST')||name.startsWith('N'))continue
      
      // 主板页只取沪深主板代码，创业板页只取创业板代码
      if(isHsPage && !isMainBoard(rawCode)) continue
      if(!isHsPage && !isGEM(rawCode)) continue
      
      // 控制数量：主板最多600，创业板最多500
      if(isHsPage && mainBoardCount>=600) continue
      if(!isHsPage && gemCount>=500) continue
      
      var price=parseFloat(item.trade)||0
      if(price<3)continue
      if(seen[code])continue
      seen[code]=1
      if(isHsPage) mainBoardCount++
      else gemCount++
      
      newStocks.push({code:code,name:name,currentPrice:price,pricePosition:50,suggestion:'持有',score:30,
        changePercent:parseFloat(item.changePercent||item.chg||'')||0,
        chipConcentration90:50,chipPeakPosition:'mid',chipPattern:'dispersed',
        isGoldenCross:false,baiXiaoDays:0,jiGouActiveScore:0})
    }
  }
  
  if(newStocks.length){
    setStatus('🔄 共 '+newStocks.length+' 只（主板'+mainBoardCount+'只+创业板'+gemCount+'只+缓存'+(newStocks.length-mainBoardCount-gemCount)+'只），排序中...')
    stocks=newStocks
    try{localStorage.setItem('lastStocks',JSON.stringify(stocks))}catch(e){}
    // 排序：信号优先级优先，再按涨幅降序
    var PRI={ '重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'观望':4,'不要介入':5 }
    stocks.sort(function(a,b){
      var pa=PRI[a.suggestion||'观望']||9,pb=PRI[b.suggestion||'观望']||9
      if(pa!==pb) return pa-pb
      // 第二排序：入场时机(高→低)
      var ea=a.entryTiming||0, eb=b.entryTiming||0
      if(eb!==ea) return eb-ea
      // 第三排序：主力资金流入(高→低)
      return (b.mainForceInflow||0)-(a.mainForceInflow||0)
    })
    // 只保留 Top20
    if(stocks.length>20) stocks=stocks.slice(0,20)
    setStatus('🔄 获取实时行情...')
    try{realtimePrices=await fetchRealtime(stocks.map(function(s){return s.code}))}catch(e){}
    selectedIdx=-1;$('detailArea').style.display='none';renderList()
    setStatus('✅ Top20 已更新 - 信号排序→入场时机→主力资金')
  }else{
    setStatus('❌ 重扫无结果')
  }
  loading=false;btn.disabled=false;btn.textContent='🌐 全市场重扫'
}

// ---------- 搜索缓存（前端代理股票列表，用于名称→代码映射） ----------
var SEARCH_CACHE=null
var SEARCH_CACHE_LOAD=null
async function getSearchCache(){
  if(SEARCH_CACHE){return SEARCH_CACHE}
  if(SEARCH_CACHE_LOAD){return SEARCH_CACHE_LOAD}
  var prom=(async function(){
    var all=[]
    // 主板：hs_a 前5页，过滤沪深主板代码
    for(var pi=1;pi<=5;pi++){
      try{
        var r=await fetch('/api/gem/proxy/stock-list?node=hs_a&page='+pi+'&num=100&sort=changepercent&asc=0')
        var d=await r.json()
        if(d.code===200&&d.data) all=all.concat(d.data.filter(function(s){
          var c=s.symbol||''
          return c.startsWith('sh600')||c.startsWith('sh601')||c.startsWith('sh603')||c.startsWith('sh605')
            ||c.startsWith('sz000')||c.startsWith('sz001')||c.startsWith('sz002')
        }))
      }catch(e){}
    }
    // 创业板：cyb 前3页
    for(var pi=1;pi<=3;pi++){
      try{
        var r=await fetch('/api/gem/proxy/stock-list?node=cyb&page='+pi+'&num=100&sort=changepercent&asc=0')
        var d=await r.json()
        if(d.code===200&&d.data) all=all.concat(d.data.filter(function(s){
          var c=s.symbol||''
          return c.startsWith('sz300')||c.startsWith('sz301')
        }))
      }catch(e){}
    }
    SEARCH_CACHE=all
    return all
  })()
  SEARCH_CACHE_LOAD=prom
  var result=await prom
  return result
}

// ---------- 前端查Tencent行情（带回真实名称+股价） ----------
async function fetchTencentDetail(code){
  if(!code||code.length<6)return null
  var market=code.startsWith('6')?'sh':'sz'
  try{
    var res=await fetch('https://qt.gtimg.cn/q='+market+code)
    var buf=await res.arrayBuffer()
    var txt=new TextDecoder('gbk').decode(buf)
    var p=txt.split('~')
    if(p.length<40||p[1]==='')return null
    return {
      name: p[1]||('股票'+code),
      code: p[2]||code,
      price: parseFloat(p[3])||0,
      yc: parseFloat(p[4])||0,
      chg: parseFloat(p[31])||0,
      chgP: parseFloat(p[32])||0
    }
  }catch(e){return null}
}

// ---------- 搜索（前端先拿真实名称+股价，再调后端分析） ----------
async function doSearch(){
  var v=$('searchInput').value.trim();if(!v)return
  var da=$('detailArea');da.style.display='none'
  var isCode=/^\d{6}$/.test(v)
  var stockName='',stockCode='',stockPrice=0,stockChgP=0
  
  // 第一步：确定代码和真实名称
  if(isCode){
    stockCode=v
    // 前端查Tencent拿真实名称+股价
    var t=await fetchTencentDetail(v)
    if(t){stockName=t.name;stockPrice=t.price;stockChgP=t.chgP}
    else{stockName='股票'+v}
  }else{
    // 名称搜索：从东方财富搜索代理查全A股
    try{
      var r=await fetch('/api/gem/proxy/search?q='+encodeURIComponent(v))
      var d=await r.json()
      var items=d&&d.data
      if(items&&items.length){
        // 取第一个A股结果（排除ETF/指数）
        var hit=items.find(function(x){return x.SecurityTypeName==='A股'||x.Code.startsWith('3')||x.Code.startsWith('6')||x.Code.startsWith('0')||x.Code.startsWith('1')})
        if(!hit)hit=items[0]
        var rawCode=hit.Code.replace(/\.(SZ|SH)$/i,'')
        stockCode=rawCode
        stockName=hit.Name||hit.Code
        // 查Tencent行情拿实时价
        var t=await fetchTencentDetail(stockCode)
        if(t){stockPrice=t.price;stockChgP=t.chgP;stockName=t.name}
        $('searchInput').value=stockName
      }
    }catch(e){}
  }
  
  // 第二步：显示基础信息
  if(stockCode){
    da.style.display='block'
    // 构建临时股票对象
    var tmpStock={
      name: stockName,
      code: stockCode,
      currentPrice: stockPrice,
      changePercent: stockChgP,
      suggestion: '查找中…',
      score: 0, entryTiming: 0, pricePosition: 0,
      safetyScore: 0, mainForceInflow: 0,
      isGoldenCross: false, baiXiaoDays: 0,
      signalCombination: '', jiGouActiveScore: 0,
      chipAnalysis: null
    }
    da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+stockName+' ('+stockCode+')</div>'
      +'<div style="padding:16px;text-align:center;color:#666;font-size:13px">⏳ 正在分析该股票……</div>'
    scrollTo(0,da.offsetTop-80)
    
    // 第三步：前端直接拉K线（用户中国浏览器→快）→ POST给后端即时分析
    try{
      da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+stockName+' ('+stockCode+')</div>'
        +'<div style="padding:16px;text-align:center;color:#666;font-size:13px">⏳ 正在拉取K线数据进行分析……</div>'
      
      // 1. 前端直接拉取新浪K线（用户中国浏览器不超时）
      var prefix='sz';if(stockCode.startsWith('6'))prefix='sh'
      var kurl='https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol='+prefix+stockCode+'&scale=240&ma=5,10,20,30,60,120&datalen=500'
      var kr=await fetch(kurl,{signal:AbortSignal.timeout(10000)})
      var kdata=await kr.json()
      if(!kdata||!kdata.length||kdata.length<50)throw new Error('K线数据不足')
      
      // 2. POST给后端即时分析
      var ar=await fetch('/api/gem/analyze',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({code:stockCode,name:stockName,kline:kdata})
      })
      var aj=await ar.json()
      if(aj.code===200&&aj.data&&aj.data.length>0){
        var o=aj.data[0]
        o.name=stockName
        o.currentPrice=o.currentPrice||stockPrice
        o.changePercent=o.changePercent||stockChgP
        da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+o.name+' ('+o.code+')</div>'+buildDetail(o,{price:stockPrice,chgP:stockChgP})
      }else{
        throw new Error('分析无结果')
      }
    }catch(e){
      // K线分析失败，兜底调后端搜索（可能慢但尽力）
      da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+stockName+' ('+stockCode+')</div>'
        +'<div style="padding:16px;text-align:center;color:#666;font-size:13px">⏳ K线分析暂不可用，切换服务器分析……</div>'
      try{
        var r2=await fetch('/api/gem/search?q='+encodeURIComponent(stockCode),{signal:AbortSignal.timeout(15000)})
        var j2=await r2.json()
        if(j2.code===200&&j2.data&&j2.data.length>0){
          var o2=j2.data[0];o2.name=stockName
          o2.currentPrice=o2.currentPrice||stockPrice
          o2.changePercent=o2.changePercent||stockChgP
          da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+o2.name+' ('+o2.code+')</div>'+buildDetail(o2,{price:stockPrice,chgP:stockChgP})
        }else{
          da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+stockName+' ('+stockCode+')</div>'
            +'<div style="padding:16px;text-align:center;color:#999;font-size:13px;line-height:1.8">'
            +'<span style="font-size:28px;display:block;margin-bottom:8px">📊</span>'
            +'股票已找到，但服务器分析超时<br>请稍后点击「立即扫描」查看最新分析结果</div>'
        }
      }catch(e2){
        da.innerHTML='<div style="font-size:13px;font-weight:600;padding:12px 0 0;color:#333">🔍 搜索 — '+stockName+' ('+stockCode+')</div>'
          +'<div style="padding:16px;text-align:center;color:#ff6b35;font-size:13px">分析请求失败，请重试</div>'
      }
    }
  }else{
    da.style.display='block'
    da.innerHTML='<div style="padding:16px;text-align:center;color:#999;font-size:13px">未找到该股票或ETF/可转债</div>'
  }
}
