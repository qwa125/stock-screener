<script>
var API='/api'
function timeoutSignal(ms){try{if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)return AbortSignal.timeout(ms)}catch(e){}

// 紧急修复：?fix=1 自动重置设备名额+清空缓存（用于毛玻璃卡死时自救）
try{
  if(location.search.indexOf('fix=1')>=0){
    (async function(){
      try{await fetch('/api/device/reset',{method:'POST'})}catch(e){}
      try{await fetch(API+'/gem/clear-cache')}catch(e){}
      location.href=location.pathname+location.hash
    })()
  }
}catch(e){}var c=new AbortController();setTimeout(function(){try{c.abort()}catch(e){}},ms);return c.signal}
var COLORS={'重仓买入':'#dc2626','买入':'#16a34a','轻仓买入':'#ca8a04','持有':'#2563eb','减仓':'#9333ea','卖出':'#dc2626','不要介入':'#6b7280'}
var TAG_COLORS={'低位区':'#16a34a','中低位':'#65a30d','中位区':'#ca8a04','中高位':'#f97316','高位区':'#dc2626'}

function getBJ(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000)}
function isTH(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return(m>=555&&m<690)||(m>=780&&m<900)}
function isCallAuction(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return m>=555&&m<565}
function freezeMsg(){var b=getBJ(),d=b.getDay(),m=b.getHours()*60+b.getMinutes();if(d===0||d===6)return'周末休市，已冻结至周一 9:25';if(m>=900)return d===5?'周五收盘，已冻结至下周一 9:25':'收盘已冻结，明早 9:25 恢复';if(m>=690&&m<780)return'午休已冻结，13:00 恢复';if(m>=555&&m<565)return'';if(m<555)return'盘前已冻结，9:25 恢复';return''}

var stocks=[],loading=false,deviceRegistered=false,realtimePrices={},lastScanTime='',intradayTimer=null,lastIntradayCode='',isDetailView=false
// 日内买卖点锁定：一旦显示，买点永不降低，卖点只升不降
var _lockedBuyPrice=null,_lockedBuyTime='',_lockedSellPrice=null,_lockedSellTime=''
// ========== 冻结快照（休盘后展示最后一次扫描结果） ==========
var FROZEN_KEY='frozenSnapshot'
function saveFrozenSnapshot(arr){
  try{localStorage.setItem(FROZEN_KEY,JSON.stringify({time:Date.now(),data:arr}))}catch(e){}
}
function loadFrozenSnapshot(){
  try{
    var raw=localStorage.getItem(FROZEN_KEY)
    if(raw){var obj=JSON.parse(raw);if(obj&&obj.data&&obj.data.length)return obj.data}
  }catch(e){}
  return null
}
// 在页面底部 init 时使用: 交易时段走 doScan()，休盘时恢复冻结快照

// ========== 设备 ID 管理 ==========
function getOrCreateDeviceId(){
  try{
    var id=localStorage.getItem('deviceId')
    if(!id){
      id=Date.now().toString(36)+Math.random().toString(36).slice(2,10)
      localStorage.setItem('deviceId',id)
    }
    return id
  }catch(e){return 'unknown-'+Date.now()}
}

// 全局 fetch 拦截：检测 429，显示名额不足提示
var _origFetch=window.fetch
window.fetch=function(u,o){
  o=o||{}
  o.headers=o.headers||{}
  if(typeof u==='string'&&u.indexOf('/api/')===0){
    if(!o.headers["X-Device-Id"]&&!o.headers["x-device-id"]){
      o.headers["X-Device-Id"]=getOrCreateDeviceId()
    }
    try{
      var adminTkn=localStorage.getItem('adminToken')
      if(adminTkn)o.headers["X-Admin-Token"]=adminTkn
    }catch(e){}
  }
  return _origFetch.call(this,u,o).then(function(r){
    if(typeof u==='string'&&u==='/api/device/register'&&r.status===429){
      showBlocked(true)
    }
    return r
  })
}
function showBlocked(isLimited){
  $("pageBlur").style.display='flex'
  if(isLimited){
    $("blurMsg").innerHTML="⚠️ 名额不足，请联系管理员增加设备访问名额"
  } else {
    $("blurMsg").innerHTML="首次访问请点击上方扫描按钮以注册设备"
  }
}
function hideBlocked(){
  $("pageBlur").style.display='none'
  deviceRegistered=true
  // 注册成功后渲染股票（如有缓存数据）
  if(stocks&&stocks.length){renderList()}
}
// 点击仅进入页面，后台autoLightScan每10分钟自然刷新
console.log('页面初始化完成')

// 毛玻璃按钮：点击注册，后端决定放行还是拒绝
async function handleBlurClick(){
  if(deviceRegistered)return
  var btn=$("pageBlur").querySelector('.blur-btn');btn.disabled=true;btn.textContent='⏳ 正在注册设备...'
  $('blurMsg').innerHTML='⏳ 首次加载较慢（服务器冷启动约30-60秒），请耐心等待...'
  try{
    var regHeaders={"X-Device-Id":getOrCreateDeviceId()};var adminTkn=localStorage.getItem('adminToken');if(adminTkn)regHeaders["X-Admin-Token"]=adminTkn
    var ac=new AbortController();var tmr=setTimeout(function(){ac.abort()},65000)
    var regRes=await fetch("/api/device/register",{method:"POST",headers:regHeaders,signal:ac.signal});clearTimeout(tmr)
    btn.disabled=false;btn.textContent='📊 点击扫描解锁'
    if(regRes.status===429){showBlocked(true);return}
    if(regRes.status!==200){showBlocked(false);return}
    hideBlocked()
  }catch(e){
    btn.disabled=false;btn.textContent='📊 点击扫描解锁'
    if(e.name==='AbortError'){
      $('blurMsg').innerHTML='⏳ 服务器正在启动（冷启动需要30-60秒），请再点击一次重试'
    }else{
      $('blurMsg').innerHTML='⚠️ 服务器连接失败，请检查网络后重试'
    }
  }
}
// 主页面扫描按钮：立即触发扫描
function handleScanClick(){
  if(isDetailView){alert('详情中不可使用扫描功能，请先退出详情');return}
  if(loading||_autoScanning)return
  autoLightScan()
}
function $(id){return document.getElementById(id)}
// 全市场重扫：浏览器从新浪拉全部A股+批量K线推送后端分析（国内访问不超时）
var _rescanAll=false
async function handleRescanClick(){
  if(_rescanAll||loading)return
  _rescanAll=true
  var btn=$('rescanBtn')
  var prog=$('rescanProgress')
  var bar=$('rescanBar')
  var txt=$('rescanText')
  if(btn)btn.textContent='⏳ 全市场重扫中...'
  if(prog)prog.style.display='block'
  if(!deviceRegistered){showBlocked(true);return}
  try{
  // ② 按涨跌幅排序取热门股（主板前500 + 创业板前500）
    setStatus('正在获取热门A股...')
    txt.textContent='获取涨跌幅排行中...'
    async function fetchNodePages(node,pages,label){
      var all=[]
      for(var p=1;p<=pages;p++){
        txt.textContent='获取 '+label+' 涨跌幅排行 '+p+'/'+pages+' 页...'
        try{
          var src=await fetch('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+p+'&num=100&sort=changepercent&asc=0&node='+node)
            .then(function(r){return r.text()})

// 浏览器拉K线 → 推送到后端分析（已修复字段名和格式）
async function fetchKlineAndAnalyze(s){
  try{
    var code=s.code,pname=s.name||''
    var curPrice=parseFloat(s.trade)||parseFloat(s.price)||0
    var chg=parseFloat(s.changepercent)||parseFloat(s.chg)||0
    if(!curPrice)return
    var openPrice=parseFloat(s.open)||0
    var gapPercent=0
    if(openPrice>0&&chg!==0){
      var prevClose=curPrice/(1+chg/100)
      gapPercent=Math.round((openPrice/prevClose-1)*1000)/10
    }

    // 多源K线强制拉取：东财→新浪→腾讯（必须拉到至少5条）
    var klines=null
    if(!window._klineCache)window._klineCache={}
    if(!window._emFailCount)window._emFailCount={}
    var _hasCache=window._klineCache[code]&&window._klineCache[code].length>=10
    var _failCnt=window._emFailCount[code]||0
    var lmt=_hasCache?(_failCnt>0?Math.min(120,Math.max(10,_failCnt*2+5)):2):120
    var emCode=code.startsWith('6')?'1.'+code:'0.'+code
    var sinCode=(code.startsWith('6')?'sh':'sz')+code
    var gtCode=sinCode  // 腾讯同sinCode格式
    try{
      var ac=new AbortController()
      var tid=setTimeout(function(){ac.abort()},8000)
      var kr=await fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+emCode+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt='+lmt,{signal:ac.signal,mode:'cors'}).then(function(r){return r.json()})
      clearTimeout(tid)
      if(kr&&kr.data&&kr.data.klines){
        window._emFailCount[code]=0
        var _newLines=kr.data.klines.map(function(l){var p=l.split(',');return{day:p[0],open:parseFloat(p[1]),close:parseFloat(p[2]),high:parseFloat(p[3]),low:parseFloat(p[4]),volume:parseFloat(p[5]),amount:parseFloat(p[6])||0}})
        if(_hasCache){
          var _merged={}
          window._klineCache[code].forEach(function(k){_merged[k.day]=k})
          _newLines.forEach(function(k){_merged[k.day]=k})
          klines=Object.values(_merged).sort(function(a,b){return a.day.localeCompare(b.day)})
        }else{klines=_newLines}
        window._klineCache[code]=klines
      }
    }catch(e){console.warn('东财K线失败('+code+'):',e.message);window._emFailCount[code]=(window._emFailCount[code]||0)+1}
    // 新浪回退
    if(!klines||klines.length<5){
      try{
        var ac2=new AbortController()
        var tid2=setTimeout(function(){ac2.abort()},8000)
        var sr=await fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/TechnicalService.getStocksKline?symbol='+sinCode+'&datalen=120&scale=240',{signal:ac2.signal}).then(function(r){return r.json()})
        clearTimeout(tid2)
        if(sr&&sr.data&&sr.data.length){
          klines=sr.data.map(function(l){return{day:l.day,open:parseFloat(l.open),close:parseFloat(l.close),high:parseFloat(l.high),low:parseFloat(l.low),volume:parseFloat(l.volume),amount:parseFloat(l.amount)||0}})
          window._klineCache[code]=klines
        }
      }catch(e){console.warn('新浪K线失败('+code+'):',e.message)}
    }
    // 腾讯回退
    if(!klines||klines.length<5){
      try{
        var ac3=new AbortController()
        var tid3=setTimeout(function(){ac3.abort()},8000)
        var tr=await fetch('https://web.ifzq.gtimg.cn/appstock/app/kline/mkline?param='+gtCode+',m5,,120',{signal:ac3.signal}).then(function(r){return r.text()})
        clearTimeout(tid3)
        tr=tr.replace(/^var\s+\S+\s*=\s*/,'').replace(/;$/,'')
        var tj=JSON.parse(tr)
        if(tj&&tj.data&&tj.data[gtCode]&&tj.data[gtCode].m5){
          klines=tj.data[gtCode].m5.map(function(l){return{day:l[0],open:parseFloat(l[1]),close:parseFloat(l[2]),high:parseFloat(l[3]),low:parseFloat(l[4]),volume:parseFloat(l[5])||0}})
          window._klineCache[code]=klines
        }
      }catch(e){console.warn('腾讯K线失败('+code+'):',e.message)}
    }
    // 如果所有来源都失败，1.5秒后重试东财一次
    if(!klines||klines.length<5){
      try{
        await new Promise(function(r){setTimeout(r,1500)})
        var ac4=new AbortController()
        var tid4=setTimeout(function(){ac4.abort()},10000)
        var kr2=await fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+emCode+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt='+lmt,{signal:ac4.signal,mode:'cors'}).then(function(r){return r.json()})
        clearTimeout(tid4)
        if(kr2&&kr2.data&&kr2.data.klines){
          window._emFailCount[code]=0
          var _newL=kr2.data.klines.map(function(l){var p=l.split(',');return{day:p[0],open:parseFloat(p[1]),close:parseFloat(p[2]),high:parseFloat(p[3]),low:parseFloat(p[4]),volume:parseFloat(p[5]),amount:parseFloat(p[6])||0}})
          if(_hasCache){
            var _merged={}
            window._klineCache[code].forEach(function(k){_merged[k.day]=k})
            _newL.forEach(function(k){_merged[k.day]=k})
            klines=Object.values(_merged).sort(function(a,b){return a.day.localeCompare(b.day)})
          }else{klines=_newL}
          window._klineCache[code]=klines
        }
      }catch(e){console.warn('东财重试也失败('+code+'):',e.message)}
    }

    // 已有缓存分析结果的股跳过API调用（只更新K线缓存，doFullRescan会读取最新缓存）
    if(window._cachedStockSet&&window._cachedStockSet.has(code)){
      console.log('[scan] skip backend',code,'(cached)')
    }else{
      var payload={ code, name:pname, price:curPrice, changePercent:chg, inflow:0, gapPercent }
      if(klines&&klines.length>=5)payload.kline=klines
      await fetch(API+'/gem/analyze',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      }).then(function(r){return r.json()})
    }
  }catch(e){/* 静默跳过 */}
}

    var confBadge=conf==='高'?'<span style="background:#22c55e;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px">高置信度</span>':conf==='中'?'<span style="background:#eab308;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px">中置信度</span>':'<span style="background:#94a3b8;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px">低置信度</span>'
    var detailHtml=detail?'<br><span style="font-size:11px;color:#94a3b8">'+detail.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</span>':''
    return dirEmoji+' '+dir+confBadge+detailHtml
  }
  // 降级：使用trendPrediction
  if(s.trendPrediction){
    var tp=s.trendPrediction

    var score=tp.score||0
    var directionEmoji=''

    else if(dir==='强烈看跌')directionEmoji='🔻'
    else directionEmoji='➖'
    var reason=tp.reason||''
    var reasonHtml=reason?'<br><span style="font-size:11px;color:#94a3b8">('+reason+')</span>':''
    return directionEmoji+' '+dir+'（评分：'+score+'分）'+reasonHtml
  }
  // 无预测数据时简单提示
  if(s.suggestion==='重仓买入')return'低位区+MA5>MA10多头排列+强信号，未来1-2日有望继续走强，建议全仓买入'
  if(s.suggestion==='买入')return'低位区出现买点信号，趋势企稳，未来1-2日看好，建议半仓买入'
  if(s.suggestion==='轻仓买入')return'中位区有趋势但信号不够强，未来1-2日存在不确定性，建议1/3仓位试探'
  if(s.suggestion==='持有')return'趋势向上但无明确买入信号，未来1-2日大概率延续趋势，建议持股待涨'
  if(s.suggestion==='减仓')return'风险信号出现，未来1-2日建议减仓回避'
  if(s.suggestion==='卖出')return'卖出信号确定，未来1-2日风险较大，观望为主'
  if(s.suggestion==='不要介入')return'下跌趋势+卖出锁定，未来1-2日不介入，等待企稳'
  return'暂无明确信号，未来1-2日等待方向选择'
}

window._auctionDataCache={} // {code: {auctionVolume,auctionAmount,auctionUnmatched,auctionDirection,gap,volumeRatio}}

/** 批量抓取集合竞价详情（限并发） */
async function fetchAuctionData(codes,limit){
  if(!codes||!codes.length)return
  limit=limit||5
  var results={}
  // 分批并发 fetch，每批 limit 只
  for(var i=0;i<codes.length;i+=limit){
    var batch=codes.slice(i,i+limit)
    var promises=batch.map(async function(code){
      try{
        var secId2=code>='600000'?'1.':'0.'
        var emUrl='https://push2.eastmoney.com/api/qt/stock/get?secid='+secId2+code+'&fields=f50,f257,f258,f259,f260&ut=bd1d9ddb04089700cf9c27f6f7426281'
        var r=await fetch(emUrl,{mode:'cors',signal:timeoutSignal(8000)})
        var d=await r.json()
        var dd=d&&d.data
        if(dd){
          var a={
            volumeRatio:dd.f50?Math.round(dd.f50/100*10)/10:0,
            auctionVolume:dd.f257,
            auctionAmount:dd.f258,
            auctionUnmatched:dd.f259,
            auctionDirection:dd.f260
          }
          // gap从已有的Sina缓存算
          var _em=window._cachedSinaEMData||[]
          var _s=_em.find(function(x){return String(x.f12)===String(code)})
          if(_s&&_s.f17){
            var _price=parseFloat(_s.f2)||0,_chg=parseFloat(_s.f3)||0
            if(_price&&_chg){
              var _prev=_price/(1+_chg/100)
              a.gap=Math.round((parseFloat(_s.f17)/_prev-1)*1000)/10
            }
          }
          results[String(code)]=a
        }
      }catch(e){/* silent */}
    })
    await Promise.all(promises)
  }
  window._auctionDataCache={...window._auctionDataCache,...results}
  // 立即写入后端缓存
  var _acList=Object.keys(results).map(function(c){return {code:c,auction:results[c]}})
  if(_acList.length) fetch(API+'/gem/update-upgraded',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({list:_acList})
  }).catch(function(){})}

/** 综合研判函数：把集合竞价数据+日K位置+板块热度综合成结论 */
function auctionJudge(code,stock){
  var a=(window._auctionDataCache||{})[String(code)]
  if(!a){
    // 没有详情数据则退回到简单gap判断
    return _simpleGapJudge(code)
  }
  var gap=a.gap||0,gapAbs=Math.abs(gap)
  var pos=(stock&&stock.pricePosition)||50
  var isHot=stock&&(stock.capitalRank||0)<20
  var judge={dir:'观望',sig:'neutral',color:'#6b7280',detail:[],short:''}
  
  // 集合竞价成交量活跃度
  var hasAuctionVol=a.auctionVolume&&a.auctionVolume>0
  var unmatched=a.auctionUnmatched // 正=买剩(多头强) 负=卖剩(空头强)
  var dirCode=a.auctionDirection   // 1=买剩 2=卖剩
  
  if(gapAbs<0.5){
    // ── 平开 ──
    judge.dir='→ 平开'
    judge.color='#6b7280'
    if(pos<30) judge.detail.push('低位区,关注')
    else if(pos>70) judge.detail.push('高位区,谨慎')
    else judge.detail.push('观望')
  }else if(gap>0){
    // ── 高开 ──
    if(dirCode===1&&unmatched>0){
      // 真强：买盘剩
      if(pos<50){judge.dir='↑ 强势高开';judge.sig='buy';judge.color='#dc2626';judge.detail.push('未匹配买盘充足')}
      else{judge.dir='↑ 高开放量';judge.sig='watch';judge.color='#ef4444';judge.detail.push('买盘积极,但位置偏高')}
      judge.detail.push('竞价活跃')
    }else if(dirCode===2&&unmatched<0){
      // 假强：卖盘剩
      judge.dir='↑ 高开诱多';judge.sig='caution';judge.color='#ea580c'
      judge.detail.push('卖压未消化,警惕回落')
    }else{
      judge.dir='↑ 高开';judge.sig='watch';judge.color='#ef4444'
      judge.detail.push('注意冲高回落')
    }
    if(pos>70) judge.detail.push('高位区')
    if(isHot) judge.detail.push('板块热')
  }else{
    // ── 低开 ──
    if(dirCode===2&&unmatched<0){
      // 真弱：卖盘剩
      if(pos>50){judge.dir='↓ 弱势低开';judge.sig='sell';judge.color='#22c55e';judge.detail.push('资金出逃')}
      else{judge.dir='↓ 低开';judge.sig='caution';judge.color='#22c55e';judge.detail.push('卖压沉重')}
    }else if(dirCode===1&&unmatched>0){
      // 假弱：买盘剩 => 洗盘吸筹
      judge.dir='↓ 低开洗盘';judge.sig='buy_weak';judge.color='#059669'
      judge.detail.push('未匹配买盘抄底')
      judge.detail.push('可关注低吸')
    }else{
      judge.dir='↓ 低开';judge.sig='watch';judge.color='#22c55e'
      judge.detail.push('注意探底回升')
    }
    if(pos<30) judge.detail.push('低位区')
    if(isHot) judge.detail.push('板块热')
  }
  // 量比辅助
  if(a.volumeRatio&&a.volumeRatio>2) judge.detail.push('放量×'+a.volumeRatio.toFixed(1))
  else if(a.volumeRatio&&a.volumeRatio<0.5) judge.detail.push('缩量×'+a.volumeRatio.toFixed(1))
  if(gapAbs>3) judge.detail.push('跳空>3%')
  if(a.volumeRatio&&a.volumeRatio>2) judge.detail.push('放量×'+a.volumeRatio.toFixed(1))
  else if(a.volumeRatio&&a.volumeRatio<0.5) judge.detail.push('缩量×'+a.volumeRatio.toFixed(1))
  judge.short=judge.detail.slice(0,2).join('·')
  return judge
}

/** 回退：简单gap方向判断 */
function _simpleGapJudge(code){
  var _em=window._cachedSinaEMData||[]
  var _s=_em.find(function(x){return String(x.f12)===String(code)})
  if(!_s||!_s.f17)return null
  var _price=parseFloat(_s.f2)||0,_chg=parseFloat(_s.f3)||0
  if(!_price||!_chg)return null
  var _prev=_price/(1+_chg/100)
  var _gap=Math.round((parseFloat(_s.f17)/_prev-1)*1000)/10
  if(Math.abs(_gap)<0.5)return{dir:'→ 平开',color:'#6b7280',short:'平开',sig:'neutral'}
  return{dir:(_gap>0?'↑ 高开':'↓ 低开'),color:(_gap>0?'#ef4444':'#22c55e'),short:(_gap>0?'高开':'低开'),sig:(_gap>0?'watch':'watch')}
}

// 前端筹码分析（从K线数据计算筹码集中度）
function calcChipAnalysis(kline){
  if(!kline||kline.length<20) return{conc:50,peak:'mid',pattern:'dispersed'}
  var closeArr=kline.map(function(k){return k.close||k.close||0})
  var highArr=kline.map(function(k){return k.high||0})
  var lowArr=kline.map(function(k){return k.low||0})
  var volArr=kline.map(function(k){return k.volume||0})
  var currentPrice=closeArr[closeArr.length-1]
  var maxH=Math.max.apply(null,highArr)
  var minL=Math.min.apply(null,lowArr)
  var range=maxH-minL
  if(range<0.01) return{conc:95,peak:'mid',pattern:'single_peak'}
  var BINS=20;var bins=[];for(var bi=0;bi<BINS;bi++)bins.push(0)
  var totalVol=0
  for(var i=Math.max(0,kline.length-120);i<kline.length;i++){
    var idx=Math.min(BINS-1,Math.floor(((closeArr[i]-minL)/range)*BINS))
    if(idx<0)idx=0
    bins[idx]+=volArr[i]
    totalVol+=volArr[i]
  }
  if(totalVol===0) return{conc:50,peak:'mid',pattern:'dispersed'}
  var sorted=[];for(var si=0;si<BINS;si++)sorted.push({bin:si,vol:bins[si]})
  sorted.sort(function(a,b){return b.vol-a.vol})
  var cum=0;var binsNeeded=0
  for(var si2=0;si2<sorted.length;si2++){
    cum+=sorted[si2].vol;binsNeeded++
    if(cum/totalVol>=0.9)break
  }
  var conc=Math.round((binsNeeded/BINS)*100)
  // 找筹码峰位置
  var peakIdx=0;var maxVol=0
  for(var pi=0;pi<BINS;pi++){if(bins[pi]>maxVol){maxVol=bins[pi];peakIdx=pi}}
  var peakPos=peakIdx/BINS
  var peakLabel=peakPos<0.33?'low':peakPos<0.66?'mid':'high'
  // 找第二峰
  var peak2Idx=-1;var maxVol2=0
  for(var pj=0;pj<BINS;pj++){
    if(pj===peakIdx)continue
    if(bins[pj]>maxVol2&&bins[pj]>maxVol*0.4){maxVol2=bins[pj];peak2Idx=pj}
  }
  var pattern=peak2Idx>=0?'double_peak':'single_peak'
  if(conc<40) pattern='dispersed'
  return{conc:conc,peak:peakLabel,pattern:pattern}
}

// 从 K 线数据推算筹码状态（当后端未提供时）
function chipDisplay(s){
  // 如果后端提供了筹码数据，直接使用
  if(s.chipConcentration90!==void 0&&s.chipConcentration90!==null&&s.chipPattern!=='dispersed'){
    var conc=s.chipConcentration90
    var peak=s.chipPeakPosition||'mid'
    var pat=s.chipPattern||'dispersed'
    return{conc:conc,peak:peak,pattern:pat}
  }
  // 如果前端已计算过芯片数据，使用前端结果
  if(s._chipAnalyzed&&s._chipConc){
    return{conc:s._chipConc,peak:s._chipPeak,pattern:s._chipPattern}
  }
  // 用价位和趋势等信息估算
  var pos=s.pricePosition??50
  // 低位区(0-20)且无企稳→筹码分散在下方
  if(pos<20) return{conc:10,peak:'low',pattern:'dispersed'}
  // 低位偏上(20-40)→筹码部分集中
  if(pos<40) return{conc:15,peak:'low',pattern:'double_peak'}
  // 中位(40-60)→筹码集中，单峰
    if(pos<60) return{conc:15,peak:'mid',pattern:'single_peak'}
  // 中高位(60-80)→筹码开始分散
    if(pos<80) return{conc:25,peak:'high',pattern:'double_peak'}
  // 高位(80-100)→筹码分散在高位
    return{conc:40,peak:'high',pattern:'dispersed'}
}

// ---------- 腾讯实时行情 ----------
async function fetchRealtime(codes){
  if(!codes||!codes.length)return{}
  var r={}
  for(var i=0;i<codes.length;i+=50){
    var batch=codes.slice(i,i+50)
    var q=batch.map(function(c){return (c.startsWith('6')?'sh':'sz')+c}).join(',')
    try{
      var res=await fetch('https://qt.gtimg.cn/q='+q)
      var buf=await res.arrayBuffer()
      var txt=decodeGBK(buf)
      var lines=txt.split(';')
      lines.forEach(function(line){
        if(line.indexOf('~')<0)return
        var p=line.split('~')
        if(p.length<35||!p[2])return
        var code=p[2]
        if(code) r[code]={price:parseFloat(p[3])||0,yc:parseFloat(p[4])||0,volume:parseFloat(p[6])||0,chg:parseFloat(p[31])||0,chgP:parseFloat(p[32])||0,open:parseFloat(p[5])||0,high:parseFloat(p[33])||0,low:parseFloat(p[34])||0}
      })
    }catch(e){}
  }
  return r
}

// ---------- 扫描（全部数据前端直调，后端仅分析） ----------
async function doScan(){
  if(!deviceRegistered)return
  if(loading)return;loading=true;$('scanBtn').disabled=true;$('scanBtn').textContent='扫描中...'
  stopPriceRefresh()
  setStatus('🔄 前端拉取全市场行情数据...')
  try{
    // 1. 前端直调Sina获取全市场股票+实时价格
    await fetchAndCacheSina()
    var emData=window._cachedSinaEMData||[]
    if(!emData.length){setStatus('❌ 无法获取行情数据');loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描';return}
    window._cachedSinaEMData=null

    // 2. 过滤候选：主板+创业板，价格>=3，剔除ST/*/N/C
    var candidates=[]
    for(var si=0;si<emData.length;si++){
      var item=emData[si],code=String(item.f12||''),name=(item.f14||'').trim()
      if(!code||!name||/^[\*STNC]/.test(name))continue
      if(!/^(60|00|30)/.test(code))continue
      var price=parseFloat(item.f2)||0
      if(price<3)continue
      candidates.push({code,name,price,chg:parseFloat(item.f3)||0})
    }
    setStatus('🔄 行情 '+candidates.length+' 只，前端拉取K线并推后端分析...')

    // 3. 分批拉取K线(前端直调东财)+推送后端纯分析(后端无外部调用)
    var bar=$('rescanBar'),txt=$('rescanText')
    for(var i=0;i<candidates.length;i+=20){
      var batch=candidates.slice(i,i+20)
      await Promise.allSettled(batch.map(function(s){return fetchKlineAndAnalyze({code:s.code,name:s.name,price:s.price,chg:s.chg})}))
      var done=Math.min(i+20,candidates.length)
      if(txt)txt.textContent='K线分析 '+done+'/'+candidates.length
      if(bar)bar.style.width=Math.round(done/candidates.length*100)+'%'
      if(i+20<candidates.length)await new Promise(function(r){setTimeout(r,100)})
    }

    // 4. 读后端缓存(纯内存，无外部调用)
    setStatus('🔄 读取分析结果...')
    window._cachedSinaEMData=emData
    await doFullRescan(true)
    window._cachedSinaEMData=null
  }catch(e){setStatus('❌ '+e.message)}
  loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描'
}

/** 后台全量同步：拉Sina → 推K线 → doFullRescan（和autoLightScan完全一致） */
async function backgroundSyncWithKline(){
  try{
    await fetchAndCacheSina()
    var emData=window._cachedSinaEMData||[]
    var mainBoard=[],gem=[]
    for(var si=0;si<emData.length;si++){
      var c=String(emData[si].f12||'')
      if(c.startsWith('60')||c.startsWith('00')){mainBoard.push(emData[si])}
      else if(c.startsWith('30')){gem.push(emData[si])}
    }
    mainBoard=mainBoard.slice(0,500);gem=gem.slice(0,500)
    var totalList=mainBoard.concat(gem)
    if(totalList.length){
      var bar=$('rescanBar'),txt=$('rescanText')
      for(var i=0;i<totalList.length;i+=20){
        var batch=totalList.slice(i,i+20)
        await Promise.allSettled(batch.map(function(s){return fetchKlineAndAnalyze({code:s.f12,name:s.f14})}))
        var done=Math.min(i+20,totalList.length)
        if(txt)txt.textContent='后台K线分析 '+done+'/'+totalList.length+' ('+Math.round(done/totalList.length*100)+'%)'
        if(bar)bar.style.width=Math.round(done/totalList.length*100)+'%'
        if(i+20<totalList.length)await new Promise(function(r){setTimeout(r,200)})
      }
    }
    await doFullRescan()
  }catch(e){console.warn('后台全量同步失败:',e.message)}
}

/** 带重试的fetch，处理429限流+502偶尔打不开+网络闪断 */
async function fetchWithRetry(url,retries){
  for(var r=0;r<retries;r++){
    try{
      var fResp=await fetch(url,{signal:timeoutSignal(20000)})
      if(fResp.ok) return fResp
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return fResp
    }catch(e){
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return null
    }
  }
  return null
}

// 拉取Sina全市场行情数据 → 存入_cachedSinaEMData（前置于doFullRescan，外部定时器可调用）
async function fetchAllSinaPages2(node){
  var all=[],promises=[]
  for(var p=1;p<=15;p++){
    promises.push(
      fetch('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+p+'&num=100&sort=changepercent&asc=0&node='+node,{signal:AbortSignal.timeout(15000)})
        .then(function(r){return r.text()})
        .then(function(src){
          src=src.replace(/^var\s+\w+\s*=\s*/,'').replace(/;$/,'')
          try{
            var d=JSON.parse(src)
            if(d&&d.length)all=all.concat(d)
          }catch(e){
            var m=src.match(/\[[\s\S]*\]/)
            if(m)try{var d2=JSON.parse(m[0]);if(d2&&d2.length)all=all.concat(d2)}catch(e2){}
          }
        })
    )
  }
  await Promise.all(promises)
  return all
}
async function fetchAndCacheSina(){
  // ★ 首选：新浪（15页×100只，按涨跌幅降序取全市场前1500只）
  var listSH,listSZ
  try{
    listSH=await fetchAllSinaPages2('sh_a'),listSZ=await fetchAllSinaPages2('sz_a')
  }catch(e){}
  var list=(listSH||[]).concat(listSZ||[]),emData=[],seenCodes={}
  if(list.length){
    for(var si=0;si<list.length;si++){
      var sc=list[si],c=String(sc.code||'')
      if(!c||seenCodes[c])continue
      seenCodes[c]=1
      emData.push({f12:c,f14:sc.name||'',f2:parseFloat(sc.trade)||0,f3:parseFloat(sc.changepercent)||0,f15:parseFloat(sc.high)||0,f16:parseFloat(sc.low)||0})
    }
  }
  // ★ 备用：东财 clist API（新浪失败时）
  if(!emData.length){
    try{
      var emr=await fetchWithRetry('https://push2.eastmoney.com/api/qt/clist/get?cb=&pn=1&pz=5000&po=1&np=1&fields=f12,f14,f2,f3,f15,f16&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048',2)
      var emd=await emr.json()
      if(emd&&emd.data&&emd.data.diff){
        emData=(emd.data.diff||[]).map(function(s){return{f12:String(s.f12||''),f14:(s.f14||'').trim(),f2:s.f2||0,f3:s.f3||0,f15:s.f15||0,f16:s.f16||0}}).filter(function(s){return s.f12&&s.f14&&!s.f14.startsWith('*')&&!s.f14.startsWith('ST')&&!s.f14.startsWith('N')&&!s.f14.startsWith('C')&&!s.f12.startsWith('688')&&!s.f12.startsWith('689')&&!s.f12.startsWith('4')&&!s.f12.startsWith('8')&&!s.f12.startsWith('920')})
      }
    }catch(e){}
  }
  window._cachedSinaEMData=emData
  window._lastScanCount=emData.length
  updateScanCount(emData.length)
  return emData
}

async function doFullRescan(saveToBackend){

  // 1. 缓存重分析（瞬间）
  var newStocks=[]
  try{
    var cr=await fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(15000)})

    newStocks=(cd.data||[]).slice()

          if(vd.code===200&&vd.data){
            var verified=0,mismatch=0
            var vmap={};for(var vi=0;vi<vd.data.length;vi++){vmap[vd.data[vi].code]=vd.data[vi]}
            var buyList=upgradeList.filter(function(u){return u.suggestion==='重仓买入'||u.suggestion==='买入'})
            for(var vi=0;vi<buyList.length;vi++){
              var bu=buyList[vi],back=vmap[bu.code]
              if(back&&back.suggestion===bu.suggestion){verified++}
              else{mismatch++}
            }
            if(mismatch===0){
              var msg='✅ 缓存验证通过: '+verified+' 只重仓买入/买入信号已同步'
              setSyncStatus(msg+' | '+new Date().toLocaleTimeString(),true)
              console.log(msg)
            }else{
              var detail=''
              for(var vi=0;vi<buyList.length&&vi<30;vi++){
                var bu=buyList[vi],back=vmap[bu.code]
                if(!back||back.suggestion!==bu.suggestion){
                  detail+=(detail?',':'')+bu.code+'('+(back?back.suggestion||'无':'无此股')+'→'+bu.suggestion+')'
                }
              }
              setSyncStatus('⚠️ 缓存验证: '+verified+' 匹配/'+mismatch+' 不匹配 ['+detail+']',false)
              console.warn('缓存验证不匹配:',verified,mismatch,detail)
            }
          }
        }catch(ve){
          console.warn('读回验证失败:',ve.message)
        }
      }else{
        setSyncStatus('❌ 写回失败: '+JSON.stringify(j),false)
        console.warn('Step③ 写回失败:',j)
      }
    }
  }catch(e){
    console.error('❌ Step③ 写回异常:', e)
  }
  // ─── Step ④: 前端同步卖出锁定到后端持久化 ───
  try{
    var sellStates=[]
    for(var si=0;si<newStocks.length;si++){
      var ss=newStocks[si]
      if(ss.suggestion==='卖出'){
        sellStates.push({code:ss.code,suggestion:ss.suggestion})
      }
    }
    if(sellStates.length>0){
      fetch(API+'/gem/sync-sell-state',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sellStates:sellStates})
      }).catch(function(){})
      console.log('🔒 前端同步 '+sellStates.length+' 只卖出锁定到后端')
    }
  }catch(e){}
  // 新数据已包含分析缓存+东方财富实时数据，不再调doScan覆盖
  // ─── 保存冻结快照（休盘后展示） ───
  saveFrozenSnapshot(stocks)
  // ─── 启动2秒实时价格刷新 ───
  startPriceRefresh(stocks)
}

var SEARCH_CACHE=null

async function getSearchCache(){

    var all=[]
    try{

        all=d.data.diff.filter(function(s){

          return c&&n&&!n.startsWith('*')&&!n.startsWith('ST')&&!n.startsWith('N')
        }).map(function(s){return{symbol:s.f12,name:s.f14}})
      }
    }catch(e){}
    // 备用：后端代理多页分片
    if(!all.length){
      try{
        var sinaAll2=[]
        for(var sp=1;sp<=15;sp++){
          var r=await fetchWithRetry('/api/gem/proxy/stock-list?node=hs_a&page='+sp+'&num=100&sort=changepercent&asc=0',3)
          if(!r)break
          var d=await r.json()
          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        for(var sp=1;sp<=6;sp++){
          var r=await fetchWithRetry('/api/gem/proxy/stock-list?node=cyb&page='+sp+'&num=100&sort=changepercent&asc=0',3)
          if(!r)break
          var d=await r.json()
          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        var seen={}
        all=[]
        for(var si=0;si<sinaAll2.length;si++){
          var sc=sinaAll2[si],c=String(sc.code||''),n=(sc.name||'').trim()
          if(!c||!n||seen[c]||n.startsWith('*')||n.startsWith('ST')||n.startsWith('N'))continue
          seen[c]=1
          if(c.startsWith('688')||c.startsWith('689')||c.startsWith('4')||c.startsWith('8')||c.startsWith('920'))continue
          all.push({symbol:c,name:n})
        }
      }catch(e2){}
    }
    SEARCH_CACHE=all
    return all
  })()
  SEARCH_CACHE_LOAD=prom
  var result=await prom
  return result
}

// ---------- GBK字节→文本（兼容iOS：TextDecoder失败则手动提取ASCII） ----------
function decodeGBK(buf){
  try{return new TextDecoder('gbk').decode(buf)}catch(e){}
  // 手动提取ASCII字符（数字/小数点/连字符/波浪号等均在ASCII范围）
  var bytes=new Uint8Array(buf),a=[]
  for(var i=0;i<bytes.length;i++) a.push(String.fromCharCode(bytes[i]))
  return a.join('')
}

var _intradayFetching={}
async function fetchIntraday(code){
  if(_intradayFetching[code])return null
  _intradayFetching[code]=true
  try{
    // 前端直调East Money拉取分钟K线（绕过后端跨境代理）
    var secId=code>='600000'?'1.':'0.'
    var mkUrl='https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+secId+code+'&fields1=f1&fields2=f51,f52,f53,f54,f55,f56,f57&klt=1&fqt=1&end=20500101&lmt=240'
    var mkRes=await fetch(mkUrl,{mode:'cors',signal:AbortSignal.timeout(12000)})
    var mkJson=await mkRes.json()
    var rawKlines=mkJson&&mkJson.data&&mkJson.data.klines||[]
    if(!rawKlines||rawKlines.length<50)return null
    // 解析K线数据
    var klineData=rawKlines.map(function(k){
      var p=k.split(',')
      return{time:p[0],open:parseFloat(p[1]),close:parseFloat(p[2]),high:parseFloat(p[3]),low:parseFloat(p[4]),volume:parseFloat(p[5]),amount:parseFloat(p[6])||0}
    })
    // POST到后端做纯分析（不跨境拉数据，只算MACD/主力散户/信号）
    var ac2=new AbortController();var tmr2=setTimeout(function(){ac2.abort()},10000)
    var r2=await fetch('/api/gem/intraday-analyze',{method:'POST',headers:{'Content-Type':'application/json','X-Device-Id':getOrCreateDeviceId()},body:JSON.stringify({code,kline:klineData}),signal:ac2.signal})
    clearTimeout(tmr2)
    var d2=await r2.json()
    window._intradayKlineCache=window._intradayKlineCache||{}
    window._intradayKlineCache[code]=klineData
    return d2&&d2.data||null
  }catch(e){return null}finally{_intradayFetching[code]=false}
}

function startIntradayRefresh(code,high,low,price){
  stopIntradayRefresh()
  // 切换股票时重置买卖点锁定
  _lockedBuyPrice=null;_lockedBuyTime='';_lockedSellPrice=null;_lockedSellTime=''
  if(!isTH()){
    // 非交易时段：渲染一次（无轮询），展示完整的做T指标系统
    refreshDetailPrice(code,low,high,price)
    return
  }
  refreshDetailPrice(code,low,high,price) // 立即执行一次
  intradayTimer=setInterval(function(){
    var _rp=realtimePrices[code]
    refreshDetailPrice(code,_rp&&_rp.low||low,_rp&&_rp.high||high,_rp&&_rp.price||price)
  },2000)
}
function stopIntradayRefresh(){
  if(intradayTimer){clearInterval(intradayTimer);intradayTimer=null}
}

var priceTimer=null,marketTimer=null

// ========== 市场状态 ==========
async function fetchMarketState(){
  try{
    var r=await fetch(API+'/gem/market-state',{signal:timeoutSignal(5000)})
    var d=await r.json()
    if(d.code===200&&d.data){
      var st=d.data
      var bar=$('marketStateBar'),footerState=$('marketStateFooter')
      var fm=$('freezeMsg'),statusEl=$('status')
      
      // 市场状态栏
      var statusColors={trading:'#16a34a',lunch:'#ca8a04',closed:'#6b7280',premarket:'#2563eb'}
      var statusLabels={trading:'📈 交易中',lunch:'☕ 午休中',closed:'🔒 已收盘',premarket:'⏳ 盘前准备'}
      var statusColor=statusColors[st.status]||'#6b7280'
      var statusLabel=statusLabels[st.status]||'未知'
      
      if(st.status==='closed'||st.status==='lunch'||st.status==='premarket'){
        bar.style.display='block'
        bar.style.background='#fefce8'
        bar.style.border='1px solid #fde68a'
        bar.style.color='#a16207'
        bar.textContent=statusLabel+(st.lockUntilStr?' · 锁定至 '+st.lockUntilStr:'')
        if(footerState) footerState.textContent='🔒 '+st.status
      }else{
        bar.style.display='block'
        bar.style.background='#f0fdf4'
        bar.style.border='1px solid #86efac'
        bar.style.color='#166534'
        bar.textContent=statusLabel+(st.nextScanStr?' · 下次扫描 '+st.nextScanStr:'')+' ｜ '+st.lastScanCount+'只缓存'
        if(footerState) footerState.textContent='📈 '+st.beijingTime
      }
      
      // 更新冻结横幅
      var f=freezeMsg()
      if(fm){
        fm.style.display=f?'block':'none'
        fm.textContent=f
      }
      
      return st
    }
  }catch(e){}
  return null
}

function startPriceRefresh(stks){
  if(stks&&stks.length>0){
    stopPriceRefresh()
    // 市场状态轮询（每30秒）
    marketTimer=setInterval(function(){fetchMarketState()},30000)
    fetchMarketState() // 立即执行一次
    
    // 实时价格轮询（每2秒）
    priceTimer=setInterval(function(){
      if(!isTH()){
        // 非交易时间停止价格刷新，但继续更新市场状态
        // 非交易时间停止价格刷新，但按钮仍可手动点击
        $('scanBtn').textContent='🔄 立即扫描'
        return
      }
      if(stocks.length>0){
        var codes=stocks.map(function(s){return s.code})
        fetchRealtime(codes).then(function(rt){
          realtimePrices=rt
          // 直接在DOM上更新价格元素（不重绘整个列表）
          var cards=$('stockList').querySelectorAll('.stock-card')
          cards.forEach(function(card,i){
            if(i>=stocks.length)return
            var s=stocks[i],rt=realtimePrices[s.code]||{}
            var price=rt.price||s.currentPrice||0
            var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
            var chgClr=chg>=0?'#ef4444':'#22c55e'
            var chgT=(chg>=0?'+':'')+chg.toFixed(2)+'%'
            // 查找股价和涨幅元素
            var spans=card.querySelectorAll('.stock-row span')
            // 结构: rank-badge | info | signal-badge | price | chg | pos
            var priceSpan=spans[2],chgSpan=spans[3]
            if(priceSpan){
              priceSpan.textContent=price.toFixed(2)
            }
            if(chgSpan){
              chgSpan.textContent=chgT
              chgSpan.style.color=chgClr
            }
          })
        }).catch(function(){})
      }
    },2000)
  }
}
function stopPriceRefresh(){
  if(priceTimer){clearInterval(priceTimer);priceTimer=null}
  if(marketTimer){clearInterval(marketTimer);marketTimer=null}
}

async function loadAdminDashboard(){

    var devices=(devData&&devData.data&&devData.data.devices)||[]

    var html='<div class="admin-stat">'
      +'<div class="stat-box"><div class="num">'+registered+'</div><div class="lbl">已注册设备</div></div>'

      +'<div class="stat-box"><div class="num" style="color:'+(registered>=maxSlots?'#ef4444':'#16a34a')+'">'+Math.round((maxSlots>0?registered/maxSlots:0)*100)+'%</div><div class="lbl">使用率</div></div>'

      +'<label style="font-size:12px;color:#6b7280;white-space:nowrap">最大设备数：</label>'
      +'<input class="num-input" id="maxSlotsInput" type="number" min="1" max="10000" value="'+maxSlots+'">'
      +'<button class="btn btn-primary btn-sm" onclick="updateMaxSlots()">更新</button>'
      +'</div>'

    // 管理员令牌
    var curToken=''
    try{curToken=localStorage.getItem('adminToken')||''}catch(e){}
    html+='<div class="admin-row" style="margin-top:8px">'
      +'<label style="font-size:12px;color:#6b7280;white-space:nowrap">管理员令牌：</label>'
      +'<input class="num-input" id="adminTokenInput" type="text" style="flex:1;min-width:0" placeholder="默认 admin2025" value="'+curToken+'">'
      +'<button class="btn btn-primary btn-sm" onclick="saveAdminToken()">保存</button>'
      +'<span id="adminTokenStatus" style="font-size:12px;margin-left:4px"></span>'

async function updateMaxSlots(){
  var val=parseInt(ad('maxSlotsInput').value)||10
  try{
    var r=await fetch('/api/auth/max-slots',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({maxSlots:val})})
    var d=await r.json()
    if(d.ok||d.code===200){loadAdminDashboard()}
    else{alert('更新失败: '+(d.msg||'unknown'))}
  }catch(e){alert('请求失败: '+e.message)}
}

// 保存管理员令牌到localStorage，所有请求自动附带 X-Admin-Token 头，免设备名额
function saveAdminToken(){
  var val=ad('adminTokenInput')?ad('adminTokenInput').value.trim():''
  var st=ad('adminTokenStatus')
  try{
    if(val){
      localStorage.setItem('adminToken',val)
      // 立即验证
      fetch('/api/device/verify-token',{headers:{'X-Admin-Token':val}}).then(function(r){return r.json()}).then(function(j){
        if(st){
          if(j.valid){
            st.innerHTML='<span style="color:#16a34a;font-weight:600">✅ 令牌有效</span>'
          }else{
            st.innerHTML='<span style="color:#ef4444;font-weight:600">❌ 令牌无效（默认: admin2025）</span>'
          }
        }
      }).catch(function(){if(st)st.innerHTML='<span style="color:#999">⏳ 验证失败</span>'})
    }else{
      localStorage.removeItem('adminToken')
      if(st)st.innerHTML='<span style="color:#999">已清除</span>'
    }
  }catch(e){alert('保存失败: '+e.message)}
}
function verifyAdminToken(tok){
  if(!tok)return
  var st=ad('adminTokenStatus')
  if(st)st.innerHTML='<span style="color:#999">⏳ 验证中…</span>'
  fetch('/api/device/verify-token',{headers:{'X-Admin-Token':tok}}).then(function(r){return r.json()}).then(function(j){
    if(st){
      if(j.valid){
        st.innerHTML='<span style="color:#16a34a;font-weight:600">✅ 令牌有效 (👑 管理员)</span>'
      }else{
        st.innerHTML='<span style="color:#ef4444;font-weight:600">❌ 令牌无效</span>'
      }
    }
  }).catch(function(){if(st)st.innerHTML='<span style="color:#999">⏳ 验证失败</span>'})
}

async function removeDevice(idx){

    else{alert('删除失败: '+(d.msg||'未知错误'))}

async function editRemark(idx){

// 修改密码
function changeAdminPwd(){
  var old=prompt('请输入当前密码：')
  if(old===null)return
  if(old!==ADMIN_DEFAULT_PWD){alert('当前密码错误');return}
  var newPwd=prompt('请输入新密码（至少4个字符）：')
  if(!newPwd||newPwd.length<4){alert('密码至少4个字符');return}
  var confirmPwd=prompt('请再次输入新密码：')
  if(newPwd!==confirmPwd){alert('两次密码不一致');return}
  try{
    localStorage.setItem('adminPassword',newPwd)
    ADMIN_DEFAULT_PWD=newPwd
    alert('✅ 密码已修改为：'+newPwd+'\n请牢记新密码！')
  }catch(e){alert('保存失败: '+e.message)}
}
