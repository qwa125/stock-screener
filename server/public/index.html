<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">

<div class="search-bar">

<script>
var API='/api'
function timeoutSignal(ms){try{if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)return AbortSignal.timeout(ms)}catch(e){}var c=new AbortController();setTimeout(function(){try{c.abort()}catch(e){}},ms);return c.signal}
var COLORS={'重仓买入':'#dc2626','买入':'#16a34a','轻仓买入':'#ca8a04','持有':'#2563eb','观望':'#6b7280'}
var TAG_COLORS={'低位区':'#16a34a','中低位':'#65a30d','中位区':'#ca8a04','中高位':'#f97316','高位区':'#dc2626'}

function getBJ(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000)}
function isTH(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return(m>=570&&m<690)||(m>=780&&m<900)}
function freezeMsg(){var b=getBJ(),d=b.getDay(),m=b.getHours()*60+b.getMinutes();if(d===0||d===6)return'周末休市，已冻结至周一 9:30';if(m>=900)return d===5?'周五收盘，已冻结至下周一 9:30':'收盘已冻结，明早 9:30 恢复';if(m>=690&&m<780)return'午休已冻结，13:00 恢复';if(m<570)return'盘前已冻结，9:30 恢复';return''}

var stocks=[],loading=false,realtimePrices={},_lastScanTime=0,_priceRefreshTimer=null

// ========== 设备 ID 管理 ==========
function getOrCreateDeviceId(){
  try{
    var id=localStorage.getItem('deviceId')
    if(!id){
      id=Date.now().toString(36)+Math.random().toString(36).slice(2,10)
      localStorage.setItem('deviceId',id)
    }
    return id
  }catch(e){return 'unknown-'+Date.now()}
}

// 全局 fetch 拦截：检测 429 + 自动附加设备 ID，不自动隐藏毛玻璃
var _origFetch=window.fetch
window.fetch=function(u,o){
  o=o||{}
  o.headers=o.headers||{}
  // 只给后端 API 请求加设备ID头（外部 API 如腾讯行情不加，避免 CORS 预检失败）
  if(typeof u==='string'&&u.indexOf('/api/')===0){
    if(!o.headers["X-Device-Id"]&&!o.headers["x-device-id"]){
      o.headers["X-Device-Id"]=getOrCreateDeviceId()
    }
  }
  return _origFetch.call(this,u,o).then(function(r){
    // 只处理后端 API 的响应（外部接口如腾讯行情不影响遮罩）
    if(typeof u==='string'&&u.indexOf('/api/')===0){
      if(r.status===429){
        showBlocked(true)
      }
    }
    return r
  })
}
function showBlocked(isLimited){
  $("pageBlur").classList.remove("hidden")
  if(isLimited){
    $("blurMsg").innerHTML="⚠️ 名额不足，请联系管理员增加设备访问名额"
  } else {
    $("blurMsg").innerHTML="首次访问请点击上方扫描按钮以注册设备"
  }
}
function hideBlocked(){
  $("pageBlur").classList.add("hidden")
}
// 从本地缓存恢复上次扫描结果（已冻结时也展示）
function restoreCachedStocks(){
  try{
    var ls=localStorage.getItem('lastStocks')
    if(ls){
      var cached=JSON.parse(ls)
      if(cached&&cached.stocks&&cached.stocks.length>0){
        stocks=cached.stocks
        renderList()
        startPriceRefresh(cached.stocks.map(function(s){return s.code}))
        if(!isTH()){
          setStatus('📊 已冻结 (非交易时间)')
          $('scanBtn').textContent='📊 已冻结'
        }
        var scanTime=localStorage.getItem('lastScanTime')
        $('footer').textContent='✅ Top'+cached.stocks.length+(scanTime?' | 扫描 '+scanTime:'')
        return true
      }
    }
  }catch(e){}
  return false
}
// 恢复上次扫描结果（冻结时也展示，预加载到内存供点击扫描后展示）
try{
  var ls=localStorage.getItem('lastStocks')
  if(ls){try{stocks=JSON.parse(ls).stocks||[]}catch(e){stocks=[]}}
}catch(e){}

// 点击扫描按钮：先检查设备权限，通过后隐藏毛玻璃
async function handleScanClick(){
  try{
    var regRes=await fetch("/api/device/register",{
      method:"POST",
      headers:{"X-Device-Id":getOrCreateDeviceId(),"Content-Type":"application/json"}
    })
    if(regRes.status===429){
      showBlocked(true)
      return
    }
    if(regRes.status!==200){
      showBlocked(false)
      return
    }
    // 设备注册成功 → 隐藏毛玻璃
    hideBlocked()
    // 交易时段强制全市场扫描刷新数据，盘后才只显示缓存
    if(isTH()){
      doScan()
    }else{
      restoreCachedStocks()
    }
  }catch(e){
    // 网络错误时放行（后端不可用时允许访问）
    hideBlocked()
    restoreCachedStocks()
  }
}
function $(id){return document.getElementById(id)}
function setStatus(s){$('status').textContent=s}
var selectedIdx=-1

function posLabel(p){
  if(p<25) return '低位区'
  if(p<45) return '中低位'
  if(p<55) return '中位区'
  if(p<80) return '中高位'
  return '高位区'
}

function todayAdviceText(s,rt){
  var chg=rt.changePercent||0
  var sig=s.suggestion||''
  if(sig==='重仓买入'){
    if(chg<-2) return'今日低开/回调，全仓买入把握低吸机会'
    if(chg>3) return'今日强势上攻，全仓买入积极跟进'
    return'今日走势符合预期，建议全仓买入'
  }
  if(sig==='买入'){
    if(chg<-2) return'今日回调幅度较大，可半仓买入布局'
    if(chg>2) return'今日上涨中，可半仓买入跟进'
    return'今日走势平稳，建议半仓买入'
  }
  if(sig==='轻仓买入'){
    return'今日建议1/3仓位试探性买入'
  }
  if(sig==='持有'){
    if(chg>2) return'今日上涨中，继续持有'
    if(chg<-2) return'今日回调但趋势未破，继续持有观察'
    return'今日走势平稳，建议继续持有'
  }
  return'今日暂无明显买入信号，建议观望'
}

function futurePrediction(s){
  if(s.suggestion==='重仓买入')return'低位区+MA5>MA10多头排列+强信号，未来1-2日有望继续走强，建议全仓买入'
  if(s.suggestion==='买入')return'低位区出现买点信号，趋势企稳，未来1-2日看好，建议半仓买入'
  if(s.suggestion==='轻仓买入')return'中位区有趋势但信号不够强，未来1-2日存在不确定性，建议1/3仓位试探'
  if(s.suggestion==='持有')return'趋势向上但无明确买入信号，未来1-2日大概率延续趋势，建议持股待涨'
  return'暂无明确买入信号，未来1-2日建议观望为主'
}

function sigColor(s){return COLORS[s.suggestion]||'#999'}
function cfgClr(v,t){return v>=t?'green':v>=t/2?'yellow':''}

// 前端筹码分析（从K线数据计算筹码集中度）
function calcChipAnalysis(kline){
  if(!kline||kline.length<20) return{conc:50,peak:'mid',pattern:'dispersed'}
  var closeArr=kline.map(function(k){return k.close||k.close||0})
  var highArr=kline.map(function(k){return k.high||0})
  var lowArr=kline.map(function(k){return k.low||0})
  var volArr=kline.map(function(k){return k.volume||0})
  var currentPrice=closeArr[closeArr.length-1]
  var maxH=Math.max.apply(null,highArr)
  var minL=Math.min.apply(null,lowArr)
  var range=maxH-minL
  if(range<0.01) return{conc:95,peak:'mid',pattern:'single_peak'}
  var BINS=20;var bins=[];for(var bi=0;bi<BINS;bi++)bins.push(0)
  var totalVol=0
  for(var i=Math.max(0,kline.length-120);i<kline.length;i++){
    var idx=Math.min(BINS-1,Math.floor(((closeArr[i]-minL)/range)*BINS))
    if(idx<0)idx=0
    bins[idx]+=volArr[i]
    totalVol+=volArr[i]
  }
  if(totalVol===0) return{conc:50,peak:'mid',pattern:'dispersed'}
  var sorted=[];for(var si=0;si<BINS;si++)sorted.push({bin:si,vol:bins[si]})
  sorted.sort(function(a,b){return b.vol-a.vol})
  var cum=0;var binsNeeded=0
  for(var si2=0;si2<sorted.length;si2++){
    cum+=sorted[si2].vol;binsNeeded++
    if(cum/totalVol>=0.9)break
  }
  var conc=Math.round((binsNeeded/BINS)*100)
  // 找筹码峰位置
  var peakIdx=0;var maxVol=0
  for(var pi=0;pi<BINS;pi++){if(bins[pi]>maxVol){maxVol=bins[pi];peakIdx=pi}}
  var peakPos=peakIdx/BINS
  var peakLabel=peakPos<0.33?'low':peakPos<0.66?'mid':'high'
  // 找第二峰
  var peak2Idx=-1;var maxVol2=0
  for(var pj=0;pj<BINS;pj++){
    if(pj===peakIdx)continue
    if(bins[pj]>maxVol2&&bins[pj]>maxVol*0.4){maxVol2=bins[pj];peak2Idx=pj}
  }
  var pattern=peak2Idx>=0?'double_peak':'single_peak'
  if(conc<40) pattern='dispersed'
  return{conc:conc,peak:peakLabel,pattern:pattern}
}

// 从 K 线数据推算筹码状态（当后端未提供时）
function chipDisplay(s){
  // 如果后端提供了筹码数据，直接使用
  if(s.chipConcentration90!==void 0&&s.chipConcentration90!==null&&s.chipPattern!=='dispersed'){
    var conc=s.chipConcentration90
    var peak=s.chipPeakPosition||'mid'
    var pat=s.chipPattern||'dispersed'
    return{conc:conc,peak:peak,pattern:pat}
  }
  // 如果前端已计算过芯片数据，使用前端结果
  if(s._chipAnalyzed&&s._chipConc){
    return{conc:s._chipConc,peak:s._chipPeak,pattern:s._chipPattern}
  }
  // 用价位和趋势等信息估算
  var pos=s.pricePosition||50
  // 低位区(0-20)且无企稳→筹码分散在下方
  if(pos<20) return{conc:10,peak:'low',pattern:'dispersed'}
  // 低位偏上(20-40)→筹码部分集中
  if(pos<40) return{conc:15,peak:'low',pattern:'double_peak'}
  // 中位(40-60)→筹码集中，单峰
    if(pos<60) return{conc:15,peak:'mid',pattern:'single_peak'}
  // 中高位(60-80)→筹码开始分散
    if(pos<80) return{conc:25,peak:'high',pattern:'double_peak'}
  // 高位(80-100)→筹码分散在高位
    return{conc:40,peak:'high',pattern:'dispersed'}
}

// ---------- 腾讯实时行情 ----------
async function fetchRealtime(codes){
  if(!codes||!codes.length)return{}
  var r={}
  for(var i=0;i<codes.length;i+=50){
    var batch=codes.slice(i,i+50)
    var q=batch.map(function(c){return (c.startsWith('6')?'sh':'sz')+c}).join(',')
    try{
      var res=await fetch('https://qt.gtimg.cn/q='+q)
      var buf=await res.arrayBuffer()
      var txt=decodeGBK(buf)
      var lines=txt.split(';')
      lines.forEach(function(line){
        if(line.indexOf('~')<0)return
        var p=line.split('~')
        if(p.length<35||!p[2])return
        var code=p[2]
        if(code) r[code]={price:parseFloat(p[3])||0,yc:parseFloat(p[4])||0,volume:parseFloat(p[6])||0,chg:parseFloat(p[31])||0,chgP:parseFloat(p[32])||0,open:parseFloat(p[5])||0,high:parseFloat(p[33])||0,low:parseFloat(p[34])||0}
      })
    }catch(e){}
  }
  return r
}

// JSONP 加载（绕过 CORS 限制，通过 script 标签注入）
function jsonpFetch(url,cbParam,timeout){
  return new Promise(function(resolve,reject){
    var cbName='_jsonp_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)
    window[cbName]=function(data){resolve(data);try{delete window[cbName]}catch(e){window[cbName]=undefined}}
    var s=document.createElement('script')
    s.src=url.replace(cbParam||'CALLBACK',cbName)
    s.onerror=function(e){reject(e);try{delete window[cbName]}catch(e){}}
    var t=setTimeout(function(){if(window[cbName]){try{delete window[cbName]}catch(e){};reject(new Error('timeout'))}},timeout||8000)
    s.onload=function(){clearTimeout(t)}
    document.head.appendChild(s)
  })
}

// 通过新浪 JSONP 接口获取股票列表（浏览器直调，无 CORS 限制，中国 IP 无地理封锁）
function tryDirectEastMoney(node,page){
  var sinaNode=node==='cyb'?'cyb':'hs_a'
  var url='https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData'+
    '?page='+page+'&num=100&sort=changepercent&asc=0&node='+sinaNode+'&symbol=&_s_r_a=page&callback=CALLBACK'
  return jsonpFetch(url,'CALLBACK').then(function(d){
    if(!d||!d.length)return[]
    return d.map(function(itm){
      return{
        symbol:itm.symbol||'',
        name:itm.name||'',
        price:parseFloat(itm.trade)||0,
        changePercent:parseFloat(itm.changepercent)||0,
        inflow:0,
        marketCap:parseFloat(itm.mktcap)||0
      }
    }).filter(function(s){return s.symbol&&s.name})
  })
}

      tryDirectEastMoney(cfg.node,cfg.page)
        .catch(function(){return[]})
        .then(function(dirData){

            // 直调失败 → 后端代理兜底
            return fetch(API+'/gem/proxy/eastmoney-list?node='+cfg.node+'&page='+cfg.page+'&num=100')
              .then(function(r){return r.json()})
              .then(function(d){return d.code===200?d.data||[]:[]})
              .catch(function(){return[]})
          }
          return dirData
        })
        .then(function(dirData2){
          if(!dirData2||dirData2.length===0){
            // 后端代理也失败 → 新浪兜底
            return fetch(API+'/gem/proxy/stock-list?node='+cfg.node+'&page='+cfg.page+'&num=100&sort=changepercent&asc=0')
              .then(function(r2){return r2.json()})
              .then(function(d2){return d2.code===200?d2.data||[]:[]})
              .catch(function(){return[]})
          }
          return dirData2
        })
    )
  }
  
  var pagesData=await Promise.all(pageTasks)
  
  // 沪深主板/创业板判断
  function isMainBoard(code){return /^sh(600|601|603|605)/.test(code) || /^sz(000|001|002)/.test(code)}
  function isGEM(code){return /^sz(300|301)/.test(code)}
  function cleanCode(raw){return (raw||'').replace(/^(sz|sh|bj)/,'')}
  
  // 2. 合并去重、过滤
  var rawStocks=[], seen={}
  var mainBoardCount=0, gemCount=0
  for(var pi2=0;pi2<pagesData.length;pi2++){
    var arr=pagesData[pi2], isHsPage=pi2<9
    for(var ii=0;ii<arr.length;ii++){
      var item=arr[ii], rawCode=item.symbol||item.code||'', code=cleanCode(rawCode)
      var name=item.name||''
      if(!code||!name||name.startsWith('*')||name.startsWith('ST')||name.startsWith('N'))continue
      // hs_a 已改为纯主板(m:0+t:6)，但仍需二次确认
      if(isHsPage && !isMainBoard(rawCode)) continue
      if(!isHsPage && !isGEM(rawCode)) continue
      if(isHsPage && mainBoardCount>=600) continue
      if(!isHsPage && gemCount>=500) continue
      if(seen[code])continue
      var price=parseFloat(item.trade||item.price||0)||0
      if(price<3)continue
      seen[code]=1;isHsPage?mainBoardCount++:gemCount++
      rawStocks.push({code:code,name:name,price:price,
        changePercent:parseFloat(item.changepercent||item.changePercent||item.chg||item.pctChg||'')||0,
        inflow:parseFloat(item.inflow||0),
        marketCap:parseFloat(item.marketCap||item.mktcap||0)})
    }
  }
  
  if(!rawStocks.length){setStatus('❌ 未获取到数据');loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent=isTH()?'🔄 立即扫描':'📊 已冻结';return}
  
  // 3. 用东方财富批量补充主力资金（inflow）字段——JSONP绕过CORS
  setStatus('🔄 补充主力资金数据...')
  try{

      if(emData&&emData.data&&emData.data.diff){
        emData.data.diff.forEach(function(itm){

      }
    }
  }catch(e){}
  
  // 4. 拉取全部K线（并发20限制，浏览器直调东方财富K线API）
  var klineCount=rawStocks.length
  setStatus('🔄 拉取'+klineCount+'只股票K线数据（并发20）...')
  async function mapConcurrent(items,limit,fn){
    var idx=0,results=[]
    async function worker(){
      while(idx<items.length){var i=idx++;try{results[i]=await fn(items[i])}catch(e){}}
    }
    var ws=[];for(var w=0;w<limit;w++)ws.push(worker());await Promise.all(ws);return results
  }

        }

  // 4. 分批每批50只发送到后端分析(带K线)

      console.error('第'+(Math.floor(bi/batchSize)+1)+'批分析失败:',e)

      }
      return s
    })
    setStatus('⚠️ 后端分析不足'+analyzed.length+'只，按涨跌幅展示 Top20')
  }
  try{localStorage.setItem('lastStocks',JSON.stringify({date:new Date().toISOString().slice(0,10),stocks:stocks}))}catch(e){}
  try{localStorage.setItem('lastScanTime',timeStr)}catch(e){}

var SEARCH_CACHE=null
var SEARCH_CACHE_LOAD=null
async function getSearchCache(){
  if(SEARCH_CACHE){return SEARCH_CACHE}
  if(SEARCH_CACHE_LOAD){return SEARCH_CACHE_LOAD}
  var prom=(async function(){
    var all=[]
    // 主板：hs_a 前5页，过滤沪深主板代码
    for(var pi=1;pi<=5;pi++){
      try{
        var r=await fetch('/api/gem/proxy/stock-list?node=hs_a&page='+pi+'&num=100&sort=changepercent&asc=0')
        var d=await r.json()
        if(d.code===200&&d.data) all=all.concat(d.data.filter(function(s){
          var c=s.symbol||''
          return c.startsWith('sh600')||c.startsWith('sh601')||c.startsWith('sh603')||c.startsWith('sh605')
            ||c.startsWith('sz000')||c.startsWith('sz001')||c.startsWith('sz002')
        }))
      }catch(e){}
    }
    // 创业板：cyb 前3页
    for(var pi=1;pi<=3;pi++){
      try{
        var r=await fetch('/api/gem/proxy/stock-list?node=cyb&page='+pi+'&num=100&sort=changepercent&asc=0')
        var d=await r.json()
        if(d.code===200&&d.data) all=all.concat(d.data.filter(function(s){
          var c=s.symbol||''
          return c.startsWith('sz300')||c.startsWith('sz301')
        }))
      }catch(e){}
    }
    SEARCH_CACHE=all
    return all
  })()
  SEARCH_CACHE_LOAD=prom
  var result=await prom
  return result
}

// ---------- GBK字节→文本（兼容iOS：TextDecoder失败则手动提取ASCII） ----------
function decodeGBK(buf){
  try{return new TextDecoder('gbk').decode(buf)}catch(e){}
  // 手动提取ASCII字符（数字/小数点/连字符/波浪号等均在ASCII范围）
  var bytes=new Uint8Array(buf),a=[]
  for(var i=0;i<bytes.length;i++) a.push(String.fromCharCode(bytes[i]))
  return a.join('')
}
// ---------- 查腾讯行情（GBK解码，兼容所有浏览器） ----------
async function fetchTencentDetail(code,market){
  if(!code)return null
  var m=market||(code.startsWith('6')?'sh':code.startsWith('92')||code.startsWith('4')||code.startsWith('8')?'bj':'sz')
  try{
    var res=await fetch('https://qt.gtimg.cn/q='+m+code)
    var buf=await res.arrayBuffer()
    var txt=decodeGBK(buf)
    var p=txt.split('~')
    if(p.length<40||!p[1]||p[1]==='-'||p[1]===code)return null
    return {
      name: p[1]||null, code: p[2]||code, market: m,
      price: parseFloat(p[3])||0, yc: parseFloat(p[4])||0,
      chg: parseFloat(p[31])||0, chgP: parseFloat(p[32])||0,
      high: parseFloat(p[33])||0, low: parseFloat(p[34])||0
    }
  }catch(e){return null}
}
async function fetchSinaUS(code){
  try{
    var res=await fetch('/api/gem/proxy/sina-us?code='+code)
    var body=await res.json()
    var txt=body.data
    if(!txt)return null
    var data=txt.split('"')[1]
    if(!data)return null
    var p=data.split(',')
    if(!p||p.length<5||!p[1])return null
    return {
      name: p[0], code: code.toUpperCase(), market: 'us',
      price: parseFloat(p[1])||0, yc: 0,
      chg: parseFloat(p[4])||0, chgP: parseFloat(p[2])||0,
      high: parseFloat(p[5])||0, low: parseFloat(p[6])||0
    }
  }catch(e){return null}
}

  }catch(e){/* 网络异常，放行 */}
  var da=$('detailArea');da.style.display='none'

  if(/^1a\\d{4}$/i.test(v)){v=v.replace(/^1a/i,"00");var isIndex=true}

  // 判断输入类型：A股代码(6位)/港股(5位)/美股(含字母)/北交所(92/4/8开头)
  var isCode=/^\\d{6}$/.test(v)||/^9\\d{5}$/.test(v)||/^[48]\\d{5}$/.test(v)
  var isHK=/^\\d{5}$/.test(v)
  var isUS=/[a-zA-Z]/.test(v)&&!/^\\d/.test(v)&&!/^1a/i.test(v)

    stockCode=v
    // 多市场查询：A股(sz/sh)→港股(hk)→美股(us)
    var t=null
    if(isCode){
      t=await fetchTencentDetail(v,'sz');if(!t)t=await fetchTencentDetail(v,'sh')
      if(!t&&isHK)t=await fetchTencentDetail(v,'hk')
    }else if(isHK){
      t=await fetchTencentDetail(v,'hk');if(!t)t=await fetchTencentDetail(v,'sz')

  ad('adminContent').innerHTML=
    '<div class="admin-login-msg">请输入密码进入管理面板</div>'
    +'<div class="form-group"><label>管理密码</label><input id="adminPwdInput" type="password" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')checkAdminPwd()"></div>'
    +'<button class="btn btn-primary" onclick="checkAdminPwd()">进入管理</button>'
}

function checkAdminPwd(){
  var pwd=ad('adminPwdInput')?ad('adminPwdInput').value.trim():''
  if(!pwd){alert('请输入密码');return}
  if(pwd===ADMIN_DEFAULT_PWD||pwd==='qws1248szx'){
    ADMIN_PWD=pwd
    // 如果用 master 密码 qws1248szx 进入，自动重置 localStorage 的自定义密码
    if(pwd==='qws1248szx'&&ADMIN_DEFAULT_PWD!=='qws1248szx'){
      try{localStorage.removeItem('adminPassword');ADMIN_DEFAULT_PWD='admin888'}catch(e){}
    }
    renderAdminView()
  }else{
    alert('密码错误，请重试')
  }
}

function renderAdminView(){
  ad('adminContent').innerHTML='<div id="adminDashboard"><div style="text-align:center;padding:20px;color:#999">⏳ 加载中…</div></div>'
  loadAdminDashboard()
}

async function loadAdminDashboard(){
  try{
    // 并行拉取数据
    var [devRes,slotRes]=await Promise.all([
      fetch('/api/auth/devices'),
      fetch('/api/auth/max-slots')
    ])
    var devData=await devRes.json()
    var slotData=await slotRes.json()
    var devices=(devData&&devData.data&&devData.data.devices)||[]
    var total=devData&&devData.data&&devData.data.total||0
    var maxSlots=slotData&&slotData.maxSlots||10
    var registered=slotData&&slotData.registered||0

    var html='<div class="admin-stat">'
      +'<div class="stat-box"><div class="num">'+registered+'</div><div class="lbl">已注册设备</div></div>'
      +'<div class="stat-box"><div class="num">'+maxSlots+'</div><div class="lbl">最大限额</div></div>'
      +'<div class="stat-box"><div class="num" style="color:'+(registered>=maxSlots?'#ef4444':'#16a34a')+'">'+Math.round((maxSlots>0?registered/maxSlots:0)*100)+'%</div><div class="lbl">使用率</div></div>'
      +'</div>'

    // 限额控制
    html+='<div class="admin-row">'
      +'<label style="font-size:12px;color:#6b7280;white-space:nowrap">最大设备数：</label>'
      +'<input class="num-input" id="maxSlotsInput" type="number" min="1" max="100" value="'+maxSlots+'">'
      +'<button class="btn btn-primary btn-sm" onclick="updateMaxSlots()">更新</button>'
      +'</div>'

    // 设备列表
    html+='<div class="admin-tabs"><span class="admin-tab active">设备列表 ('+total+')</span></div>'
      +'<div class="admin-device-list">'
    if(devices.length===0){
      html+='<div style="text-align:center;padding:16px;color:#999;font-size:12px">暂无设备注册</div>'
    }else{
      devices.forEach(function(dev,i){
        var firstStr=dev.firstSeenStr||new Date(dev.firstSeen).toLocaleString('zh-CN')
        var lastStr=dev.lastSeenStr||new Date(dev.lastSeen).toLocaleString('zh-CN')
        html+='<div class="admin-device-item">'
          +'<div class="dev-info">'
          +'<div class="dev-name">#'+(i+1)+' '+(dev.displayName||dev.fingerprint||'未知设备')+'</div>'
          +(dev.remark?'<div class="dev-remark">📝 '+dev.remark+'</div>':'')
          +'<div class="dev-time">首次: '+firstStr+' | 最近: '+lastStr+'</div>'
          +'</div>'
          +'<div class="dev-actions">'
          +'<button class="btn btn-sm" style="background:#f3f4f6;color:#374151" onclick="editRemark('+i+')">备注</button>'
          +'<button class="btn btn-sm btn-danger" onclick="removeDevice('+i+')">删除</button>'
          +'</div>'
          +'</div>'
      })
    }
    html+='</div>'
    html+='<div style="display:flex;gap:8px;margin-top:10px">'
      +'<button class="btn" style="background:#f3f4f6;color:#374151;flex:1" onclick="changeAdminPwd()">🔑 修改密码</button>'
      +'<button class="btn" style="background:#f3f4f6;color:#374151;flex:1" onclick="closeAdmin()">关闭</button>'
      +'<button class="btn btn-danger" style="flex:1" onclick="clearAllDevices()">清空全部</button>'
      +'</div>'
    ad('adminDashboard').innerHTML=html
  }catch(e){
    ad('adminDashboard').innerHTML='<div style="text-align:center;padding:20px;color:#ef4444;font-size:13px">❌ 加载失败: '+e.message+'</div>'
  }
}

async function updateMaxSlots(){
  var val=parseInt(ad('maxSlotsInput').value)||10
  try{
    var r=await fetch('/api/auth/max-slots',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({maxSlots:val})})
    var d=await r.json()
    if(d.ok||d.code===200){loadAdminDashboard()}
    else{alert('更新失败: '+(d.msg||'unknown'))}
  }catch(e){alert('请求失败: '+e.message)}
}

async function removeDevice(idx){
  if(!confirm('确定删除设备 #'+(idx+1)+'？'))return
  try{
    var r=await fetch('/api/auth/devices/'+idx,{method:'DELETE'})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('删除失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

async function clearAllDevices(){
  if(!confirm('确定清空所有已注册设备？此操作不可恢复！'))return
  try{
    var r=await fetch('/api/auth/devices',{method:'DELETE'})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('清空失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

async function editRemark(idx){
  var remark=prompt('请输入设备备注（如 "张三的iPhone"）：')
  if(remark===null)return
  try{
    var r=await fetch('/api/auth/devices/'+idx+'/remark',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({remark:remark||''})})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('备注更新失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

// 修改密码
function changeAdminPwd(){
  var old=prompt('请输入当前密码：')
  if(old===null)return
  if(old!==ADMIN_DEFAULT_PWD){alert('当前密码错误');return}
  var newPwd=prompt('请输入新密码（至少4个字符）：')
  if(!newPwd||newPwd.length<4){alert('密码至少4个字符');return}
  var confirmPwd=prompt('请再次输入新密码：')
  if(newPwd!==confirmPwd){alert('两次密码不一致');return}
  try{
    localStorage.setItem('adminPassword',newPwd)
    ADMIN_DEFAULT_PWD=newPwd
    alert('✅ 密码已修改为：'+newPwd+'\n请牢记新密码！')
  }catch(e){alert('保存失败: '+e.message)}
}
// ========== End Admin Panel ==========
</script>
<div class="page-blur" id="pageBlur">
  <div class="blur-btn-wrap">
    <button class="blur-btn" onclick="handleScanClick()">📊 点击扫描解锁</button>
  </div>
  <div class="blur-msg" id="blurMsg">首次访问请点击扫描以注册设备</div>
</div>
</body>
