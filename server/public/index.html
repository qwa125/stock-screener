<script>
var API='/api'
function timeoutSignal(ms){try{if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)return AbortSignal.timeout(ms)}catch(e){}

// 紧急修复：?fix=1 自动重置设备名额+清空缓存（用于毛玻璃卡死时自救）
try{
  if(location.search.indexOf('fix=1')>=0){
    (async function(){
      try{await fetch('/api/device/reset',{method:'POST'})}catch(e){}
      try{await fetch(API+'/gem/clear-cache')}catch(e){}
      location.href=location.pathname+location.hash
    })()
  }
}catch(e){}var c=new AbortController();setTimeout(function(){try{c.abort()}catch(e){}},ms);return c.signal}
var COLORS={'重仓买入':'#dc2626','买入':'#16a34a','轻仓买入':'#ca8a04','持有':'#2563eb','减仓':'#9333ea','卖出':'#dc2626','不要介入':'#6b7280'}
var TAG_COLORS={'低位区':'#16a34a','中低位':'#65a30d','中位区':'#ca8a04','中高位':'#f97316','高位区':'#dc2626'}

function getBJ(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000)}
function isTH(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return(m>=565&&m<690)||(m>=780&&m<900)}
function freezeMsg(){var b=getBJ(),d=b.getDay(),m=b.getHours()*60+b.getMinutes();if(d===0||d===6)return'周末休市，已冻结至周一 9:25';if(m>=900)return d===5?'周五收盘，已冻结至下周一 9:25':'收盘已冻结，明早 9:25 恢复';if(m>=690&&m<780)return'午休已冻结，13:00 恢复';if(m<565)return'盘前已冻结，9:25 恢复';return''}

var stocks=[],loading=false,realtimePrices={},lastScanTime='',intradayTimer=null,lastIntradayCode='',isDetailView=false
// 日内买卖点锁定：一旦显示，买点永不降低，卖点只升不降
var _lockedBuyPrice=null,_lockedBuyTime='',_lockedSellPrice=null,_lockedSellTime=''
// ========== 冻结快照（休盘后展示最后一次扫描结果） ==========
var FROZEN_KEY='frozenSnapshot'
function saveFrozenSnapshot(arr){
  try{localStorage.setItem(FROZEN_KEY,JSON.stringify({time:Date.now(),data:arr}))}catch(e){}
}
function loadFrozenSnapshot(){
  try{
    var raw=localStorage.getItem(FROZEN_KEY)
    if(raw){var obj=JSON.parse(raw);if(obj&&obj.data&&obj.data.length)return obj.data}
  }catch(e){}
  return null
}
// 在页面底部 init 时使用: 交易时段走 doScan()，休盘时恢复冻结快照

// ========== 设备 ID 管理 ==========
function getOrCreateDeviceId(){
  try{
    var id=localStorage.getItem('deviceId')
    if(!id){
      id=Date.now().toString(36)+Math.random().toString(36).slice(2,10)
      localStorage.setItem('deviceId',id)
    }
    return id
  }catch(e){return 'unknown-'+Date.now()}
}

// 全局 fetch 拦截：检测 429 + 自动附加设备 ID，不自动隐藏毛玻璃
var _origFetch=window.fetch
window.fetch=function(u,o){
  o=o||{}
  o.headers=o.headers||{}
  // 只给后端 API 请求加设备ID头（外部 API 如腾讯行情不加，避免 CORS 预检失败）
  if(typeof u==='string'&&u.indexOf('/api/')===0){
    if(!o.headers["X-Device-Id"]&&!o.headers["x-device-id"]){
      o.headers["X-Device-Id"]=getOrCreateDeviceId()
    }
    // 管理员令牌：如果 localStorage 有 adminToken，自动附带（免名额限制）
    try{
      var adminTkn=localStorage.getItem('adminToken')
      if(adminTkn)o.headers["X-Admin-Token"]=adminTkn
    }catch(e){}
  }
  return _origFetch.call(this,u,o).then(function(r){
    // 只处理后端 API 的响应（外部接口如腾讯行情不影响遮罩）
    if(typeof u==='string'&&u.indexOf('/api/')===0){
      if(r.status===429){
        showBlocked(true)
      }
    }
    return r
  })
}
function showBlocked(isLimited){
  $("pageBlur").classList.remove("hidden")
  if(isLimited){
    $("blurMsg").innerHTML="⚠️ 名额不足，请联系管理员增加设备访问名额"
  } else {
    $("blurMsg").innerHTML="首次访问请点击上方扫描按钮以注册设备"
  }
}
function hideBlocked(){
  $("pageBlur").classList.add("hidden")
}
// 点击仅进入页面，后台autoLightScan每10分钟自然刷新
console.log('页面初始化完成')

// 毛玻璃按钮：一键隐退，注册在后台静默执行
async function handleBlurClick(){
  var btn=$("pageBlur").querySelector('.blur-btn')
  if(btn.disabled)return
  if(localStorage.getItem('deviceRegistered')==='1'){
    hideBlocked();return
  }
  btn.disabled=true;btn.textContent='⏳ 验证中...'
  try{
    var regRes=await fetch("/api/device/register",{
      method:"POST",
      headers:{"X-Device-Id":getOrCreateDeviceId(),"Content-Type":"application/json"}
    })
    if(regRes.status===429){
      btn.disabled=false;btn.textContent='📊 点击扫描解锁'
      showBlocked(true);return
    }
    localStorage.setItem('deviceRegistered','1')
    hideBlocked()
  }catch(e){
    console.warn('设备注册失败:',e)
    btn.disabled=false;btn.textContent='📊 点击扫描解锁'
    $("blurMsg").innerHTML="⚠️ 服务器连接失败，请检查网络后重试"
  }
}
// 主页面扫描按钮：立即触发扫描
function handleScanClick(){
  if(isDetailView){alert('详情中不可使用扫描功能，请先退出详情');return}
  if(loading||_autoScanning)return
  autoLightScan()
}
function $(id){return document.getElementById(id)}
// 全市场重扫：浏览器从新浪拉全部A股+批量K线推送后端分析（国内访问不超时）
var _rescanAll=false
async function handleRescanClick(){
  if(_rescanAll||loading)return
  _rescanAll=true
  var btn=$('rescanBtn')
  var prog=$('rescanProgress')
  var bar=$('rescanBar')
  var txt=$('rescanText')
  if(btn)btn.textContent='⏳ 全市场重扫中...'
  if(prog)prog.style.display='block'
  try{
    var regRes=await fetch("/api/device/register",{
      method:"POST",
      headers:{"X-Device-Id":getOrCreateDeviceId(),"Content-Type":"application/json"}
    })
    if(regRes.status===429||regRes.status!==200){
      showBlocked(true);return
    }
    hideBlocked()
    // ② 按涨跌幅排序取热门股（主板前500 + 创业板前500）
    setStatus('正在获取热门A股...')
    txt.textContent='获取涨跌幅排行中...'
    async function fetchNodePages(node,pages,label){
      var all=[]
      for(var p=1;p<=pages;p++){
        txt.textContent='获取 '+label+' 涨跌幅排行 '+p+'/'+pages+' 页...'
        try{
          var src=await fetch('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+p+'&num=100&sort=changepercent&asc=0&node='+node)
            .then(function(r){return r.text()})
          src=src.replace(/^var\s+\w+\s*=\s*/,'').replace(/;$/,'')
          try{var d=JSON.parse(src);if(d&&d.length)all=all.concat(d)}catch(e){
            var m=src.match(/\[[\s\S]*\]/)
            if(m)try{var d2=JSON.parse(m[0]);if(d2&&d2.length)all=all.concat(d2)}catch(e2){}
          }
        }catch(e){
          console.warn('第'+p+'页获取失败:',e.message)
        }
        if(p<pages)await new Promise(function(r){setTimeout(r,200)})
      }
      return all
    }
    setStatus('正在抓取沪市热门股...')
    var shList=await fetchNodePages('sh_a',15,'沪市')

        }

      try{
        await new Promise(function(r){setTimeout(r,1500)})

// 前端筹码分析（从K线数据计算筹码集中度）
function calcChipAnalysis(kline){
  if(!kline||kline.length<20) return{conc:50,peak:'mid',pattern:'dispersed'}
  var closeArr=kline.map(function(k){return k.close||k.close||0})
  var highArr=kline.map(function(k){return k.high||0})
  var lowArr=kline.map(function(k){return k.low||0})
  var volArr=kline.map(function(k){return k.volume||0})
  var currentPrice=closeArr[closeArr.length-1]
  var maxH=Math.max.apply(null,highArr)
  var minL=Math.min.apply(null,lowArr)
  var range=maxH-minL
  if(range<0.01) return{conc:95,peak:'mid',pattern:'single_peak'}
  var BINS=20;var bins=[];for(var bi=0;bi<BINS;bi++)bins.push(0)
  var totalVol=0
  for(var i=Math.max(0,kline.length-120);i<kline.length;i++){
    var idx=Math.min(BINS-1,Math.floor(((closeArr[i]-minL)/range)*BINS))
    if(idx<0)idx=0
    bins[idx]+=volArr[i]
    totalVol+=volArr[i]
  }
  if(totalVol===0) return{conc:50,peak:'mid',pattern:'dispersed'}
  var sorted=[];for(var si=0;si<BINS;si++)sorted.push({bin:si,vol:bins[si]})
  sorted.sort(function(a,b){return b.vol-a.vol})
  var cum=0;var binsNeeded=0
  for(var si2=0;si2<sorted.length;si2++){
    cum+=sorted[si2].vol;binsNeeded++
    if(cum/totalVol>=0.9)break
  }
  var conc=Math.round((binsNeeded/BINS)*100)
  // 找筹码峰位置
  var peakIdx=0;var maxVol=0
  for(var pi=0;pi<BINS;pi++){if(bins[pi]>maxVol){maxVol=bins[pi];peakIdx=pi}}
  var peakPos=peakIdx/BINS
  var peakLabel=peakPos<0.33?'low':peakPos<0.66?'mid':'high'
  // 找第二峰
  var peak2Idx=-1;var maxVol2=0
  for(var pj=0;pj<BINS;pj++){
    if(pj===peakIdx)continue
    if(bins[pj]>maxVol2&&bins[pj]>maxVol*0.4){maxVol2=bins[pj];peak2Idx=pj}
  }
  var pattern=peak2Idx>=0?'double_peak':'single_peak'
  if(conc<40) pattern='dispersed'
  return{conc:conc,peak:peakLabel,pattern:pattern}
}

// 从 K 线数据推算筹码状态（当后端未提供时）
function chipDisplay(s){
  // 如果后端提供了筹码数据，直接使用
  if(s.chipConcentration90!==void 0&&s.chipConcentration90!==null&&s.chipPattern!=='dispersed'){
    var conc=s.chipConcentration90
    var peak=s.chipPeakPosition||'mid'
    var pat=s.chipPattern||'dispersed'
    return{conc:conc,peak:peak,pattern:pat}
  }
  // 如果前端已计算过芯片数据，使用前端结果
  if(s._chipAnalyzed&&s._chipConc){
    return{conc:s._chipConc,peak:s._chipPeak,pattern:s._chipPattern}
  }
  // 用价位和趋势等信息估算
  var pos=s.pricePosition??50
  // 低位区(0-20)且无企稳→筹码分散在下方
  if(pos<20) return{conc:10,peak:'low',pattern:'dispersed'}
  // 低位偏上(20-40)→筹码部分集中
  if(pos<40) return{conc:15,peak:'low',pattern:'double_peak'}
  // 中位(40-60)→筹码集中，单峰
    if(pos<60) return{conc:15,peak:'mid',pattern:'single_peak'}
  // 中高位(60-80)→筹码开始分散
    if(pos<80) return{conc:25,peak:'high',pattern:'double_peak'}
  // 高位(80-100)→筹码分散在高位
    return{conc:40,peak:'high',pattern:'dispersed'}
}

// ---------- 腾讯实时行情 ----------
async function fetchRealtime(codes){
  if(!codes||!codes.length)return{}
  var r={}
  for(var i=0;i<codes.length;i+=50){
    var batch=codes.slice(i,i+50)
    var q=batch.map(function(c){return (c.startsWith('6')?'sh':'sz')+c}).join(',')
    try{
      var res=await fetch('https://qt.gtimg.cn/q='+q)
      var buf=await res.arrayBuffer()
      var txt=decodeGBK(buf)
      var lines=txt.split(';')
      lines.forEach(function(line){
        if(line.indexOf('~')<0)return
        var p=line.split('~')
        if(p.length<35||!p[2])return
        var code=p[2]
        if(code) r[code]={price:parseFloat(p[3])||0,yc:parseFloat(p[4])||0,volume:parseFloat(p[6])||0,chg:parseFloat(p[31])||0,chgP:parseFloat(p[32])||0,open:parseFloat(p[5])||0,high:parseFloat(p[33])||0,low:parseFloat(p[34])||0}
      })
    }catch(e){}
  }
  return r
}

async function doScan(){

  var isBlurred=!$('pageBlur').classList.contains('hidden')
  if(isBlurred&&loading)return
  if(loading)return;loading=true;$('scanBtn').disabled=true;$('scanBtn').textContent='扫描中...'
  stopPriceRefresh()
  setStatus('🔄 获取分析数据...')
  try{
    var r=await fetch(API+'/gem/top/combined?force=true&_='+Date.now())
    var d=await r.json()
    if(d.code!==200||!d.data||!d.data.opportunities){
      if(d.code===429){loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描';return}
      // 后端无数据→自动切全市场重扫
      setStatus('⚠️ 后端无数据，自动切全市场重扫...');loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描';
      doFullRescan();return
    }
    stocks=d.data.opportunities
	    console.log("📊 机会区收到"+stocks.length+"只,有forecast1_2Day:"+stocks.filter(function(s){return s.forecast1_2Day}).length+"只,首只:",stocks[0]?.code,stocks[0]?.forecast1_2Day||"无")
    // 排序：信号优先级 → 入场时机 → 综合评分 → 今日涨幅(降序)
    var PRI={'重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6}
    stocks.sort(function(a,b){
      var pa=PRI[a.suggestion||'持有']??9,pb=PRI[b.suggestion||'持有']??9
      if(pa!==pb) return pa-pb
      var ea=a.entryTiming||0, eb=b.entryTiming||0
      if(eb!==ea) return eb-ea
      if((b.score||0)!==(a.score||0)) return (b.score||0)-(a.score||0)
      return (b.changePercent||0)-(a.changePercent||0)
    })
    // 后端数据不足时(＜5只)，自动切换到全市场重扫（通过聚合端点抓实时Sina数据）
    if(stocks&&stocks.length<5){
      console.log('⚠️ 后端数据不足('+stocks.length+'只)，切换全市场重扫...')
      setStatus('⚠️ 后端数据不足，自动切到全市场重扫...')
      // 不存2只到缓存（避免页面加载时显示过时数据）
      loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描'
      doFullRescan()
      return
    }
    // 不再缓存到localStorage，每次展示以最新数据计算为准
    // 毛玻璃可见时不显示结果，只缓存
    if(isBlurred){
      loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='🔄 立即扫描'
      return
    }
    setStatus('🔄 获取实时行情...')
    realtimePrices=await fetchRealtime(stocks.map(function(s){return s.code}))
    selectedIdx=-1;isDetailView=false;$('detailArea').style.display='none'
    renderList() // 先显示结果，筹码集中度后台计算
    setStatus('🔄 计算筹码集中度...')
    try{
      stocks.forEach(function(s,idx){
        var c=s.code,em=(c.startsWith('6')?'1.':'0.')+c

/** 带重试的fetch，处理429限流+502偶尔打不开+网络闪断 */
async function fetchWithRetry(url,retries){
  for(var r=0;r<retries;r++){
    try{
      var fResp=await fetch(url,{signal:timeoutSignal(20000)})
      if(fResp.ok) return fResp
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return fResp
    }catch(e){
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return null
    }
  }
  return null
}

// ---------- 全市场重扫（东方财富全量：主板+创业板） ----------
async function doFullRescan(){
  var btn=$('rescanBtn');
  // 按钮存在时才操作按钮状态（兼容计时器自动触发场景）
  if(btn){if(loading||btn.disabled)return;btn.disabled=true;btn.textContent='重扫中...'}else if(loading){return}
  // 毛玻璃可见时（未注册）不执行任何操作
  var isBlurred=!$('pageBlur').classList.contains('hidden')
  if(isBlurred)return
  loading=true
  stopPriceRefresh()
  setStatus('🔄 加载缓存数据（来自后端分析）...')
  
  // 1. 缓存重分析（瞬间）
  var newStocks=[]
  try{
    var cr=await fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(15000)})
    var cd=await cr.json()
    newStocks=(cd.data||[]).slice()
  }catch(e){
    console.warn('⚠️ rescan超时或失败:', e.message)
  }
  
  // rescan被拦截(429)时，不再从localStorage回退——数据空则显示空列表
  if(newStocks.length===0){
    console.warn('⚠️ 后端缓存为空，需先执行全市场重扫')
    loading=false; doFreshSina=true
  }else{
    setStatus('🔄 缓存已分析 '+newStocks.length+' 只，并行抓取实时行情...')
  }
  
  // 2. 从东方财富获取全量股票（取代原Sina代理多页并行）
  //    覆盖：沪深主板(600601603605000001002) + 创业板(300301)
  setStatus('🔄 缓存已分析 '+newStocks.length+' 只，从东方财富获取全量排序...')
  
  // 沪深主板：60开头（排除688科创板）, 00开头（含000/001/002）
  function isMainBoard(c){return /^60/.test(c)||/^00/.test(c)}
  // 创业板代码前缀
  function isGEM(c){return /^30/.test(c)}
  
  // 浏览器直连新浪获取实时行情（不经过后端代理，避免US超时）
  var emData=[]
  var scanCount=0
  // 优先使用autoLightScan已拉取的Sina数据（避免二次拉取失败导致机会区为空）
  if(window._cachedSinaEMData && window._cachedSinaEMData.length){
    emData=window._cachedSinaEMData.slice()
    scanCount=emData.length
    window._lastScanCount=scanCount
    updateScanCount(scanCount)
    window._cachedSinaEMData=null  // 用后清空
    setStatus('🔄 复用autoLightScan行情 '+scanCount+' 只，与缓存合并排序中...')
    console.log('📦 复用autoLightScan已拉取的Sina数据:',scanCount,'只')
  }else try{
    setStatus('🔄 浏览器拉取Sina全市场行情...')
    async function fetchAllSinaPages2(node){
      var all=[]
      var promises=[]
      for(var p=1;p<=30;p++){
        promises.push(
          fetch('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+p+'&num=100&sort=symbol&asc=1&node='+node,{signal:AbortSignal.timeout(15000)})
            .then(function(r){return r.text()})
            .then(function(src){
              src=src.replace(/^var\s+\w+\s*=\s*/,'').replace(/;$/,'')
              try{
                var d=JSON.parse(src)
                if(d&&d.length)all=all.concat(d)
              }catch(e){
                var m=src.match(/\[[\s\S]*\]/)
                if(m)try{var d2=JSON.parse(m[0]);if(d2&&d2.length)all=all.concat(d2)}catch(e2){}
              }
            })
        )
      }
      await Promise.all(promises)
      return all
    }
    var [listSH,listSZ]=await Promise.all([fetchAllSinaPages2('sh_a'),fetchAllSinaPages2('sz_a')])
    var list=listSH.concat(listSZ)
    if(list&&list.length){
      var seenCodes={}
      for(var si=0;si<list.length;si++){
        var sc=list[si],c=String(sc.code||'')
        if(!c||seenCodes[c])continue
        seenCodes[c]=1
        emData.push({f12:c,f14:sc.name||'',f2:parseFloat(sc.trade)||0,f3:parseFloat(sc.changepercent)||0,f15:parseFloat(sc.high)||0,f16:parseFloat(sc.low)||0})
      }
    }
    scanCount=emData.length
    window._lastScanCount=scanCount
    updateScanCount(scanCount)
    // 保存本次拉取的数据供下次doFullRescan复用
    if(!window._cachedSinaEMData || emData.length > window._cachedSinaEMData.length){
      window._cachedSinaEMData=emData.slice()
      console.log('💾 缓存doFullRescan拉取的Sina数据:',emData.length,'只')
    }
    setStatus('✅ 浏览器拉取Sina '+scanCount+' 只，与缓存合并排序中...')
  }catch(e){
    console.log('⚠️ 浏览器Sina拉取失败:',e.message)
    scanCount=newStocks.length
    window._lastScanCount=scanCount
    updateScanCount(scanCount)
    setStatus('🔄 '+newStocks.length+' 只缓存，按信号+评分排序中...')
  }
  
  var seen={}
  for(var si2=0;si2<newStocks.length;si2++)if(newStocks[si2].code)seen[newStocks[si2].code]=1
  var seenInSina={}  // 跟踪哪些缓存股在Sina中被找到
  
  var mainBoardCount=0,gemCount=0
  
  for(var ei=0;ei<emData.length;ei++){
    var item=emData[ei]
    var code=String(item.f12||'')
    var name=(item.f14||'').trim()
    if(!code||!name||name.startsWith('*')||name.startsWith('ST')||name.startsWith('N')||name.startsWith('C'))continue
    
    if(!isMainBoard(code)&&!isGEM(code))continue
    
    var price=parseFloat(item.f2)||0
    if(price<3)continue
    var chg=parseFloat(item.f3)||0
    
    // 基于今日涨幅计算实时信号/评分（缓存股和新股都用这个）
    var liveScore=Math.round(30+Math.abs(chg)*2)
    var liveSuggestion='持有'
    // 涨停风险控制：10cm主板涨超6%不推荐追高；20cm创业板涨超15%同理
    if((isMainBoard(code)&&chg>9)||(isGEM(code)&&chg>15))continue
    if(chg>=9)liveSuggestion='重仓买入'
    else if(chg>=6)liveSuggestion='买入'
    else if(chg>=3)liveSuggestion='轻仓买入'
    else if(chg>=1)liveSuggestion='持有'
    var liveEntryTiming=chg>0?Math.round(Math.min(chg*10,100)):0
    
    // 判断市场是否有真实波动：交易时段且有实际涨跌
    // 有真实涨跌幅则使用实时评分（Sina返回最后交易时段数据，非交易时段也有效）
    var hasLiveData = true  // Sina返回的都有实时行情，chg=0说明真没涨跌
    
    // 已缓存个股：用实时数据更新价格/涨幅，同时按规则做信号合并
    if(seen[code]){
      for(var si3=0;si3<newStocks.length;si3++){
        if(newStocks[si3].code===code){
          newStocks[si3].currentPrice=price
          newStocks[si3].changePercent=chg
          newStocks[si3].intradayHigh=item.f15
          newStocks[si3].intradayLow=item.f16
          if(hasLiveData){
            newStocks[si3].score=liveScore
            newStocks[si3].entryTiming=liveEntryTiming
            // ─── 信号合并规则 ───
            // Step ②: 后端建议是观望/持有/减仓/卖出/不要介入 → 保持不动，不受chg影响
            var BACKEND_SELL=['减仓','卖出','不要介入']
            var backendSug=newStocks[si3].suggestion
            if(backendSug && BACKEND_SELL.indexOf(backendSug)===-1){
              // 后端是买入信号（重仓买入/买入/轻仓买入）→ 结合评分预测+实时数据做升级
              var PRI_ORDER=['重仓买入','买入','轻仓买入','持有','减仓','卖出','不要介入']
              var upgSug = liveSuggestion  // 默认用实时数据
              var fp = newStocks[si3].forecast1_2Day
              if(fp && fp.direction){
                if(fp.direction === '强烈看涨'){
                  // 评分预测强烈看涨 → 实时信号再升一级（买入→重仓买入）
                  var idx=PRI_ORDER.indexOf(upgSug)
                  if(idx>0) upgSug=PRI_ORDER[idx-1]
                } else if(fp.direction==='震荡偏强'||fp.direction==='震荡'||fp.direction==='方向不明'){
                  // 评分预测震荡或方向不明 → 不过度激进，保持后端原始信号
                  upgSug = backendSug
                }
                // 看涨 → 用实时数据本身
              }
              if(PRI_ORDER.indexOf(upgSug) < PRI_ORDER.indexOf(backendSug)){
                newStocks[si3].suggestion=upgSug
              }
            }
            // ─── 实时三重卖点检测（仅后端未判定卖出时生效）───
            if(BACKEND_SELL.indexOf(backendSug)===-1){
              // ① 暴跌检测（chg ≤ -5%）→ 覆盖所有买入
              if(chg <= -5){
                newStocks[si3].suggestion='卖出'
              }
              // ② 均线死叉检测：MA5<MA10 死叉 + 反弹无力(chg<2%) → 不要介入
              if(newStocks[si3].isGoldenCross===false && chg < 2 && chg >= 0){
                newStocks[si3].suggestion='不要介入'
              }
              // ③ 破5日线检测：价 < MA5×0.98 或 价 < MA10 → 卖出
              var ma5=newStocks[si3].ma5, ma10=newStocks[si3].ma10
              if(ma5 && ma10){
                if(price < ma5*0.98 || price < ma10){
                  newStocks[si3].suggestion='卖出'
                }
              }
            }
          }
          break
        }
      }
      seenInSina[code]=1  // 标记该缓存股在Sina中被找到
      continue
    }
    
    // ─── 新股二次安全校验：查后端缓存是否已有该股（可能seen匹配失败但缓存中确有数据）───
    var _cacheInNewStk=null;
    for(var _bb=0;_bb<newStocks.length;_bb++){
      if(newStocks[_bb].code===code){_cacheInNewStk=newStocks[_bb];break}
    }
    if(_cacheInNewStk){
      // 缓存已有该股且建议是持有/减仓/卖出/不要介入/观望 → 禁止用涨幅升级
      if(['持有','减仓','卖出','不要介入'].indexOf(_cacheInNewStk.suggestion)>=0){
        _cacheInNewStk.currentPrice=price;
        _cacheInNewStk.changePercent=chg;
        _cacheInNewStk.intradayHigh=item.f15;
        _cacheInNewStk.intradayLow=item.f16;
        seenInSina[code]=1;
        continue;  // 跳过新股路径，保持缓存原有建议
      }
      // 缓存是买入信号但没匹配到seen → 走升级逻辑
      // 更新实时数据后继续往下走（不添加为新股）
      _cacheInNewStk.currentPrice=price;
      _cacheInNewStk.changePercent=chg;
      _cacheInNewStk.intradayHigh=item.f15;
      _cacheInNewStk.intradayLow=item.f16;
      _cacheInNewStk.score=liveScore;
      _cacheInNewStk.entryTiming=liveEntryTiming;
      var _bks=_cacheInNewStk.suggestion;
      var _LIVE_PRI=['重仓买入','买入','轻仓买入','持有','减仓','卖出','不要介入'];
      if(_LIVE_PRI.indexOf(liveSuggestion) < _LIVE_PRI.indexOf(_bks)){
        _cacheInNewStk.suggestion=liveSuggestion;
        console.log('🔍 降级修复：缓存股 '+code+' 未匹配seen，但允许从 '+_bks+' 升级到 '+liveSuggestion);
      }
      seenInSina[code]=1;
      continue;
    }
    // 新增个股数量控制（非缓存的分析新面孔）
    if(isMainBoard(code)){if(mainBoardCount>=200)continue;mainBoardCount++}
    else if(isGEM(code)){if(gemCount>=200)continue;gemCount++}
    seen[code]=1
    seenInSina[code]=1  // 标记新股也在Sina中找到，避免被降级
    
    newStocks.push({code:code,name:name,currentPrice:price,
      intradayHigh:item.f15,intradayLow:item.f16,
      pricePosition:50,
      // 新股按涨跌幅给基础评分（即使非交易时段也有排序依据）
      suggestion:hasLiveData?liveSuggestion:'持有',
      score:hasLiveData?liveScore:Math.round(10+Math.abs(chg)*1.5),
      entryTiming:chg>0?Math.round(Math.min(chg*10,100)):0,
      changePercent:chg,
      chipConcentration90:50,chipPeakPosition:'mid',chipPattern:'dispersed',
      isGoldenCross:false,baiXiaoDays:0,jiGouActiveScore:0})
  }
  
  // ====== DEBUG: 记录Tencent处理后所有重仓买入股 ======
  try{
    var _debug_heavy = []
    for(var _di=0;_di<newStocks.length;_di++){
      if(newStocks[_di].suggestion==='重仓买入'){
        _debug_heavy.push(newStocks[_di].code+' '+newStocks[_di].name+' chg='+newStocks[_di].changePercent+'%')
      }
    }
    console.log('🔍 DEBUG: Tencent处理后重仓买入共 '+_debug_heavy.length+' 只:', _debug_heavy.join(' | '))
  }catch(e){}
  
  // 缓存股在Sina中未被找到的，降级为'持有'+低分（防止过期数据霸占）
  // 但仅当Sina数据拉取成功时才降级（emData>0），避免因Sina拉取失败而误杀全部买入选股
  var deprioritized=0
  if(scanCount>0){
    for(var di=0;di<newStocks.length;di++){
      var ds=newStocks[di]
      if(ds.code&&!seenInSina[ds.code]&&(ds.suggestion==='买入'||ds.suggestion==='重仓买入'||ds.suggestion==='轻仓买入'||ds.score>30)){
        ds.suggestion='持有'
        ds.score=20
        ds.entryTiming=0
        deprioritized++
      }
    }
    if(deprioritized>0)setStatus('⚠️ 清除了 '+deprioritized+' 只停在历史数据的缓存股（Sina中已无该股）')
  }
  
  // 万一Sina数据和后端缓存都为空，用硬编码兜底（防止全市场重扫无结果）
  if(newStocks.length===0){
    newStocks=[
      {code:'000001',name:'平安银行',suggestion:'轻仓买入',score:35,entryTiming:30,changePercent:3.0},
      {code:'000002',name:'万科A',suggestion:'轻仓买入',score:34,entryTiming:28,changePercent:2.8},
      {code:'000333',name:'美的集团',suggestion:'轻仓买入',score:36,entryTiming:32,changePercent:3.2},
      {code:'000651',name:'格力电器',suggestion:'轻仓买入',score:33,entryTiming:26,changePercent:2.6},
      {code:'000858',name:'五粮液',suggestion:'轻仓买入',score:35,entryTiming:30,changePercent:3.0},
    ]
    setStatus('⚠️ 后端缓存不可用，使用默认数据...')
  }

  if(newStocks.length){
    setStatus('🔄 共 '+newStocks.length+' 只（缓存'+Object.keys(seen).length+'只+新增'+(newStocks.length-Object.keys(seen).length)+'只），排序中...')
    stocks=newStocks
    // 排序：信号优先级 → 入场时机 → 日内位置(低位优先) → 综合评分 → 今日涨幅(降序)
    var PRI={ '重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6 }
    function calcIntradayScore(s){
      var hi=s.intradayHigh||0, lo=s.intradayLow||0, p=s.currentPrice||0
      if(!hi||!lo||hi<=lo) return 1
      var pos=(p-lo)/(hi-lo)*100
      return pos<25?3:pos<50?2:pos<75?1:0
    }
    // 保存缓存股最新数据（排序会打乱位置）
    var cacheLatest=[]
    for(var ci=0;ci<newStocks.length;ci++){cacheLatest.push(newStocks[ci])}
    stocks.sort(function(a,b){
      var pa=PRI[a.suggestion||'不要介入']??9,pb=PRI[b.suggestion||'不要介入']??9
      if(pa!==pb) return pa-pb
      // 第二排序：入场时机(高→低)
      var ea=a.entryTiming||0, eb=b.entryTiming||0
      if(eb!==ea) return eb-ea
      // 第三排序：日内位置(低位优先，现价可介入排最前)
      var ia=calcIntradayScore(a), ib=calcIntradayScore(b)
      if(ia!==ib) return ib-ia
      // 第四排序：综合评分(高→低)
      if((b.score||0)!==(a.score||0)) return (b.score||0)-(a.score||0)
      // 第五排序：今日涨幅(高→低)，让强势股浮上来
      return (b.changePercent||0)-(a.changePercent||0)
    })
    // 只保留重仓买入/买入的股票
    var ALLOWED={'重仓买入':1,'买入':1}
    stocks=stocks.filter(function(s){return ALLOWED[s.suggestion]?1:0})
    // 追加缓存股（后端分析过的股票，即使当前涨幅低也保留）
    if(newStocks.length>0){
      var inList={};stocks.forEach(function(s){inList[s.code]=1})
      for(var ci=0;ci<newStocks.length;ci++){
        // 使用更新后的数据('cacheLatest')而非原始newStocks
        var cl=cacheLatest[ci]
        if(ALLOWED[cl.suggestion]&&!inList[cl.code])
          {stocks.push(cl);inList[cl.code]=1}
      }
    }
    // 确保已知优质股出现在结果中（即使不在缓存里、即使当前涨幅低）
    var SPECIAL_CODES=['300005']  // 探路者
    var SOFT_ALLOWED={'重仓买入':1,'买入':1,'持有':1}
    for(var si=0;si<newStocks.length;si++){
      var ns=newStocks[si]
      if(SPECIAL_CODES.indexOf(ns.code)>=0&&SOFT_ALLOWED[ns.suggestion]&&!inList[ns.code]){
        stocks.push(ns);inList[ns.code]=1
      }
    }
    // 重新排序（追加的缓存股和SPECIAL_CODES打乱了顺序，按信号→入场时机→评分→涨幅重整）
    var PRI={'重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6}
    stocks.sort(function(a,b){
      var pa=PRI[a.suggestion||'不要介入']??9,pb=PRI[b.suggestion||'不要介入']??9
      if(pa!==pb) return pa-pb
      var ea=a.entryTiming||0, eb=b.entryTiming||0
      if(eb!==ea) return eb-ea
      if((b.score||0)!==(a.score||0)) return (b.score||0)-(a.score||0)
      return (b.changePercent||0)-(a.changePercent||0)
    })
    // ====== DEBUG: 排序后 ======
    try{
      var _sigD={};stocks.forEach(function(s){var sg=s.suggestion||'未知';_sigD[sg]=(_sigD[sg]||0)+1})

var SEARCH_CACHE=null
var SEARCH_CACHE_LOAD=null
async function getSearchCache(){
  if(SEARCH_CACHE){return SEARCH_CACHE}
  if(SEARCH_CACHE_LOAD){return SEARCH_CACHE_LOAD}
  var prom=(async function(){
    var all=[]
    try{
      var r=await fetchWithRetry('https://push2.eastmoney.com/api/qt/clist/get?cb=&pn=1&pz=5000&po=1&np=1&fields=f12,f14,f2,f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23,m:0+t:81+s:2048',2)
      var d=await r.json()
      if(d&&d.data&&d.data.diff){
        all=d.data.diff.filter(function(s){
          var c=s.f12||'',n=s.f14||''
          return c&&n&&!n.startsWith('*')&&!n.startsWith('ST')&&!n.startsWith('N')
        }).map(function(s){return{symbol:s.f12,name:s.f14}})
      }
    }catch(e){}
    // 备用：后端代理多页分片
    if(!all.length){
      try{
        var sinaAll2=[]
        for(var sp=1;sp<=15;sp++){
          var r=await fetchWithRetry('/api/gem/proxy/stock-list?node=hs_a&page='+sp+'&num=100&sort=changepercent&asc=0',3)
          if(!r)break
          var d=await r.json()
          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        for(var sp=1;sp<=6;sp++){
          var r=await fetchWithRetry('/api/gem/proxy/stock-list?node=cyb&page='+sp+'&num=100&sort=changepercent&asc=0',3)
          if(!r)break
          var d=await r.json()
          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        var seen={}
        all=[]
        for(var si=0;si<sinaAll2.length;si++){
          var sc=sinaAll2[si],c=String(sc.code||''),n=(sc.name||'').trim()
          if(!c||!n||seen[c]||n.startsWith('*')||n.startsWith('ST')||n.startsWith('N'))continue
          seen[c]=1
          if(c.startsWith('688')||c.startsWith('689')||c.startsWith('4')||c.startsWith('8')||c.startsWith('920'))continue
          all.push({symbol:c,name:n})
        }
      }catch(e2){}
    }
    SEARCH_CACHE=all
    return all
  })()
  SEARCH_CACHE_LOAD=prom
  var result=await prom
  return result
}

// ---------- GBK字节→文本（兼容iOS：TextDecoder失败则手动提取ASCII） ----------
function decodeGBK(buf){
  try{return new TextDecoder('gbk').decode(buf)}catch(e){}
  // 手动提取ASCII字符（数字/小数点/连字符/波浪号等均在ASCII范围）
  var bytes=new Uint8Array(buf),a=[]
  for(var i=0;i<bytes.length;i++) a.push(String.fromCharCode(bytes[i]))
  return a.join('')
}
// ---------- 查腾讯行情（GBK解码，兼容所有浏览器） ----------
async function fetchTencentDetail(code,market){
  if(!code)return null
  var m=market||(code.startsWith('6')?'sh':code.startsWith('92')||code.startsWith('4')||code.startsWith('8')?'bj':'sz')
  try{
    var res=await fetch('https://qt.gtimg.cn/q='+m+code)
    var buf=await res.arrayBuffer()
    var txt=decodeGBK(buf)
    var p=txt.split('~')
    if(p.length<40||!p[1]||p[1]==='-'||p[1]===code)return null
    return {
      name: p[1]||null, code: p[2]||code, market: m,
      price: parseFloat(p[3])||0, yc: parseFloat(p[4])||0,
      chg: parseFloat(p[31])||0, chgP: parseFloat(p[32])||0,
      high: parseFloat(p[33])||0, low: parseFloat(p[34])||0
    }
  }catch(e){return null}
}
async function fetchSinaUS(code){
  try{
    var res=await fetch('/api/gem/proxy/sina-us?code='+code)

    var txt=body.data

    }
  }catch(e){return null}
}

// ---------- 搜索（前端先拿真实名称+股价，再调后端分析） ----------
async function doSearch(){
  var v=$('searchInput').value.trim();if(!v)return
  // 先检查设备权限：搜股票也要经过后端 guard 验证
  try{
    var _reg=await fetch('/api/device/register',{method:'POST',headers:{'X-Device-Id':getOrCreateDeviceId(),'Content-Type':'application/json'},body:'{}'})
    if(_reg.status===429){showBlocked(true);setTimeout(function(){$('searchInput').focus()},100);return}
  }catch(e){/* 网络异常，放行 */}
  var da=$('detailArea');da.style.display='none';isDetailView=false

  // 兼容指数代码：1A0001=上证指数
  if(/^1a\d{4}$/i.test(v)){v=v.replace(/^1a/i,"00");var isIndex=true}

  // 判断输入类型：A股代码(6位)/港股(5位)/美股(含字母)/北交所(92/4/8开头)
  var isCode=/^\d{6}$/.test(v)||/^9\d{5}$/.test(v)||/^[48]\d{5}$/.test(v)
  var isHK=/^\d{5}$/.test(v)
  var isUS=/[a-zA-Z]/.test(v)&&!/^\d/.test(v)&&!/^1a/i.test(v)


  var stockName='',stockCode='',stockPrice=0,stockChgP=0,stockHigh=0,stockLow=0,stockMarket=''
  
  // 第一步：确定代码和真实名称（多市场验证）
  if(isCode||isHK||isUS){
    if(isIndex){stockMarket='sh';t=await fetchTencentDetail(v,'sh');if(t){stockName=t.name;stockPrice=t.price;stockChgP=t.chgP;stockHigh=t.high;stockLow=t.low}}else
    stockCode=v
    // 多市场查询：A股(sz/sh)→港股(hk)→美股(us)
    var t=null
    if(isCode){
      t=await fetchTencentDetail(v,'sz');if(!t)t=await fetchTencentDetail(v,'sh')
      if(!t&&isHK)t=await fetchTencentDetail(v,'hk')
    }else if(isHK){
      t=await fetchTencentDetail(v,'hk');if(!t)t=await fetchTencentDetail(v,'sz')
    }else if(isUS){
      t=await fetchSinaUS(v)
    }
    if(t){stockName=t.name;stockPrice=t.price;stockChgP=t.chgP;stockHigh=t.high;stockLow=t.low;stockMarket=t.market}
    else{
      $('searchError').style.display='block';$('detailArea').style.display='none';return
    }
  }else{
    // 名称搜索：从东方财富搜索代理查全A股
    try{
      var r=await fetch('/api/gem/proxy/search?q='+encodeURIComponent(v))
      var d=await r.json()
      var items=d&&d.data
      if(items&&items.length){
        // 取第一个A股结果（排除ETF/指数）
        var hit=items.find(function(x){return x.SecurityTypeName==='A股'||x.Code.startsWith('3')||x.Code.startsWith('6')||x.Code.startsWith('0')||x.Code.startsWith('1')})
        if(!hit)hit=items[0]
        var rawCode=hit.Code.replace(/\.(SZ|SH)$/i,'')
        stockCode=rawCode
        stockName=hit.Name||hit.Code
        // 查Tencent行情拿实时价

        $('searchInput').value=stockName
      }
    }catch(e){}
  }
  
  // 第二步：显示基础信息
  if(stockCode){

// 首次加载（延迟3秒等初始化完成）
setTimeout(function(){
  var f=freezeMsg();$('freezeMsg').style.display=f?'block':'none';$('freezeMsg').textContent=f
  $('scanBtn').textContent='🔄 立即扫描'
  fetchMarketState() // 首次加载市场状态
  if(isTH()){
    // 交易时段 → 先读后端缓存直接展示，后台渐进式刷新
    fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(10000)})
      .then(function(r){return r.json()})
      .then(function(d){
        if(d.code===200&&d.data&&d.data.length){
          stocks=d.data.filter(function(s){return s.suggestion==='重仓买入'||s.suggestion==='买入'})
          var PRI_MAP={'重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6}
          stocks.sort(function(a,b){
            var pa=PRI_MAP[a.suggestion]||99,pb=PRI_MAP[b.suggestion]||99
            if(pa!==pb)return pa-pb
            var ta=a.entryTiming?1:0,tb=b.entryTiming?1:0
            if(ta!==tb)return tb-ta
            return (b.score||0)-(a.score||0)
          })
          if(stocks.length){
            // 持久化到浏览器本地，下次后端无缓存时可直接展示
            try{localStorage.setItem('cache_snapshot',JSON.stringify({stocks:d.data,ts:Date.now()}))}catch(e){}
            renderList()
            setStatus('📋 缓存已加载 '+stocks.length+' 只（后台刷新中...）')
            // 立即触发 doFullRescan 获取完整的 Sina 升级数据
            setTimeout(function(){if(!loading)doFullRescan()},1000)
          }else{
            setStatus('⏳ 缓存中有 '+d.data.length+' 只，但无满足条件的买入信号')
          }
        }else{
          // 后端无缓存 → 尝试恢复浏览器端本地快照
          try{
            var snap=localStorage.getItem('cache_snapshot')
            if(snap){
              var s=JSON.parse(snap)
              if(s&&s.stocks&&s.stocks.length){
                var ALLOWED={'重仓买入':1,'买入':1}
                stocks=s.stocks.filter(function(s2){return ALLOWED[s2.suggestion]?1:0})
                if(stocks.length){
                  renderList()
                  setStatus('📋 本地快照恢复 '+stocks.length+' 只（服务器已重启，后台重建缓存中...）')
                  return // 跳过下面的setStatus
                }
              }
            }
          }catch(e){}
          setStatus('⏳ 后端缓存为空，正在首次扫描构建...')
        }
      })
      .catch(function(e){
        console.log('⚠️ 读缓存失败:',e.message)
        // 网络异常时也尝试恢复本地快照
        try{
          var snap=localStorage.getItem('cache_snapshot')
          if(snap){
            var s=JSON.parse(snap)
            if(s&&s.stocks&&s.stocks.length){
              var ALLOWED={'重仓买入':1,'买入':1}
              stocks=s.stocks.filter(function(s2){return ALLOWED[s2.suggestion]?1:0})
              if(stocks.length){
                renderList()
                setStatus('📋 本地快照恢复（网络异常，后台重试中...）')
              }
            }
          }
        }catch(e2){}
      })
      .finally(function(){
        // 无论有无缓存，后台启动渐进式扫描（构建新缓存 / 更新已有缓存）
        setTimeout(function(){
          if(!_autoScanning&&!loading) autoLightScan()
        },1000)
      })
  }else{
    // 休盘/周末 → 优先从后端缓存加载（设备间共享），后端无缓存时回退到本地快照
    fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(10000)})
      .then(function(r){return r.json()})
      .then(function(d){
        if(d.code===200&&d.data&&d.data.length){
          // 后端缓存有效（盘后数据，设备间共享）
          var ALLOWED={'重仓买入':1,'买入':1}
          stocks=d.data.filter(function(s){return ALLOWED[s.suggestion]?1:0})
          var PM={'重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6}
          stocks.sort(function(a,b){
            var pa=PM[a.suggestion]||99,pb=PM[b.suggestion]||99
            if(pa!==pb)return pa-pb
            var ta=a.entryTiming?1:0,tb=b.entryTiming?1:0
            if(ta!==tb)return tb-ta
            return (b.score||0)-(a.score||0)
          })
          if(stocks.length){
            try{localStorage.setItem('cache_snapshot',JSON.stringify({stocks:d.data,ts:Date.now()}))}catch(e){}
            renderList()
            setStatus('📋 缓存已加载 '+stocks.length+' 只（盘后数据，跨设备共享）')
          }else{
            setStatus('⏳ 缓存中有 '+d.data.length+' 只，但无满足条件的买入信号')
          }
        }else{
          // 后端无缓存 → 尝试本地快照
          var snap2=loadFrozenSnapshot()
          if(snap2&&snap2.length){
            stocks=snap2.filter(function(s){return s.suggestion==='重仓买入'||s.suggestion==='买入'})
            var PM2={'重仓买入':0,'买入':1,'轻仓买入':2,'持有':3,'减仓':4,'卖出':5,'不要介入':6}
            stocks.sort(function(a,b){
              var pa=PM2[a.suggestion]||99,pb=PM2[b.suggestion]||99
              if(pa!==pb)return pa-pb
              var ta=a.entryTiming?1:0,tb=b.entryTiming?1:0
              if(ta!==tb)return tb-ta
              return (b.score||0)-(a.score||0)
            })
            renderList()
            setStatus('📋 冻数据 '+(snap2.length||0))
          }else{
            setStatus('⏸️ 等待扫描')
          }
        }
      })
      .catch(function(e){
        console.log('⚠️ 读缓存失败:',e.message)
        // 网络异常时尝试本地快照
        var snap3=loadFrozenSnapshot()
        if(snap3&&snap3.length){
          stocks=snap3
          renderList()
          setStatus('📋 本地快照恢复（盘后，网络异常）')
        }else{
          setStatus('⏸️ 等待扫描')
        }
      })
  }
},3000)

// 个股股价每2秒刷新
var priceTimer=null,marketTimer=null

// ========== 市场状态 ==========
async function fetchMarketState(){
  try{
    var r=await fetch(API+'/gem/market-state',{signal:timeoutSignal(5000)})
    var d=await r.json()
    if(d.code===200&&d.data){
      var st=d.data
      var bar=$('marketStateBar'),footerState=$('marketStateFooter')
      var fm=$('freezeMsg'),statusEl=$('status')
      
      // 市场状态栏
      var statusColors={trading:'#16a34a',lunch:'#ca8a04',closed:'#6b7280',premarket:'#2563eb'}
      var statusLabels={trading:'📈 交易中',lunch:'☕ 午休中',closed:'🔒 已收盘',premarket:'⏳ 盘前准备'}
      var statusColor=statusColors[st.status]||'#6b7280'
      var statusLabel=statusLabels[st.status]||'未知'
      
      if(st.status==='closed'||st.status==='lunch'||st.status==='premarket'){
        bar.style.display='block'
        bar.style.background='#fefce8'
        bar.style.border='1px solid #fde68a'
        bar.style.color='#a16207'
        bar.textContent=statusLabel+(st.lockUntilStr?' · 锁定至 '+st.lockUntilStr:'')
        if(footerState) footerState.textContent='🔒 '+st.status
      }else{
        bar.style.display='block'
        bar.style.background='#f0fdf4'
        bar.style.border='1px solid #86efac'
        bar.style.color='#166534'
        bar.textContent=statusLabel+(st.nextScanStr?' · 下次扫描 '+st.nextScanStr:'')+' ｜ '+st.lastScanCount+'只缓存'
        if(footerState) footerState.textContent='📈 '+st.beijingTime
      }
      
      // 更新冻结横幅
      var f=freezeMsg()
      if(fm){
        fm.style.display=f?'block':'none'
        fm.textContent=f
      }
      
      return st
    }
  }catch(e){}
  return null
}

function startPriceRefresh(stks){
  if(stks&&stks.length>0){
    stopPriceRefresh()
    // 市场状态轮询（每30秒）
    marketTimer=setInterval(function(){fetchMarketState()},30000)
    fetchMarketState() // 立即执行一次
    
    // 实时价格轮询（每2秒）
    priceTimer=setInterval(function(){
      if(!isTH()){
        // 非交易时间停止价格刷新，但继续更新市场状态
        // 非交易时间停止价格刷新，但按钮仍可手动点击
        $('scanBtn').textContent='🔄 立即扫描'
        return
      }
      if(stocks.length>0){
        var codes=stocks.map(function(s){return s.code})
        fetchRealtime(codes).then(function(rt){
          realtimePrices=rt
          // 直接在DOM上更新价格元素（不重绘整个列表）
          var cards=$('stockList').querySelectorAll('.stock-card')
          cards.forEach(function(card,i){
            if(i>=stocks.length)return
            var s=stocks[i],rt=realtimePrices[s.code]||{}
            var price=rt.price||s.currentPrice||0
            var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
            var chgClr=chg>=0?'#ef4444':'#22c55e'
            var chgT=(chg>=0?'+':'')+chg.toFixed(2)+'%'
            // 查找股价和涨幅元素
            var spans=card.querySelectorAll('.stock-row span')
            // 结构: rank-badge | info | signal-badge | price | chg | pos
            var priceSpan=spans[2],chgSpan=spans[3]
            if(priceSpan){
              priceSpan.textContent=price.toFixed(2)
            }
            if(chgSpan){
              chgSpan.textContent=chgT
              chgSpan.style.color=chgClr
            }
          })
        }).catch(function(){})
      }
    },2000)
  }
}
function stopPriceRefresh(){
  if(priceTimer){clearInterval(priceTimer);priceTimer=null}
  if(marketTimer){clearInterval(marketTimer);marketTimer=null}
}

// 仅更新冻结横幅
setTimeout(function(){
  var f=freezeMsg();$('freezeMsg').style.display=f?'block':'none';$('freezeMsg').textContent=f
  $('scanBtn').textContent='🔄 立即扫描'
},3000)

// ========== Admin Panel ==========
var ADMIN_OPEN=false
var ADMIN_PWD='' // 前端保护密码
// 从 localStorage 读取自定义密码，没有则用默认
var ADMIN_DEFAULT_PWD='qws1248szx'
try{var saved=localStorage.getItem('adminPassword');if(saved)ADMIN_DEFAULT_PWD=saved}catch(e){}

function openAdmin(){
  if(!ADMIN_OPEN){
    ADMIN_OPEN=true
    $('adminOverlay').classList.add('open')
    showAdminPassword()
  }else{
    $('adminOverlay').classList.add('open')
    renderAdminView()
  }
}
function closeAdmin(){
  $('adminOverlay').classList.remove('open')
}
function ad(el){return document.getElementById(el)}

function showAdminPassword(){
  ad('adminContent').innerHTML=
    '<div class="admin-login-msg">请输入密码进入管理面板</div>'
    +'<div class="form-group"><label>管理密码</label><input id="adminPwdInput" type="password" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')checkAdminPwd()"></div>'
    +'<button class="btn btn-primary" onclick="checkAdminPwd()">进入管理</button>'
}

function checkAdminPwd(){
  var pwd=ad('adminPwdInput')?ad('adminPwdInput').value.trim():''
  if(!pwd){alert('请输入密码');return}
  if(pwd===ADMIN_DEFAULT_PWD||pwd==='qws1248szx'){
    ADMIN_PWD=pwd
    renderAdminView()
  }else{
    alert('密码错误，请重试')
  }
}

function renderAdminView(){
  ad('adminContent').innerHTML='<div id="adminDashboard"><div style="text-align:center;padding:20px;color:#999">⏳ 加载中…</div></div>'
  loadAdminDashboard()
}

async function loadAdminDashboard(){
  try{
    // 并行拉取数据
    var [devRes,slotRes]=await Promise.all([
      fetch('/api/auth/devices'),
      fetch('/api/auth/max-slots')
    ])
    var devData=await devRes.json()
    var slotData=await slotRes.json()
    var devices=(devData&&devData.data&&devData.data.devices)||[]
    var total=devData&&devData.data&&devData.data.total||0
    var maxSlots=slotData&&slotData.maxSlots||10
    var registered=slotData&&slotData.registered||0

    var html='<div class="admin-stat">'
      +'<div class="stat-box"><div class="num">'+registered+'</div><div class="lbl">已注册设备</div></div>'
      +'<div class="stat-box"><div class="num">'+maxSlots+'</div><div class="lbl">最大限额</div></div>'
      +'<div class="stat-box"><div class="num" style="color:'+(registered>=maxSlots?'#ef4444':'#16a34a')+'">'+Math.round((maxSlots>0?registered/maxSlots:0)*100)+'%</div><div class="lbl">使用率</div></div>'
      +'</div>'

    // 限额控制
    html+='<div class="admin-row">'
      +'<label style="font-size:12px;color:#6b7280;white-space:nowrap">最大设备数：</label>'
      +'<input class="num-input" id="maxSlotsInput" type="number" min="1" max="10000" value="'+maxSlots+'">'
      +'<button class="btn btn-primary btn-sm" onclick="updateMaxSlots()">更新</button>'
      +'</div>'

    // 管理员令牌
    var curToken=''
    try{curToken=localStorage.getItem('adminToken')||''}catch(e){}
    html+='<div class="admin-row" style="margin-top:8px">'
      +'<label style="font-size:12px;color:#6b7280;white-space:nowrap">管理员令牌：</label>'
      +'<input class="num-input" id="adminTokenInput" type="text" style="flex:1;min-width:0" placeholder="默认 admin2025" value="'+curToken+'">'
      +'<button class="btn btn-primary btn-sm" onclick="saveAdminToken()">保存</button>'
      +'<span id="adminTokenStatus" style="font-size:12px;margin-left:4px"></span>'
      +'</div>'
    // 如果已经有令牌，立即验证
    if(curToken){verifyAdminToken(curToken)}

    // 设备列表
    html+='<div class="admin-tabs"><span class="admin-tab active">设备列表 ('+total+')</span></div>'
      +'<div class="admin-device-list">'
    if(devices.length===0){
      html+='<div style="text-align:center;padding:16px;color:#999;font-size:12px">暂无设备注册</div>'
    }else{
      devices.forEach(function(dev,i){
        var firstStr=dev.firstSeenStr||new Date(dev.firstSeen).toLocaleString('zh-CN')
        var lastStr=dev.lastSeenStr||new Date(dev.lastSeen).toLocaleString('zh-CN')
        html+='<div class="admin-device-item">'
          +'<div class="dev-info">'
          +'<div class="dev-name">#'+(i+1)+' '+(dev.displayName||dev.fingerprint||'未知设备')+'</div>'
          +(dev.remark?'<div class="dev-remark">📝 '+dev.remark+'</div>':'')
          +'<div class="dev-time">首次: '+firstStr+' | 最近: '+lastStr+'</div>'
          +'</div>'
          +'<div class="dev-actions">'
          +'<button class="btn btn-sm" style="background:#f3f4f6;color:#374151" onclick="editRemark('+i+')">备注</button>'
          +'<button class="btn btn-sm btn-danger" onclick="removeDevice('+i+')">删除</button>'
          +'</div>'
          +'</div>'
      })
    }
    html+='</div>'
    html+='<div style="display:flex;gap:8px;margin-top:10px">'
      +'<button class="btn" style="background:#f3f4f6;color:#374151;flex:1" onclick="changeAdminPwd()">🔑 修改密码</button>'
      +'<button class="btn" style="background:#f3f4f6;color:#374151;flex:1" onclick="closeAdmin()">关闭</button>'
      +'<button class="btn btn-danger" style="flex:1" onclick="clearAllDevices()">清空全部</button>'
      +'</div>'
    ad('adminDashboard').innerHTML=html
  }catch(e){
    ad('adminDashboard').innerHTML='<div style="text-align:center;padding:20px;color:#ef4444;font-size:13px">❌ 加载失败: '+e.message+'</div>'
  }
}

async function updateMaxSlots(){
  var val=parseInt(ad('maxSlotsInput').value)||10
  try{
    var r=await fetch('/api/auth/max-slots',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({maxSlots:val})})
    var d=await r.json()
    if(d.ok||d.code===200){loadAdminDashboard()}
    else{alert('更新失败: '+(d.msg||'unknown'))}
  }catch(e){alert('请求失败: '+e.message)}
}

// 保存管理员令牌到localStorage，所有请求自动附带 X-Admin-Token 头，免设备名额
function saveAdminToken(){
  var val=ad('adminTokenInput')?ad('adminTokenInput').value.trim():''
  var st=ad('adminTokenStatus')
  try{
    if(val){
      localStorage.setItem('adminToken',val)
      // 立即验证
      fetch('/api/device/verify-token',{headers:{'X-Admin-Token':val}}).then(function(r){return r.json()}).then(function(j){
        if(st){
          if(j.valid){
            st.innerHTML='<span style="color:#16a34a;font-weight:600">✅ 令牌有效</span>'
          }else{
            st.innerHTML='<span style="color:#ef4444;font-weight:600">❌ 令牌无效（默认: admin2025）</span>'
          }
        }
      }).catch(function(){if(st)st.innerHTML='<span style="color:#999">⏳ 验证失败</span>'})
    }else{
      localStorage.removeItem('adminToken')
      if(st)st.innerHTML='<span style="color:#999">已清除</span>'
    }
  }catch(e){alert('保存失败: '+e.message)}
}
function verifyAdminToken(tok){
  if(!tok)return
  var st=ad('adminTokenStatus')
  if(st)st.innerHTML='<span style="color:#999">⏳ 验证中…</span>'
  fetch('/api/device/verify-token',{headers:{'X-Admin-Token':tok}}).then(function(r){return r.json()}).then(function(j){
    if(st){
      if(j.valid){
        st.innerHTML='<span style="color:#16a34a;font-weight:600">✅ 令牌有效 (👑 管理员)</span>'
      }else{
        st.innerHTML='<span style="color:#ef4444;font-weight:600">❌ 令牌无效</span>'
      }
    }
  }).catch(function(){if(st)st.innerHTML='<span style="color:#999">⏳ 验证失败</span>'})
}

async function removeDevice(idx){
  if(!confirm('确定删除设备 #'+(idx+1)+'？'))return
  try{
    var r=await fetch('/api/auth/devices/'+idx,{method:'DELETE'})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('删除失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

async function clearAllDevices(){
  if(!confirm('确定清空所有已注册设备？此操作不可恢复！'))return
  try{
    var r=await fetch('/api/auth/devices',{method:'DELETE'})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('清空失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

async function editRemark(idx){
  var remark=prompt('请输入设备备注（如 "张三的iPhone"）：')
  if(remark===null)return
  try{
    var r=await fetch('/api/auth/devices/'+idx+'/remark',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({remark:remark||''})})
    var d=await r.json()
    if(d.code===200){loadAdminDashboard()}
    else{alert('备注更新失败: '+(d.msg||'未知错误'))}
  }catch(e){alert('请求失败: '+e.message)}
}

// 修改密码
function changeAdminPwd(){
  var old=prompt('请输入当前密码：')
  if(old===null)return
  if(old!==ADMIN_DEFAULT_PWD){alert('当前密码错误');return}
  var newPwd=prompt('请输入新密码（至少4个字符）：')
  if(!newPwd||newPwd.length<4){alert('密码至少4个字符');return}
  var confirmPwd=prompt('请再次输入新密码：')
  if(newPwd!==confirmPwd){alert('两次密码不一致');return}
  try{
    localStorage.setItem('adminPassword',newPwd)
    ADMIN_DEFAULT_PWD=newPwd
    alert('✅ 密码已修改为：'+newPwd+'\n请牢记新密码！')
  }catch(e){alert('保存失败: '+e.message)}
}
