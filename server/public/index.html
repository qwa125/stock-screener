<script>

function timeoutSignal(ms){try{if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)return AbortSignal.timeout(ms)}catch(e){}

function getBJ(){var n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+28800000)}
function isTH(){var b=getBJ();if(b.getDay()===0||b.getDay()===6)return false;var m=b.getHours()*60+b.getMinutes();return(m>=565&&m<690)||(m>=780&&m<900)}
function freezeMsg(){var b=getBJ(),d=b.getDay(),m=b.getHours()*60+b.getMinutes();if(d===0||d===6)return'е‘Ёжң«дј‘еёӮпјҢе·ІеҶ»з»“иҮіе‘ЁдёҖ 9:25';if(m>=900)return d===5?'е‘Ёдә”ж”¶зӣҳпјҢе·ІеҶ»з»“иҮідёӢе‘ЁдёҖ 9:25':'ж”¶зӣҳе·ІеҶ»з»“пјҢжҳҺж—© 9:25 жҒўеӨҚ';if(m>=690&&m<780)return'еҚҲдј‘е·ІеҶ»з»“пјҢ13:00 жҒўеӨҚ';if(m<565)return'зӣҳеүҚе·ІеҶ»з»“пјҢ9:25 жҒўеӨҚ';return''}

var FROZEN_KEY='frozenSnapshot'

function getOrCreateDeviceId(){
  try{
    var id=localStorage.getItem('deviceId')
    if(!id){
      id=Date.now().toString(36)+Math.random().toString(36).slice(2,10)
      localStorage.setItem('deviceId',id)

    return id
  }catch(e){return 'unknown-'+Date.now()}
}

var _origFetch=window.fetch
window.fetch=function(u,o){
  o=o||{}
  o.headers=o.headers||{}
  // еҸӘз»ҷеҗҺз«Ҝ API иҜ·жұӮеҠ и®ҫеӨҮIDеӨҙпјҲеӨ–йғЁ API еҰӮи…ҫи®ҜиЎҢжғ…дёҚеҠ пјҢйҒҝе…Қ CORS йў„жЈҖеӨұиҙҘпјү
  if(typeof u==='string'&&u.indexOf('/api/')===0){
    if(!o.headers["X-Device-Id"]&&!o.headers["x-device-id"]){
      o.headers["X-Device-Id"]=getOrCreateDeviceId()
    }
    // з®ЎзҗҶе‘ҳд»ӨзүҢпјҡеҰӮжһң localStorage жңү adminTokenпјҢиҮӘеҠЁйҷ„еёҰпјҲе…ҚеҗҚйўқйҷҗеҲ¶пјү
    try{
      var adminTkn=localStorage.getItem('adminToken')
      if(adminTkn)o.headers["X-Admin-Token"]=adminTkn
    }catch(e){}
  }
  return _origFetch.call(this,u,o).then(function(r){
    // еҸӘеӨ„зҗҶеҗҺз«Ҝ API зҡ„е“Қеә”пјҲеӨ–йғЁжҺҘеҸЈеҰӮи…ҫи®ҜиЎҢжғ…дёҚеҪұе“ҚйҒ®зҪ©пјү

  })
}

    async function fetchNodePages(node,pages,label){

        try{

    if(bar)bar.style.width='100%'

    // в‘ў жҹҘиҜўеҗҺз«Ҝзј“еӯҳзЎ®и®Өж•°жҚ®е·ІиҗҪзӣҳ
    try{

    setStatus('е…ЁеёӮеңәйҮҚжү«еӨұиҙҘ: '+e.message)
    txt.textContent='еӨұиҙҘ: '+e.message
  }finally{
    _rescanAll=false
    if(btn)btn.textContent='рҹҢҗ е…ЁеёӮеңәйҮҚжү«'

/** дәӨжҳ“ж—¶ж®өжҜҸ10еҲҶй’ҹпјҡжӢүжҲҗдәӨйҮҸеүҚ1000дё»жқҝ+еүҚ500еҲӣдёҡжқҝпјҢжҺЁйҖҒеҗҺз«ҜеҲҶжһҗиҰҶзӣ–ж—§зј“еӯҳ */
var _autoScanning=false
async function autoLightScan(){

  // жҜӣзҺ»з’ғйҒ®зҪ©жңӘе…ій—ӯж—¶дёҚжү§иЎҢпјҲз”ЁжҲ·е°ҡжңӘиҝӣе…ҘйЎөйқўпјү
  if(!document.getElementById('pageBlur').classList.contains('hidden'))return

    // в‘  жІӘеёӮжҢүж¶Ёи·Ңе№…жҺ’еәҸпјҢеҸ–еүҚ10йЎө(1000еҸӘ) вҶ’ иҝҮж»Ө60дё»жқҝ
    var shStocks=[]

      try{var d=JSON.parse(src);if(d&&d.length)shStocks=shStocks.concat(d)}catch(e){
        var m=src.match(/\[[\s\S]*\]/)

      }
    }
    // в‘Ў ж·ұеёӮжҢүж¶Ёи·Ңе№…жҺ’еәҸпјҢеҸ–еүҚ10йЎө(1000еҸӘ) вҶ’ иҝҮж»Ө00дё»жқҝ+30еҲӣдёҡжқҝ
    var szStocks=[]

        var m=src.match(/\[[\s\S]*\]/)
        if(m)try{var d2=JSON.parse(m[0]);if(d2&&d2.length)szStocks=szStocks.concat(d2)}catch(e2){}
      }
    }
    // в‘ў зӯӣйҖүдё»жқҝеүҚ500 + еҲӣдёҡжқҝеүҚ500
    var mainBoard=shStocks.filter(function(s){return s.code&&s.code.startsWith('60')})
    var sz00=szStocks.filter(function(s){return s.code&&s.code.startsWith('00')})
    var gem=szStocks.filter(function(s){return s.code&&s.code.startsWith('30')})
    mainBoard=mainBoard.concat(sz00).slice(0,500)
    gem=gem.slice(0,500)
    var totalList=mainBoard.concat(gem)
    if(!totalList.length)throw new Error('жңӘиҺ·еҸ–еҲ°зғӯй—ЁиӮЎзҘЁ')
    setStatus('вҸі иҪ»йҮҸжү«жҸҸ: '+totalList.length+' еҸӘзғӯй—ЁиӮЎеҲҶжһҗдёӯ...')
    // в‘Ј еҲҶжү№жҠ“KзәҝжҺЁйҖҒеҗҺз«ҜпјҲжҜҸжү№20еҸӘпјҢй—ҙйҡ”200msпјү
    var done=0,total=totalList.length

    for(var i=0;i<total;i+=20){

      done=Math.min(i+20,total)

    await doFullRescan()

  }catch(e){

// жөҸи§ҲеҷЁжӢүKзәҝ вҶ’ жҺЁйҖҒеҲ°еҗҺз«ҜеҲҶжһҗпјҲе·Ідҝ®еӨҚеӯ—ж®өеҗҚе’Ңж јејҸпјү
async function fetchKlineAndAnalyze(s){
  try{
    var code=s.code,pname=s.name||''
    var curPrice=parseFloat(s.trade)||parseFloat(s.price)||0
    var chg=parseFloat(s.changepercent)||parseFloat(s.chg)||0
    if(!curPrice)return

    // еӨҡжәҗKзәҝејәеҲ¶жӢүеҸ–пјҡдёңиҙўвҶ’ж–°жөӘвҶ’и…ҫи®ҜпјҲеҝ…йЎ»жӢүеҲ°иҮіе°‘5жқЎпјү
    var klines=null
    var emCode=code.startsWith('6')?'1.'+code:'0.'+code
    var sinCode=(code.startsWith('6')?'sh':'sz')+code
    var gtCode=sinCode  // и…ҫи®ҜеҗҢsinCodeж јејҸ
    try{
      var ac=new AbortController()
      var tid=setTimeout(function(){ac.abort()},8000)
      var kr=await fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+emCode+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=120',{signal:ac.signal,mode:'cors'}).then(function(r){return r.json()})
      clearTimeout(tid)
      if(kr&&kr.data&&kr.data.klines){
        klines=kr.data.klines.map(function(l){var p=l.split(',');return{day:p[0],open:parseFloat(p[1]),close:parseFloat(p[2]),high:parseFloat(p[3]),low:parseFloat(p[4]),volume:parseFloat(p[5]),amount:parseFloat(p[6])||0}})
      }
    }catch(e){console.warn('дёңиҙўKзәҝеӨұиҙҘ('+code+'):',e.message)}
    // ж–°жөӘеӣһйҖҖ
    if(!klines||klines.length<5){
      try{
        var ac2=new AbortController()
        var tid2=setTimeout(function(){ac2.abort()},8000)
        var sr=await fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/TechnicalService.getStocksKline?symbol='+sinCode+'&datalen=120&scale=240',{signal:ac2.signal}).then(function(r){return r.json()})
        clearTimeout(tid2)
        if(sr&&sr.data&&sr.data.length){
          klines=sr.data.map(function(l){return{day:l.day,open:parseFloat(l.open),close:parseFloat(l.close),high:parseFloat(l.high),low:parseFloat(l.low),volume:parseFloat(l.volume),amount:parseFloat(l.amount)||0}})
        }
      }catch(e){console.warn('ж–°жөӘKзәҝеӨұиҙҘ('+code+'):',e.message)}
    }
    // и…ҫи®ҜеӣһйҖҖ
    if(!klines||klines.length<5){
      try{
        var ac3=new AbortController()
        var tid3=setTimeout(function(){ac3.abort()},8000)
        var tr=await fetch('https://web.ifzq.gtimg.cn/appstock/app/kline/mkline?param='+gtCode+',m5,,120',{signal:ac3.signal}).then(function(r){return r.text()})
        clearTimeout(tid3)
        tr=tr.replace(/^var\s+\S+\s*=\s*/,'').replace(/;$/,'')
        var tj=JSON.parse(tr)
        if(tj&&tj.data&&tj.data[gtCode]&&tj.data[gtCode].m5){
          klines=tj.data[gtCode].m5.map(function(l){return{day:l[0],open:parseFloat(l[1]),close:parseFloat(l[2]),high:parseFloat(l[3]),low:parseFloat(l[4]),volume:parseFloat(l[5])||0}})
        }
      }catch(e){console.warn('и…ҫи®ҜKзәҝеӨұиҙҘ('+code+'):',e.message)}
    }
    // еҰӮжһңжүҖжңүжқҘжәҗйғҪеӨұиҙҘпјҢ1.5з§’еҗҺйҮҚиҜ•дёңиҙўдёҖж¬Ў
    if(!klines||klines.length<5){
      try{
        await new Promise(function(r){setTimeout(r,1500)})
        var ac4=new AbortController()
        var tid4=setTimeout(function(){ac4.abort()},10000)
        var kr2=await fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get2?secid='+emCode+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500101&lmt=120',{signal:ac4.signal,mode:'cors'}).then(function(r){return r.json()})
        clearTimeout(tid4)
        if(kr2&&kr2.data&&kr2.data.klines){
          klines=kr2.data.klines.map(function(l){var p=l.split(',');return{day:p[0],open:parseFloat(p[1]),close:parseFloat(p[2]),high:parseFloat(p[3]),low:parseFloat(p[4]),volume:parseFloat(p[5]),amount:parseFloat(p[6])||0}})
        }
      }catch(e){console.warn('дёңиҙўйҮҚиҜ•д№ҹеӨұиҙҘ('+code+'):',e.message)}
    }

    // е§Ӣз»ҲжҺЁйҖҒеҹәзЎҖж•°жҚ®еҲ°еҗҺз«ҜпјҲеҗ«жҲ–дёҚеҗ«Kзәҝпјү
    var payload={ code, name:pname, price:curPrice, changePercent:chg, inflow:0 }
    if(klines&&klines.length>=5)payload.kline=klines
    await fetch(API+'/gem/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).then(function(r){return r.json()})
  }catch(e){/* йқҷй»ҳи·іиҝҮ */}
}

// еүҚз«Ҝзӯ№з ҒеҲҶжһҗпјҲд»ҺKзәҝж•°жҚ®и®Ўз®—зӯ№з ҒйӣҶдёӯеәҰпјү
function calcChipAnalysis(kline){
  if(!kline||kline.length<20) return{conc:50,peak:'mid',pattern:'dispersed'}
  var closeArr=kline.map(function(k){return k.close||k.close||0})
  var highArr=kline.map(function(k){return k.high||0})
  var lowArr=kline.map(function(k){return k.low||0})
  var volArr=kline.map(function(k){return k.volume||0})
  var currentPrice=closeArr[closeArr.length-1]
  var maxH=Math.max.apply(null,highArr)
  var minL=Math.min.apply(null,lowArr)
  var range=maxH-minL
  if(range<0.01) return{conc:95,peak:'mid',pattern:'single_peak'}
  var BINS=20;var bins=[];for(var bi=0;bi<BINS;bi++)bins.push(0)
  var totalVol=0
  for(var i=Math.max(0,kline.length-120);i<kline.length;i++){
    var idx=Math.min(BINS-1,Math.floor(((closeArr[i]-minL)/range)*BINS))
    if(idx<0)idx=0
    bins[idx]+=volArr[i]
    totalVol+=volArr[i]
  }
  if(totalVol===0) return{conc:50,peak:'mid',pattern:'dispersed'}
  var sorted=[];for(var si=0;si<BINS;si++)sorted.push({bin:si,vol:bins[si]})
  sorted.sort(function(a,b){return b.vol-a.vol})
  var cum=0;var binsNeeded=0
  for(var si2=0;si2<sorted.length;si2++){
    cum+=sorted[si2].vol;binsNeeded++
    if(cum/totalVol>=0.9)break
  }
  var conc=Math.round((binsNeeded/BINS)*100)
  // жүҫзӯ№з Ғеі°дҪҚзҪ®
  var peakIdx=0;var maxVol=0
  for(var pi=0;pi<BINS;pi++){if(bins[pi]>maxVol){maxVol=bins[pi];peakIdx=pi}}
  var peakPos=peakIdx/BINS
  var peakLabel=peakPos<0.33?'low':peakPos<0.66?'mid':'high'
  // жүҫз¬¬дәҢеі°
  var peak2Idx=-1;var maxVol2=0
  for(var pj=0;pj<BINS;pj++){
    if(pj===peakIdx)continue
    if(bins[pj]>maxVol2&&bins[pj]>maxVol*0.4){maxVol2=bins[pj];peak2Idx=pj}
  }
  var pattern=peak2Idx>=0?'double_peak':'single_peak'
  if(conc<40) pattern='dispersed'
  return{conc:conc,peak:peakLabel,pattern:pattern}
}

// д»Һ K зәҝж•°жҚ®жҺЁз®—зӯ№з ҒзҠ¶жҖҒпјҲеҪ“еҗҺз«ҜжңӘжҸҗдҫӣж—¶пјү
function chipDisplay(s){
  // еҰӮжһңеҗҺз«ҜжҸҗдҫӣдәҶзӯ№з Ғж•°жҚ®пјҢзӣҙжҺҘдҪҝз”Ё
  if(s.chipConcentration90!==void 0&&s.chipConcentration90!==null&&s.chipPattern!=='dispersed'){
    var conc=s.chipConcentration90
    var peak=s.chipPeakPosition||'mid'
    var pat=s.chipPattern||'dispersed'
    return{conc:conc,peak:peak,pattern:pat}
  }
  // еҰӮжһңеүҚз«Ҝе·Іи®Ўз®—иҝҮиҠҜзүҮж•°жҚ®пјҢдҪҝз”ЁеүҚз«Ҝз»“жһң
  if(s._chipAnalyzed&&s._chipConc){
    return{conc:s._chipConc,peak:s._chipPeak,pattern:s._chipPattern}
  }
  // з”Ёд»·дҪҚе’Ңи¶ӢеҠҝзӯүдҝЎжҒҜдј°з®—
  var pos=s.pricePosition??50
  // дҪҺдҪҚеҢә(0-20)дё”ж— дјҒзЁівҶ’зӯ№з ҒеҲҶж•ЈеңЁдёӢж–№
  if(pos<20) return{conc:10,peak:'low',pattern:'dispersed'}
  // дҪҺдҪҚеҒҸдёҠ(20-40)вҶ’зӯ№з ҒйғЁеҲҶйӣҶдёӯ
  if(pos<40) return{conc:15,peak:'low',pattern:'double_peak'}
  // дёӯдҪҚ(40-60)вҶ’зӯ№з ҒйӣҶдёӯпјҢеҚ•еі°
    if(pos<60) return{conc:15,peak:'mid',pattern:'single_peak'}
  // дёӯй«ҳдҪҚ(60-80)вҶ’зӯ№з ҒејҖе§ӢеҲҶж•Ј
    if(pos<80) return{conc:25,peak:'high',pattern:'double_peak'}
  // й«ҳдҪҚ(80-100)вҶ’зӯ№з ҒеҲҶж•ЈеңЁй«ҳдҪҚ
    return{conc:40,peak:'high',pattern:'dispersed'}
}

// ---------- и…ҫи®Ҝе®һж—¶иЎҢжғ… ----------
async function fetchRealtime(codes){
  if(!codes||!codes.length)return{}
  var r={}
  for(var i=0;i<codes.length;i+=50){
    var batch=codes.slice(i,i+50)
    var q=batch.map(function(c){return (c.startsWith('6')?'sh':'sz')+c}).join(',')
    try{
      var res=await fetch('https://qt.gtimg.cn/q='+q)
      var buf=await res.arrayBuffer()
      var txt=decodeGBK(buf)
      var lines=txt.split(';')
      lines.forEach(function(line){
        if(line.indexOf('~')<0)return
        var p=line.split('~')
        if(p.length<35||!p[2])return
        var code=p[2]
        if(code) r[code]={price:parseFloat(p[3])||0,yc:parseFloat(p[4])||0,volume:parseFloat(p[6])||0,chg:parseFloat(p[31])||0,chgP:parseFloat(p[32])||0,open:parseFloat(p[5])||0,high:parseFloat(p[33])||0,low:parseFloat(p[34])||0}
      })
    }catch(e){}
  }
  return r
}

function renderList(){
  // жҜӣзҺ»з’ғеҸҜи§Ғж—¶еҸӘзј“еӯҳдёҚжёІжҹ“UI
  var isBlurred=!$('pageBlur').classList.contains('hidden')
  if(isBlurred&&stocks.length){return}
  var list=$('stockList');list.innerHTML=''
  if(stocks.length===0){list.innerHTML='<div class="empty">жҡӮж— з¬ҰеҗҲжқЎд»¶зҡ„дёӘиӮЎ</div>';$('footer').textContent='вҸёпёҸ зӯүеҫ…жү«жҸҸ';return}
  var scanSummary='вң… Top'+stocks.length+' | е®һж—¶ | 10еҲҶй’ҹиҮӘеҠЁеҲ·ж–°В·иҰҶзӣ–ж—§ж•°жҚ®'
  if(window._lastScanCount&&window._lastScanCount>0)scanSummary+=' | е·Іжү«жҸҸ '+window._lastScanCount+' еҸӘиӮЎзҘЁ'
  $('footer').textContent=scanSummary
  // и®Ўз®—дҝЎеҸ·еҲҶеёғжҳҫзӨәеңЁзҠ¶жҖҒж Ҹ
  var _sigC={};stocks.forEach(function(s){var sg=s.suggestion||'жңӘзҹҘ';_sigC[sg]=(_sigC[sg]||0)+1});var _sigS=[];
  if(_sigC['йҮҚд»“д№°е…Ҙ']){_sigS.push('рҹ”ҘйҮҚд»“д№°е…Ҙ'+_sigC['йҮҚд»“д№°е…Ҙ']+'еҸӘ')}
  if(_sigC['д№°е…Ҙ']){_sigS.push('вң…д№°е…Ҙ'+_sigC['д№°е…Ҙ']+'еҸӘ')}
  if(_sigC['иҪ»д»“д№°е…Ҙ']){_sigS.push('вҡӘиҪ»д»“д№°е…Ҙ'+_sigC['иҪ»д»“д№°е…Ҙ']+'еҸӘ')}
  setStatus('вң… Top'+stocks.length+': '+_sigS.join(' | ')+' | '+lastScanTime)
  if(lastScanTime){try{$('lastScanDisplay').textContent='ж•°жҚ®жӣҙж–°дәҺ '+lastScanTime}catch(e){}}
  stocks.forEach(function(s,i){
    var rt=realtimePrices[s.code]||{}
    var price=rt.price||s.currentPrice||0
    var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
    var chgClr=chg>=0?'#ef4444':'#22c55e'
    var p=s.pricePosition??50
    var posClr=p<50?'#22c55e':p<80?'#eab308':'#ef4444'
    var sg=sigColor(s)
    var chgT=(chg>=0?'+':'')+chg.toFixed(2)+'%'
    var card=document.createElement('div');card.className='stock-card'+(selectedIdx===i?' selected':'')
    card.onclick=function(){showDetail(i)}
    card.innerHTML='<div class="stock-row"><div class="stock-info"><span class="rank-badge '+(i<3?'rank-top3':'rank-other')+'">#'+(i+1)+'</span><div style="min-width:0;flex:1"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.name+'</div><div style="font-size:10px;color:#999">'+s.code+'</div></div></div><span class="signal-badge" style="background:'+sg+'">'+(s.suggestion||'-')+'</span><span class="price">'+price.toFixed(2)+'</span><span class="chg" style="color:'+chgClr+'">'+chgT+'</span><span class="pos" style="color:'+posClr+'">'+p.toFixed(0)+'%</span></div>'
    list.appendChild(card)
  })

async function doScan(){
  // жҜӣзҺ»з’ғеҸҜи§Ғж—¶пјҲжңӘжіЁеҶҢпјүпјҢд»…зј“еӯҳж•°жҚ®дёҚжӣҙж–°з•Ңйқў
  var isBlurred=!$('pageBlur').classList.contains('hidden')
  if(isBlurred&&loading)return
  if(loading)return;loading=true;$('scanBtn').disabled=true;$('scanBtn').textContent='жү«жҸҸдёӯ...'
  stopPriceRefresh()
  setStatus('рҹ”„ иҺ·еҸ–еҲҶжһҗж•°жҚ®...')
  try{
    var r=await fetch(API+'/gem/top/combined?force=true&_='+Date.now())
    var d=await r.json()
    if(d.code!==200||!d.data||!d.data.opportunities){
      if(d.code===429){loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='рҹ”„ з«ӢеҚіжү«жҸҸ';return}
      // еҗҺз«Ҝж— ж•°жҚ®вҶ’иҮӘеҠЁеҲҮе…ЁеёӮеңәйҮҚжү«
      setStatus('вҡ пёҸ еҗҺз«Ҝж— ж•°жҚ®пјҢиҮӘеҠЁеҲҮе…ЁеёӮеңәйҮҚжү«...');loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='рҹ”„ з«ӢеҚіжү«жҸҸ';
      doFullRescan();return
    }
    stocks=d.data.opportunities
	    console.log("рҹ“Ҡ жңәдјҡеҢәж”¶еҲ°"+stocks.length+"еҸӘ,жңүforecast1_2Day:"+stocks.filter(function(s){return s.forecast1_2Day}).length+"еҸӘ,йҰ–еҸӘ:",stocks[0]?.code,stocks[0]?.forecast1_2Day||"ж— ")
    // жҺ’еәҸпјҡдҝЎеҸ·дјҳе…Ҳзә§ вҶ’ е…Ҙеңәж—¶жңә вҶ’ з»јеҗҲиҜ„еҲҶ вҶ’ д»Ҡж—Ҙж¶Ёе№…(йҷҚеәҸ)
    var PRI={'йҮҚд»“д№°е…Ҙ':0,'д№°е…Ҙ':1,'иҪ»д»“д№°е…Ҙ':2,'жҢҒжңү':3,'еҮҸд»“':4,'еҚ–еҮә':5,'дёҚиҰҒд»Ӣе…Ҙ':6}
    stocks.sort(function(a,b){
      var pa=PRI[a.suggestion||'жҢҒжңү']??9,pb=PRI[b.suggestion||'жҢҒжңү']??9
      if(pa!==pb) return pa-pb
      var ea=a.entryTiming||0, eb=b.entryTiming||0
      if(eb!==ea) return eb-ea
      if((b.score||0)!==(a.score||0)) return (b.score||0)-(a.score||0)
      return (b.changePercent||0)-(a.changePercent||0)
    })
    // еҗҺз«Ҝж•°жҚ®дёҚи¶іж—¶(пјң5еҸӘ)пјҢиҮӘеҠЁеҲҮжҚўеҲ°е…ЁеёӮеңәйҮҚжү«пјҲйҖҡиҝҮиҒҡеҗҲз«ҜзӮ№жҠ“е®һж—¶Sinaж•°жҚ®пјү
    if(stocks&&stocks.length<5){
      console.log('вҡ пёҸ еҗҺз«Ҝж•°жҚ®дёҚи¶і('+stocks.length+'еҸӘ)пјҢеҲҮжҚўе…ЁеёӮеңәйҮҚжү«...')
      setStatus('вҡ пёҸ еҗҺз«Ҝж•°жҚ®дёҚи¶іпјҢиҮӘеҠЁеҲҮеҲ°е…ЁеёӮеңәйҮҚжү«...')
      // дёҚеӯҳ2еҸӘеҲ°зј“еӯҳпјҲйҒҝе…ҚйЎөйқўеҠ иҪҪж—¶жҳҫзӨәиҝҮж—¶ж•°жҚ®пјү
      loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='рҹ”„ з«ӢеҚіжү«жҸҸ'
      doFullRescan()
      return
    }
    // дёҚеҶҚзј“еӯҳеҲ°localStorageпјҢжҜҸж¬Ўеұ•зӨәд»ҘжңҖж–°ж•°жҚ®и®Ўз®—дёәеҮҶ
    // жҜӣзҺ»з’ғеҸҜи§Ғж—¶дёҚжҳҫзӨәз»“жһңпјҢеҸӘзј“еӯҳ
    if(isBlurred){
      loading=false;$('scanBtn').disabled=false;$('scanBtn').textContent='рҹ”„ з«ӢеҚіжү«жҸҸ'
      return
    }
    setStatus('рҹ”„ иҺ·еҸ–е®һж—¶иЎҢжғ…...')
    realtimePrices=await fetchRealtime(stocks.map(function(s){return s.code}))

              var chip=calcChipAnalysis(kd)

}

/** еёҰйҮҚиҜ•зҡ„fetchпјҢеӨ„зҗҶ429йҷҗжөҒ+502еҒ¶е°”жү“дёҚејҖ+зҪ‘з»ңй—Әж–ӯ */
async function fetchWithRetry(url,retries){
  for(var r=0;r<retries;r++){
    try{
      var fResp=await fetch(url,{signal:timeoutSignal(20000)})
      if(fResp.ok) return fResp
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return fResp
    }catch(e){
      if(r<retries-1){
        await new Promise(ok=>setTimeout(ok,2000))
        continue
      }
      return null
    }
  }
  return null
}

// ---------- е…ЁеёӮеңәйҮҚжү«пјҲдёңж–№иҙўеҜҢе…ЁйҮҸпјҡдё»жқҝ+еҲӣдёҡжқҝпјү ----------
async function doFullRescan(){

  // 1. зј“еӯҳйҮҚеҲҶжһҗпјҲзһ¬й—ҙпјү
  var newStocks=[]
  try{
    var cr=await fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(15000)})

  }catch(e){

  }
  
  // rescanиў«жӢҰжҲӘ(429)ж—¶пјҢдёҚеҶҚд»ҺlocalStorageеӣһйҖҖвҖ”вҖ”ж•°жҚ®з©әеҲҷжҳҫзӨәз©әеҲ—иЎЁ
  if(newStocks.length===0){
    console.warn('вҡ пёҸ еҗҺз«Ҝзј“еӯҳдёәз©әпјҢйңҖе…Ҳжү§иЎҢе…ЁеёӮеңәйҮҚжү«')
    loading=false; doFreshSina=true
  }else{
    setStatus('рҹ”„ зј“еӯҳе·ІеҲҶжһҗ '+newStocks.length+' еҸӘпјҢе№¶иЎҢжҠ“еҸ–е®һж—¶иЎҢжғ…...')
  }
  
  // 2. д»Һдёңж–№иҙўеҜҢиҺ·еҸ–е…ЁйҮҸиӮЎзҘЁпјҲеҸ–д»ЈеҺҹSinaд»ЈзҗҶеӨҡйЎөе№¶иЎҢпјү
  //    иҰҶзӣ–пјҡжІӘж·ұдё»жқҝ(600601603605000001002) + еҲӣдёҡжқҝ(300301)
  setStatus('рҹ”„ зј“еӯҳе·ІеҲҶжһҗ '+newStocks.length+' еҸӘпјҢд»Һдёңж–№иҙўеҜҢиҺ·еҸ–е…ЁйҮҸжҺ’еәҸ...')
  
  // жІӘж·ұдё»жқҝпјҡ60ејҖеӨҙпјҲжҺ’йҷӨ688з§‘еҲӣжқҝпјү, 00ејҖеӨҙпјҲеҗ«000/001/002пјү
  function isMainBoard(c){return /^60/.test(c)||/^00/.test(c)}
  // еҲӣдёҡжқҝд»Јз ҒеүҚзјҖ
  function isGEM(c){return /^30/.test(c)}
  
  // жөҸи§ҲеҷЁзӣҙиҝһж–°жөӘиҺ·еҸ–е®һж—¶иЎҢжғ…пјҲдёҚз»ҸиҝҮеҗҺз«Ҝд»ЈзҗҶпјҢйҒҝе…ҚUSи¶…ж—¶пјү
  var emData=[]
  var scanCount=0
  try{
    setStatus('рҹ”„ жөҸи§ҲеҷЁжӢүеҸ–Sinaе…ЁеёӮеңәиЎҢжғ…...')
    async function fetchAllSinaPages2(node){
      var all=[]
      var promises=[]
      for(var p=1;p<=30;p++){
        promises.push(
          fetch('https://vip.stock.finance.sina.com.cn/quotes_service/api/json_v2.php/Market_Center.getHQNodeData?page='+p+'&num=100&sort=symbol&asc=1&node='+node,{signal:AbortSignal.timeout(15000)})
            .then(function(r){return r.text()})
            .then(function(src){
              src=src.replace(/^var\s+\w+\s*=\s*/,'').replace(/;$/,'')
              try{
                var d=JSON.parse(src)
                if(d&&d.length)all=all.concat(d)
              }catch(e){
                var m=src.match(/\[[\s\S]*\]/)
                if(m)try{var d2=JSON.parse(m[0]);if(d2&&d2.length)all=all.concat(d2)}catch(e2){}
              }
            })
        )
      }
      await Promise.all(promises)
      return all
    }
    var [listSH,listSZ]=await Promise.all([fetchAllSinaPages2('sh_a'),fetchAllSinaPages2('sz_a')])
    var list=listSH.concat(listSZ)
    if(list&&list.length){
      var seenCodes={}
      for(var si=0;si<list.length;si++){
        var sc=list[si],c=String(sc.code||'')
        if(!c||seenCodes[c])continue
        seenCodes[c]=1
        emData.push({f12:c,f14:sc.name||'',f2:parseFloat(sc.trade)||0,f3:parseFloat(sc.changepercent)||0,f15:parseFloat(sc.high)||0,f16:parseFloat(sc.low)||0})
      }
    }
    scanCount=emData.length
    window._lastScanCount=scanCount
    updateScanCount(scanCount)
    setStatus('вң… жөҸи§ҲеҷЁжӢүеҸ–Sina '+scanCount+' еҸӘпјҢдёҺзј“еӯҳеҗҲе№¶жҺ’еәҸдёӯ...')
  }catch(e){
    console.log('вҡ пёҸ жөҸи§ҲеҷЁSinaжӢүеҸ–еӨұиҙҘ:',e.message)
    scanCount=newStocks.length
    window._lastScanCount=scanCount
    updateScanCount(scanCount)
    setStatus('рҹ”„ '+newStocks.length+' еҸӘзј“еӯҳпјҢжҢүдҝЎеҸ·+иҜ„еҲҶжҺ’еәҸдёӯ...')
  }
  
  var seen={}
  for(var si2=0;si2<newStocks.length;si2++)if(newStocks[si2].code)seen[newStocks[si2].code]=1
  var seenInSina={}  // и·ҹиёӘе“Әдәӣзј“еӯҳиӮЎеңЁSinaдёӯиў«жүҫеҲ°
  
  var mainBoardCount=0,gemCount=0
  
  for(var ei=0;ei<emData.length;ei++){
    var item=emData[ei]
    var code=String(item.f12||'')
    var name=(item.f14||'').trim()
    if(!code||!name||name.startsWith('*')||name.startsWith('ST')||name.startsWith('N')||name.startsWith('C'))continue
    
    if(!isMainBoard(code)&&!isGEM(code))continue
    
    var price=parseFloat(item.f2)||0
    if(price<3)continue
    var chg=parseFloat(item.f3)||0
    
    // еҹәдәҺд»Ҡж—Ҙж¶Ёе№…и®Ўз®—е®һж—¶дҝЎеҸ·/иҜ„еҲҶпјҲзј“еӯҳиӮЎе’Ңж–°иӮЎйғҪз”ЁиҝҷдёӘпјү
    var liveScore=Math.round(30+Math.abs(chg)*2)
    var liveSuggestion='жҢҒжңү'
    // ж¶ЁеҒңйЈҺйҷ©жҺ§еҲ¶пјҡ10cmдё»жқҝж¶Ёи¶…6%дёҚжҺЁиҚҗиҝҪй«ҳпјӣ20cmеҲӣдёҡжқҝж¶Ёи¶…15%еҗҢзҗҶ
    if((isMainBoard(code)&&chg>9)||(isGEM(code)&&chg>15))continue
    if(chg>=9)liveSuggestion='йҮҚд»“д№°е…Ҙ'
    else if(chg>=6)liveSuggestion='д№°е…Ҙ'
    else if(chg>=3)liveSuggestion='иҪ»д»“д№°е…Ҙ'
    else if(chg>=1)liveSuggestion='жҢҒжңү'
    var liveEntryTiming=chg>0?Math.round(Math.min(chg*10,100)):0
    
    // еҲӨж–ӯеёӮеңәжҳҜеҗҰжңүзңҹе®һжіўеҠЁпјҡдәӨжҳ“ж—¶ж®өдё”жңүе®һйҷ…ж¶Ёи·Ң
    // жңүзңҹе®һж¶Ёи·Ңе№…еҲҷдҪҝз”Ёе®һж—¶иҜ„еҲҶпјҲSinaиҝ”еӣһжңҖеҗҺдәӨжҳ“ж—¶ж®өж•°жҚ®пјҢйқһдәӨжҳ“ж—¶ж®өд№ҹжңүж•Ҳпјү
    var hasLiveData = true  // Sinaиҝ”еӣһзҡ„йғҪжңүе®һж—¶иЎҢжғ…пјҢchg=0иҜҙжҳҺзңҹжІЎж¶Ёи·Ң
    
    // е·Ізј“еӯҳдёӘиӮЎпјҡз”Ёе®һж—¶ж•°жҚ®жӣҙж–°д»·ж ј/ж¶Ёе№…пјҢеҗҢж—¶жҢүи§„еҲҷеҒҡдҝЎеҸ·еҗҲе№¶
    if(seen[code]){
      for(var si3=0;si3<newStocks.length;si3++){
        if(newStocks[si3].code===code){
          newStocks[si3].currentPrice=price
          newStocks[si3].changePercent=chg
          newStocks[si3].intradayHigh=item.f15
          newStocks[si3].intradayLow=item.f16
          if(hasLiveData){
            newStocks[si3].score=liveScore
            newStocks[si3].entryTiming=liveEntryTiming
            // в”Җв”Җв”Җ дҝЎеҸ·еҗҲе№¶и§„еҲҷ в”Җв”Җв”Җ
            // Step в‘Ў: еҗҺз«Ҝе»әи®®жҳҜи§Ӯжңӣ/жҢҒжңү/еҮҸд»“/еҚ–еҮә/дёҚиҰҒд»Ӣе…Ҙ вҶ’ дҝқжҢҒдёҚеҠЁпјҢдёҚеҸ—chgеҪұе“Қ
            var BACKEND_SELL=['еҮҸд»“','еҚ–еҮә','дёҚиҰҒд»Ӣе…Ҙ']
            var backendSug=newStocks[si3].suggestion
            if(backendSug && BACKEND_SELL.indexOf(backendSug)===-1){
              // еҗҺз«ҜжҳҜд№°е…ҘдҝЎеҸ·пјҲйҮҚд»“д№°е…Ҙ/д№°е…Ҙ/иҪ»д»“д№°е…ҘпјүвҶ’ з»“еҗҲиҜ„еҲҶйў„жөӢ+е®һж—¶ж•°жҚ®еҒҡеҚҮзә§
              var PRI_ORDER=['йҮҚд»“д№°е…Ҙ','д№°е…Ҙ','иҪ»д»“д№°е…Ҙ','и§Ӯжңӣ','жҢҒжңү','еҮҸд»“','еҚ–еҮә','дёҚиҰҒд»Ӣе…Ҙ']
              var upgSug = liveSuggestion  // й»ҳи®Өз”Ёе®һж—¶ж•°жҚ®
              var fp = newStocks[si3].forecast1_2Day
              if(fp && fp.direction){
                if(fp.direction === 'ејәзғҲзңӢж¶Ё'){
                  // иҜ„еҲҶйў„жөӢејәзғҲзңӢж¶Ё вҶ’ е®һж—¶дҝЎеҸ·еҶҚеҚҮдёҖзә§пјҲд№°е…ҘвҶ’йҮҚд»“д№°е…Ҙпјү
                  var idx=PRI_ORDER.indexOf(upgSug)
                  if(idx>0) upgSug=PRI_ORDER[idx-1]
                } else if(fp.direction==='йңҮиҚЎеҒҸејә'||fp.direction==='йңҮиҚЎ'||fp.direction==='ж–№еҗ‘дёҚжҳҺ'){
                  // иҜ„еҲҶйў„жөӢйңҮиҚЎжҲ–ж–№еҗ‘дёҚжҳҺ вҶ’ дёҚиҝҮеәҰжҝҖиҝӣпјҢдҝқжҢҒеҗҺз«ҜеҺҹе§ӢдҝЎеҸ·
                  upgSug = backendSug
                }
                // зңӢж¶Ё вҶ’ з”Ёе®һж—¶ж•°жҚ®жң¬иә«
              }
              if(PRI_ORDER.indexOf(upgSug) < PRI_ORDER.indexOf(backendSug)){
                newStocks[si3].suggestion=upgSug
              }
            }
            // в”Җв”Җв”Җ е®һж—¶дёүйҮҚеҚ–зӮ№жЈҖжөӢпјҲд»…еҗҺз«ҜжңӘеҲӨе®ҡеҚ–еҮәж—¶з”ҹж•Ҳпјүв”Җв”Җв”Җ
            if(BACKEND_SELL.indexOf(backendSug)===-1){
              // в‘  жҡҙи·ҢжЈҖжөӢпјҲchg вүӨ -5%пјүвҶ’ иҰҶзӣ–жүҖжңүд№°е…Ҙ
              if(chg <= -5){
                newStocks[si3].suggestion='еҚ–еҮә'
              }
              // в‘Ў еқҮзәҝжӯ»еҸүжЈҖжөӢпјҡMA5<MA10 жӯ»еҸү + еҸҚеј№ж— еҠӣ(chg<2%) вҶ’ дёҚиҰҒд»Ӣе…Ҙ
              if(newStocks[si3].isGoldenCross===false && chg < 2 && chg >= 0){
                newStocks[si3].suggestion='дёҚиҰҒд»Ӣе…Ҙ'
              }
              // в‘ў з ҙ5ж—ҘзәҝжЈҖжөӢпјҡд»· < MA5Г—0.98 жҲ– д»· < MA10 вҶ’ еҚ–еҮә
              var ma5=newStocks[si3].ma5, ma10=newStocks[si3].ma10
              if(ma5 && ma10){
                if(price < ma5*0.98 || price < ma10){
                  newStocks[si3].suggestion='еҚ–еҮә'
                }
              }
            }
          }
          break
        }
      }
      seenInSina[code]=1  // ж Үи®°иҜҘзј“еӯҳиӮЎеңЁSinaдёӯиў«жүҫеҲ°
      continue
    }
    
    // в”Җв”Җв”Җ ж–°иӮЎдәҢж¬Ўе®үе…Ёж ЎйӘҢпјҡжҹҘеҗҺз«Ҝзј“еӯҳжҳҜеҗҰе·ІжңүиҜҘиӮЎпјҲеҸҜиғҪseenеҢ№й…ҚеӨұиҙҘдҪҶзј“еӯҳдёӯзЎ®жңүж•°жҚ®пјүв”Җв”Җв”Җ
    var _cacheInNewStk=null;
    for(var _bb=0;_bb<newStocks.length;_bb++){
      if(newStocks[_bb].code===code){_cacheInNewStk=newStocks[_bb];break}
    }
    if(_cacheInNewStk){
      // зј“еӯҳе·ІжңүиҜҘиӮЎдё”е»әи®®жҳҜжҢҒжңү/еҮҸд»“/еҚ–еҮә/дёҚиҰҒд»Ӣе…Ҙ/и§Ӯжңӣ вҶ’ зҰҒжӯўз”Ёж¶Ёе№…еҚҮзә§
      if(['жҢҒжңү','еҮҸд»“','еҚ–еҮә','дёҚиҰҒд»Ӣе…Ҙ','и§Ӯжңӣ'].indexOf(_cacheInNewStk.suggestion)>=0){
        _cacheInNewStk.currentPrice=price;
        _cacheInNewStk.changePercent=chg;
        _cacheInNewStk.intradayHigh=item.f15;
        _cacheInNewStk.intradayLow=item.f16;
        seenInSina[code]=1;
        continue;  // и·іиҝҮж–°иӮЎи·Ҝеҫ„пјҢдҝқжҢҒзј“еӯҳеҺҹжңүе»әи®®
      }
      // зј“еӯҳжҳҜд№°е…ҘдҝЎеҸ·дҪҶжІЎеҢ№й…ҚеҲ°seen вҶ’ иө°еҚҮзә§йҖ»иҫ‘
      // жӣҙж–°е®һж—¶ж•°жҚ®еҗҺз»§з»ӯеҫҖдёӢиө°пјҲдёҚж·»еҠ дёәж–°иӮЎпјү
      _cacheInNewStk.currentPrice=price;
      _cacheInNewStk.changePercent=chg;
      _cacheInNewStk.intradayHigh=item.f15;
      _cacheInNewStk.intradayLow=item.f16;
      _cacheInNewStk.score=liveScore;
      _cacheInNewStk.entryTiming=liveEntryTiming;
      var _bks=_cacheInNewStk.suggestion;
      var _LIVE_PRI=['йҮҚд»“д№°е…Ҙ','д№°е…Ҙ','иҪ»д»“д№°е…Ҙ','и§Ӯжңӣ','жҢҒжңү','еҮҸд»“','еҚ–еҮә','дёҚиҰҒд»Ӣе…Ҙ'];
      if(_LIVE_PRI.indexOf(liveSuggestion) < _LIVE_PRI.indexOf(_bks)){
        _cacheInNewStk.suggestion=liveSuggestion;
        console.log('рҹ”Қ йҷҚзә§дҝ®еӨҚпјҡзј“еӯҳиӮЎ '+code+' жңӘеҢ№й…ҚseenпјҢдҪҶе…Ғи®ёд»Һ '+_bks+' еҚҮзә§еҲ° '+liveSuggestion);
      }
      seenInSina[code]=1;
      continue;
    }
    // ж–°еўһдёӘиӮЎж•°йҮҸжҺ§еҲ¶пјҲйқһзј“еӯҳзҡ„еҲҶжһҗж–°йқўеӯ”пјү
    if(isMainBoard(code)){if(mainBoardCount>=200)continue;mainBoardCount++}
    else if(isGEM(code)){if(gemCount>=200)continue;gemCount++}
    seen[code]=1
    seenInSina[code]=1  // ж Үи®°ж–°иӮЎд№ҹеңЁSinaдёӯжүҫеҲ°пјҢйҒҝе…Қиў«йҷҚзә§
    
    newStocks.push({code:code,name:name,currentPrice:price,

          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        for(var sp=1;sp<=6;sp++){
          var r=await fetchWithRetry('/api/gem/proxy/stock-list?node=cyb&page='+sp+'&num=100&sort=changepercent&asc=0',3)
          if(!r)break
          var d=await r.json()
          if(d.code!==200||!d.data||!d.data.length)break
          sinaAll2.push(...d.data)
          if(d.data.length<100)break
        }
        var seen={}
        all=[]
        for(var si=0;si<sinaAll2.length;si++){
          var sc=sinaAll2[si],c=String(sc.code||''),n=(sc.name||'').trim()
          if(!c||!n||seen[c]||n.startsWith('*')||n.startsWith('ST')||n.startsWith('N'))continue
          seen[c]=1
          if(c.startsWith('688')||c.startsWith('689')||c.startsWith('4')||c.startsWith('8')||c.startsWith('920'))continue
          all.push({symbol:c,name:n})
        }
      }catch(e2){}
    }
    SEARCH_CACHE=all
    return all
  })()
  SEARCH_CACHE_LOAD=prom
  var result=await prom
  return result
}

// ---------- GBKеӯ—иҠӮвҶ’ж–Үжң¬пјҲе…је®№iOSпјҡTextDecoderеӨұиҙҘеҲҷжүӢеҠЁжҸҗеҸ–ASCIIпјү ----------
function decodeGBK(buf){
  try{return new TextDecoder('gbk').decode(buf)}catch(e){}
  // жүӢеҠЁжҸҗеҸ–ASCIIеӯ—з¬ҰпјҲж•°еӯ—/е°Ҹж•°зӮ№/иҝһеӯ—з¬Ұ/жіўжөӘеҸ·зӯүеқҮеңЁASCIIиҢғеӣҙпјү
  var bytes=new Uint8Array(buf),a=[]
  for(var i=0;i<bytes.length;i++) a.push(String.fromCharCode(bytes[i]))
  return a.join('')
}
// ---------- жҹҘи…ҫи®ҜиЎҢжғ…пјҲGBKи§Јз ҒпјҢе…је®№жүҖжңүжөҸи§ҲеҷЁпјү ----------
async function fetchTencentDetail(code,market){
  if(!code)return null
  var m=market||(code.startsWith('6')?'sh':code.startsWith('92')||code.startsWith('4')||code.startsWith('8')?'bj':'sz')
  try{
    var res=await fetch('https://qt.gtimg.cn/q='+m+code)
    var buf=await res.arrayBuffer()
    var txt=decodeGBK(buf)
    var p=txt.split('~')
    if(p.length<40||!p[1]||p[1]==='-'||p[1]===code)return null
    return {
      name: p[1]||null, code: p[2]||code, market: m,
      price: parseFloat(p[3])||0, yc: parseFloat(p[4])||0,
      chg: parseFloat(p[31])||0, chgP: parseFloat(p[32])||0,
      high: parseFloat(p[33])||0, low: parseFloat(p[34])||0
    }
  }catch(e){return null}
}
async function fetchSinaUS(code){
  try{
    var res=await fetch('/api/gem/proxy/sina-us?code='+code)
    var body=await res.json()
    var txt=body.data
    if(!txt)return null
    var data=txt.split('"')[1]
    if(!data)return null
    var p=data.split(',')
    if(!p||p.length<5||!p[1])return null
    return {
      name: p[0], code: code.toUpperCase(), market: 'us',
      price: parseFloat(p[1])||0, yc: 0,
      chg: parseFloat(p[4])||0, chgP: parseFloat(p[2])||0,
      high: parseFloat(p[5])||0, low: parseFloat(p[6])||0
    }
  }catch(e){return null}
}

// ---------- жҗңзҙўпјҲеүҚз«Ҝе…ҲжӢҝзңҹе®һеҗҚз§°+иӮЎд»·пјҢеҶҚи°ғеҗҺз«ҜеҲҶжһҗпјү ----------
async function doSearch(){
  var v=$('searchInput').value.trim();if(!v)return
  // е…ҲжЈҖжҹҘи®ҫеӨҮжқғйҷҗпјҡжҗңиӮЎзҘЁд№ҹиҰҒз»ҸиҝҮеҗҺз«Ҝ guard йӘҢиҜҒ
  try{
    var _reg=await fetch('/api/device/register',{method:'POST',headers:{'X-Device-Id':getOrCreateDeviceId(),'Content-Type':'application/json'},body:'{}'})
    if(_reg.status===429){showBlocked(true);setTimeout(function(){$('searchInput').focus()},100);return}
  }catch(e){/* зҪ‘з»ңејӮеёёпјҢж”ҫиЎҢ */}
  var da=$('detailArea');da.style.display='none';isDetailView=false

  // е…је®№жҢҮж•°д»Јз Ғпјҡ1A0001=дёҠиҜҒжҢҮж•°
  if(/^1a\d{4}$/i.test(v)){v=v.replace(/^1a/i,"00");var isIndex=true}

  // еҲӨж–ӯиҫ“е…Ҙзұ»еһӢпјҡAиӮЎд»Јз Ғ(6дҪҚ)/жёҜиӮЎ(5дҪҚ)/зҫҺиӮЎ(еҗ«еӯ—жҜҚ)/еҢ—дәӨжүҖ(92/4/8ејҖеӨҙ)
  var isCode=/^\d{6}$/.test(v)||/^9\d{5}$/.test(v)||/^[48]\d{5}$/.test(v)
  var isHK=/^\d{5}$/.test(v)
  var isUS=/[a-zA-Z]/.test(v)&&!/^\d/.test(v)&&!/^1a/i.test(v)


  var stockName='',stockCode='',stockPrice=0,stockChgP=0,stockHigh=0,stockLow=0,stockMarket=''
  
  // з¬¬дёҖжӯҘпјҡзЎ®е®ҡд»Јз Ғе’Ңзңҹе®һеҗҚз§°пјҲеӨҡеёӮеңәйӘҢиҜҒпјү
  if(isCode||isHK||isUS){
    if(isIndex){stockMarket='sh';t=await fetchTencentDetail(v,'sh');if(t){stockName=t.name;stockPrice=t.price;stockChgP=t.chgP;stockHigh=t.high;stockLow=t.low}}else
    stockCode=v
    // еӨҡеёӮеңәжҹҘиҜўпјҡAиӮЎ(sz/sh)вҶ’жёҜиӮЎ(hk)вҶ’зҫҺиӮЎ(us)
    var t=null
    if(isCode){
      t=await fetchTencentDetail(v,'sz');if(!t)t=await fetchTencentDetail(v,'sh')
      if(!t&&isHK)t=await fetchTencentDetail(v,'hk')
    }else if(isHK){
      t=await fetchTencentDetail(v,'hk');if(!t)t=await fetchTencentDetail(v,'sz')
    }else if(isUS){
      t=await fetchSinaUS(v)
    }
    if(t){stockName=t.name;stockPrice=t.price;stockChgP=t.chgP;stockHigh=t.high;stockLow=t.low;stockMarket=t.market}
    else{
      $('searchError').style.display='block';$('detailArea').style.display='none';return
    }
  }else{
    // еҗҚз§°жҗңзҙўпјҡд»Һдёңж–№иҙўеҜҢжҗңзҙўд»ЈзҗҶжҹҘе…ЁAиӮЎ
    try{
      var r=await fetch('/api/gem/proxy/search?q='+encodeURIComponent(v))
      var d=await r.json()
      var items=d&&d.data
      if(items&&items.length){
        // еҸ–з¬¬дёҖдёӘAиӮЎз»“жһңпјҲжҺ’йҷӨETF/жҢҮж•°пјү
        var hit=items.find(function(x){return x.SecurityTypeName==='AиӮЎ'||x.Code.startsWith('3')||x.Code.startsWith('6')||x.Code.startsWith('0')||x.Code.startsWith('1')})
        if(!hit)hit=items[0]

  if(isTH()){
    // дәӨжҳ“ж—¶ж®ө вҶ’ е…ҲиҜ»еҗҺз«Ҝзј“еӯҳзӣҙжҺҘеұ•зӨәпјҢеҗҺеҸ°жёҗиҝӣејҸеҲ·ж–°
    fetch(API+'/gem/rescan',{signal:AbortSignal.timeout(10000)})
      .then(function(r){return r.json()})
      .then(function(d){
        if(d.code===200&&d.data&&d.data.length){
          var ALLOWED={'йҮҚд»“д№°е…Ҙ':1,'д№°е…Ҙ':1}
          stocks=d.data.filter(function(s){return ALLOWED[s.suggestion]?1:0})
          if(stocks.length){
            // жҢҒд№…еҢ–еҲ°жөҸи§ҲеҷЁжң¬ең°пјҢдёӢж¬ЎеҗҺз«Ҝж— зј“еӯҳж—¶еҸҜзӣҙжҺҘеұ•зӨә
            try{localStorage.setItem('cache_snapshot',JSON.stringify({stocks:d.data,ts:Date.now()}))}catch(e){}
            renderList()
            setStatus('рҹ“Ӣ зј“еӯҳе·ІеҠ иҪҪ '+stocks.length+' еҸӘпјҲеҗҺеҸ°еҲ·ж–°дёӯ...пјү')
          }else{
            setStatus('вҸі зј“еӯҳдёӯжңү '+d.data.length+' еҸӘпјҢдҪҶж— ж»Ўи¶іжқЎд»¶зҡ„д№°е…ҘдҝЎеҸ·')
          }
        }else{
          // еҗҺз«Ҝж— зј“еӯҳ вҶ’ е°қиҜ•жҒўеӨҚжөҸи§ҲеҷЁз«Ҝжң¬ең°еҝ«з…§
          try{
            var snap=localStorage.getItem('cache_snapshot')
            if(snap){
              var s=JSON.parse(snap)
              if(s&&s.stocks&&s.stocks.length){
                var ALLOWED={'йҮҚд»“д№°е…Ҙ':1,'д№°е…Ҙ':1}
                stocks=s.stocks.filter(function(s2){return ALLOWED[s2.suggestion]?1:0})
                if(stocks.length){
                  renderList()
                  setStatus('рҹ“Ӣ жң¬ең°еҝ«з…§жҒўеӨҚ '+stocks.length+' еҸӘпјҲжңҚеҠЎеҷЁе·ІйҮҚеҗҜпјҢеҗҺеҸ°йҮҚе»әзј“еӯҳдёӯ...пјү')
                  return // и·іиҝҮдёӢйқўзҡ„setStatus
                }
              }
            }
          }catch(e){}
          setStatus('вҸі еҗҺз«Ҝзј“еӯҳдёәз©әпјҢжӯЈеңЁйҰ–ж¬Ўжү«жҸҸжһ„е»ә...')

async function fetchMarketState(){
  try{
    var r=await fetch(API+'/gem/market-state',{signal:timeoutSignal(5000)})
    var d=await r.json()
    if(d.code===200&&d.data){
      var st=d.data
      var bar=$('marketStateBar'),footerState=$('marketStateFooter')
      var fm=$('freezeMsg'),statusEl=$('status')
      
      // еёӮеңәзҠ¶жҖҒж Ҹ
      var statusColors={trading:'#16a34a',lunch:'#ca8a04',closed:'#6b7280',premarket:'#2563eb'}
      var statusLabels={trading:'рҹ“Ҳ дәӨжҳ“дёӯ',lunch:'вҳ• еҚҲдј‘дёӯ',closed:'рҹ”’ е·Іж”¶зӣҳ',premarket:'вҸі зӣҳеүҚеҮҶеӨҮ'}
      var statusColor=statusColors[st.status]||'#6b7280'
      var statusLabel=statusLabels[st.status]||'жңӘзҹҘ'
      
      if(st.status==='closed'||st.status==='lunch'||st.status==='premarket'){
        bar.style.display='block'
        bar.style.background='#fefce8'
        bar.style.border='1px solid #fde68a'
        bar.style.color='#a16207'
        bar.textContent=statusLabel+(st.lockUntilStr?' В· й”Ғе®ҡиҮі '+st.lockUntilStr:'')
        if(footerState) footerState.textContent='рҹ”’ '+st.status
      }else{
        bar.style.display='block'
        bar.style.background='#f0fdf4'
        bar.style.border='1px solid #86efac'
        bar.style.color='#166534'
        bar.textContent=statusLabel+(st.nextScanStr?' В· дёӢж¬Ўжү«жҸҸ '+st.nextScanStr:'')+' пҪң '+st.lastScanCount+'еҸӘзј“еӯҳ'
        if(footerState) footerState.textContent='рҹ“Ҳ '+st.beijingTime
      }
      
      // жӣҙж–°еҶ»з»“жЁӘе№…
      var f=freezeMsg()
      if(fm){
        fm.style.display=f?'block':'none'
        fm.textContent=f
      }
      
      return st
    }
  }catch(e){}
  return null
}

function startPriceRefresh(stks){
  if(stks&&stks.length>0){
    stopPriceRefresh()
    // еёӮеңәзҠ¶жҖҒиҪ®иҜўпјҲжҜҸ30з§’пјү
    marketTimer=setInterval(function(){fetchMarketState()},30000)
    fetchMarketState() // з«ӢеҚіжү§иЎҢдёҖж¬Ў
    
    // е®һж—¶д»·ж јиҪ®иҜўпјҲжҜҸ2з§’пјү
    priceTimer=setInterval(function(){
      if(!isTH()){
        // йқһдәӨжҳ“ж—¶й—ҙеҒңжӯўд»·ж јеҲ·ж–°пјҢдҪҶз»§з»ӯжӣҙж–°еёӮеңәзҠ¶жҖҒ
        // йқһдәӨжҳ“ж—¶й—ҙеҒңжӯўд»·ж јеҲ·ж–°пјҢдҪҶжҢүй’®д»ҚеҸҜжүӢеҠЁзӮ№еҮ»
        $('scanBtn').textContent='рҹ”„ з«ӢеҚіжү«жҸҸ'
        return
      }
      if(stocks.length>0){
        var codes=stocks.map(function(s){return s.code})
        fetchRealtime(codes).then(function(rt){
          realtimePrices=rt
          // зӣҙжҺҘеңЁDOMдёҠжӣҙж–°д»·ж је…ғзҙ пјҲдёҚйҮҚз»ҳж•ҙдёӘеҲ—иЎЁпјү
          var cards=$('stockList').querySelectorAll('.stock-card')
          cards.forEach(function(card,i){
            if(i>=stocks.length)return
            var s=stocks[i],rt=realtimePrices[s.code]||{}
            var price=rt.price||s.currentPrice||0
            var chg=rt.chgP!==undefined?rt.chgP:(s.changePercent||0)
            var chgClr=chg>=0?'#ef4444':'#22c55e'
            var chgT=(chg>=0?'+':'')+chg.toFixed(2)+'%'
            // жҹҘжүҫиӮЎд»·е’Ңж¶Ёе№…е…ғзҙ 
            var spans=card.querySelectorAll('.stock-row span')
            // з»“жһ„: rank-badge | info | signal-badge | price | chg | pos
            var priceSpan=spans[2],chgSpan=spans[3]
            if(priceSpan){
              priceSpan.textContent=price.toFixed(2)
            }
            if(chgSpan){
              chgSpan.textContent=chgT
              chgSpan.style.color=chgClr
            }
          })
        }).catch(function(){})
      }
    },2000)
  }
}
function stopPriceRefresh(){
  if(priceTimer){clearInterval(priceTimer);priceTimer=null}
  if(marketTimer){clearInterval(marketTimer);marketTimer=null}
}

function verifyAdminToken(tok){
  if(!tok)return
  var st=ad('adminTokenStatus')
  if(st)st.innerHTML='<span style="color:#999">вҸі йӘҢиҜҒдёӯвҖҰ</span>'
  fetch('/api/device/verify-token',{headers:{'X-Admin-Token':tok}}).then(function(r){return r.json()}).then(function(j){
    if(st){
      if(j.valid){
        st.innerHTML='<span style="color:#16a34a;font-weight:600">вң… д»ӨзүҢжңүж•Ҳ (рҹ‘‘ з®ЎзҗҶе‘ҳ)</span>'

    }

  var newPwd=prompt('иҜ·иҫ“е…Ҙж–°еҜҶз ҒпјҲиҮіе°‘4дёӘеӯ—з¬Ұпјүпјҡ')
  if(!newPwd||newPwd.length<4){alert('еҜҶз ҒиҮіе°‘4дёӘеӯ—з¬Ұ');return}
  var confirmPwd=prompt('иҜ·еҶҚж¬Ўиҫ“е…Ҙж–°еҜҶз Ғпјҡ')
  if(newPwd!==confirmPwd){alert('дёӨж¬ЎеҜҶз ҒдёҚдёҖиҮҙ');return}
  try{
    localStorage.setItem('adminPassword',newPwd)
    ADMIN_DEFAULT_PWD=newPwd
    alert('вң… еҜҶз Ғе·Ідҝ®ж”№дёәпјҡ'+newPwd+'\nиҜ·зүўи®°ж–°еҜҶз ҒпјҒ')
  }catch(e){alert('дҝқеӯҳеӨұиҙҘ: '+e.message)}
}
// ========== End Admin Panel ==========
</script>
