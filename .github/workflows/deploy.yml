name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          echo "⏳ 触发Render部署..."
          HTTP_CODE=$(curl -s -o /tmp/render-deploy.log -w "%{http_code}" \
            -X POST "https://api.render.com/deploy/srv-d8ortc8js32c7385n72g?key=htmRK6ve_Qc" \
            --max-time 120)
          echo "HTTP $HTTP_CODE"
          echo "--- 响应 ---"
          cat /tmp/render-deploy.log
          echo ""
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ 部署已触发 (HTTP $HTTP_CODE)！"
          else
            echo "⚠️ 部署触发响应: $HTTP_CODE"
            exit 1
          fi