name: 🚀 Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Trigger Render Deploy Hook
        run: |
          echo "⏳ 触发 Render 部署..."
          HTTP_CODE=$(curl -s -o /tmp/render-deploy.log -w "%{http_code}" \
            -X POST "https://api.render.com/deploy/srv-d8ortc8js32c7385n72g?key=htmRK6ve_Qc" \
            --max-time 120)
          echo "HTTP $HTTP_CODE"
          cat /tmp/render-deploy.log
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 部署已触发！"
          else
            echo "⚠️ 部署触发响应: $HTTP_CODE"
          fi
      
      - name: ⏳ Wait for Render Build
        run: |
          echo "等待Render构建部署..."
          for i in $(seq 1 12); do
            sleep 30
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://stock-screener-54nd.onrender.com/api/health" --max-time 15)
            echo "  $((i*30))s: health=${HTTP_CODE}"
            
            # After 3 minutes, check if concept sectors appear
            if [ $i -ge 6 ]; then
              HAS_CONCEPT=$(curl -s --max-time 15 \
                "https://stock-screener-54nd.onrender.com/api/gem/industry-sectors/top10" \
                | python3 -c "import json,sys;d=json.load(sys.stdin);s=[x['name'] for x in d.get('data',{}).get('sectors',[])];print(any(n in ['物理AI','HBM/存储','算力芯片','人形机器人'] for n in s))" 2>/dev/null)
              if [ "$HAS_CONCEPT" = "True" ]; then
                echo "✅ 概念板块已更新！部署成功！"
                exit 0
              fi
            fi
          done
          echo "⚠️ 等待超时，请检查Render Dashboard"
