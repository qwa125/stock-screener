name: 🔄 A股交易日保活 (9:00-15:00 每5分钟)

on:
  schedule:
    # 交易日(1-5) 北京时间9:00-14:55 (UTC 1:00-6:55) 每5分钟ping一次
    - cron: '*/5 1-6 * * 1-5'
    # 交易日 15:00 (UTC 7:00) 最后一次ping收盘保活
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 触发Render部署
        run: |
          curl -s -o /dev/null -w "Deploy: HTTP %{http_code}\n" --max-time 30 \
            -X POST "https://api.render.com/deploy/srv-d8ortc8js32c7385n72g?key=htmRK6ve_Qc"
      - name: 🌐 Ping Render 保持活跃
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://stock-screener-54nd.onrender.com")
          echo "[$(date '+%H:%M:%S')] HTTP $CODE"
          [ "$CODE" = "200" ] || [ "$CODE" = "429" ] && echo "✅ 正常" || echo "⚠️ 异常"