name: 🔄 Keep Render Awake

on:
  schedule:
    # 每5分钟ping Render + 检查自动部署
    - cron: '*/5 1-10 * * 1-5'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 触发Render部署
        run: |
          curl -s -o /dev/null -w "Deploy: HTTP %{http_code}\n" --max-time 30 \
            -X POST "https://api.render.com/deploy/srv-d8n3ku1o3t8c73cd4qs0?key=Fg1T5D-KRDc"
      - name: 🌐 Ping Render 保持活跃
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://stock-screener-54nd.onrender.com")
          echo "[$(date '+%H:%M:%S')] HTTP $CODE"
          [ "$CODE" = "200" ] || [ "$CODE" = "429" ] && echo "✅ 正常" || echo "⚠️ 异常"