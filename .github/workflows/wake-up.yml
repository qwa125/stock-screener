name: 🔄 A股交易定时器

on:
  schedule:
    # 每10分钟唤醒，确保Render服务不睡眠 + 激活前端扫描
    - cron: '*/10 * * * *'
    # 北京时间9:00 (UTC 01:00) 周一至周五准点唤醒市场开盘
    - cron: '0 1 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  wake-up:
    name: Ping Render Health Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: ⏰ 检查当前北京时间
        id: beijing_time
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          MINUTE=$(TZ='Asia/Shanghai' date +%M)
          DOW=$(TZ='Asia/Shanghai' date +%u)  # 1=周一, 7=周日
          echo "hour=$HOUR" >> $GITHUB_OUTPUT
          echo "minute=$MINUTE" >> $GITHUB_OUTPUT
          echo "dow=$DOW" >> $GITHUB_OUTPUT
          echo "🕐 北京时间: $HOUR:$MINUTE 星期$DOW"

      - name: 🌐 Ping Render 服务（唤醒+激活前端JS扫描）
        id: ping
        run: |
          echo "⏳ 正在唤醒 Render..."
          START_TIME=$(date +%s%N)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://stock-screener-54nd.onrender.com/api/health")
          END_TIME=$(date +%s%N)
          DURATION_MS=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          echo "duration_ms=$DURATION_MS" >> $GITHUB_OUTPUT
          echo "✅ HTTP $HTTP_CODE ($DURATION_MS ms)"

      - name: 📈 交易时段报告
        if: steps.beijing_time.outputs.hour >= 9 && steps.beijing_time.outputs.hour < 15 && steps.beijing_time.outputs.dow < 6
        run: |
          echo "📈 交易时段 (北上广深交易日 9:00-15:00) — 前端JS将自动启动扫描"
          echo "🌡️ 冷启动耗时: ${{ steps.ping.outputs.duration_ms }}ms"

      - name: 💤 非交易时段报告
        if: steps.beijing_time.outputs.hour < 9 || steps.beijing_time.outputs.hour >= 15 || steps.beijing_time.outputs.dow >= 6
        run: |
          echo "💤 非交易时段 — 唤醒仅保活，前端JS将显示冻结状态"